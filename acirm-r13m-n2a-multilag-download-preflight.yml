name: ACIRM R13M N2A Multi Lag Download Preflight Only

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  acirm-r13m-n2a-multilag-preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install lightweight tools
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq curl wget zip dnsutils

      - name: Run ACIRM R13M N2A multi-lag download preflight only
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import csv, json, socket, ssl, time, hashlib, shutil, subprocess, urllib.request
          from pathlib import Path
          from datetime import datetime, timezone

          STAGE = "ACIRM_R13M_N2A_INDEPENDENT_TIME_SHIFT_MULTI_LAG_DOWNLOAD_PREFLIGHT_ONLY"
          OUT = Path(f"{STAGE}_OUTPUT")
          OUT.mkdir(exist_ok=True)
          PROGRESS = OUT / "PROGRESS.log"

          CENTER_WEEK = 728
          LAG_PAIRS = [
              {"lag_id":"LAG_300D_W43", "lag_days_approx":301, "lag_weeks":43, "pre_week":685, "post_week":771, "role":"shorter_lag_guardrail"},
              {"lag_id":"LAG_450D_W64", "lag_days_approx":448, "lag_weeks":64, "pre_week":664, "post_week":792, "role":"shorter_lag_guardrail"},
              {"lag_id":"LAG_650D_W93", "lag_days_approx":651, "lag_weeks":93, "pre_week":635, "post_week":821, "role":"N1_locked_midpoint_reproduction_guardrail"},
              {"lag_id":"LAG_850D_W121", "lag_days_approx":847, "lag_weeks":121, "pre_week":607, "post_week":849, "role":"longer_lag_guardrail"},
              {"lag_id":"LAG_1000D_W143", "lag_days_approx":1001, "lag_weeks":143, "pre_week":585, "post_week":871, "role":"outer_lag_guardrail"},
          ]

          CATALOG_URLS = [
              "https://fermi.gsfc.nasa.gov/ssc/data/access/lat/14yr_catalog/gll_psc_v35.fit",
              "https://heasarc.gsfc.nasa.gov/FTP/fermi/data/lat/catalogs/4FGL/gll_psc_v35.fit",
          ]

          def log(msg):
              s = f"[{datetime.now(timezone.utc).isoformat()}] {msg}"
              print(s, flush=True)
              with PROGRESS.open("a", encoding="utf-8") as f:
                  f.write(s + "\n")

          def write_json(name, obj):
              (OUT / name).write_text(json.dumps(obj, indent=2, sort_keys=True), encoding="utf-8")

          def write_csv(name, rows, fields):
              with (OUT / name).open("w", newline="", encoding="utf-8") as f:
                  w = csv.DictWriter(f, fieldnames=fields)
                  w.writeheader()
                  for r in rows:
                      w.writerow({k: r.get(k, "") for k in fields})

          def host_from_url(url):
              return url.split("/")[2]

          def photon_url(week):
              return f"https://heasarc.gsfc.nasa.gov/FTP/fermi/data/lat/weekly/photon/lat_photon_weekly_w{int(week):03d}_p305_v001.fits"

          def spacecraft_url(week):
              return f"https://heasarc.gsfc.nasa.gov/FTP/fermi/data/lat/weekly/spacecraft/lat_spacecraft_weekly_w{int(week):03d}_p310_v001.fits"

          def dns_check(host):
              t0 = time.time()
              try:
                  infos = socket.getaddrinfo(host, 443, proto=socket.IPPROTO_TCP)
                  addrs = sorted({x[4][0] for x in infos})
                  return {"host":host, "dns_ok":True, "addresses":";".join(addrs), "elapsed_sec":round(time.time()-t0,3), "error":""}
              except Exception as e:
                  return {"host":host, "dns_ok":False, "addresses":"", "elapsed_sec":round(time.time()-t0,3), "error":repr(e)[:500]}

          def tls_check(host, timeout=25):
              t0 = time.time()
              try:
                  raw = socket.create_connection((host, 443), timeout=timeout)
                  ctx = ssl.create_default_context()
                  ssock = ctx.wrap_socket(raw, server_hostname=host)
                  proto = ssock.version()
                  ssock.close()
                  return {"host":host, "tls_ok":True, "tls_version":proto, "tls_elapsed_sec":round(time.time()-t0,3), "tls_error":""}
              except Exception as e:
                  return {"host":host, "tls_ok":False, "tls_version":"", "tls_elapsed_sec":round(time.time()-t0,3), "tls_error":repr(e)[:700]}

          def curl_head(url, label):
              t0 = time.time()
              cmd = ["curl", "-I", "-L", "--connect-timeout", "30", "--max-time", "120", "--retry", "2", "--silent", "--show-error", "-A", "ACIRM-R13M-N2A-preflight", url]
              try:
                  p = subprocess.run(cmd, text=True, stdout=subprocess.PIPE, stderr=subprocess.STDOUT, timeout=150)
                  out = p.stdout or ""
                  (OUT / f"HEAD_{label}.log").write_text(out[-8000:], encoding="utf-8", errors="replace")
                  http_codes = []
                  content_length = ""
                  accept_ranges = ""
                  for line in out.splitlines():
                      low = line.lower().strip()
                      if low.startswith("http/"):
                          parts = line.split()
                          if len(parts) >= 2:
                              http_codes.append(parts[1])
                      if low.startswith("content-length:"):
                          content_length = line.split(":",1)[1].strip()
                      if low.startswith("accept-ranges:"):
                          accept_ranges = line.split(":",1)[1].strip()
                  ok = p.returncode == 0 and any(c in ("200","206") for c in http_codes)
                  return {"label":label, "url":url, "head_ok":ok, "http_codes":";".join(http_codes), "content_length":content_length, "accept_ranges":accept_ranges, "head_elapsed_sec":round(time.time()-t0,3), "returncode":p.returncode, "head_error_tail":out[-600:] if not ok else ""}
              except Exception as e:
                  return {"label":label, "url":url, "head_ok":False, "http_codes":"", "content_length":"", "accept_ranges":"", "head_elapsed_sec":round(time.time()-t0,3), "returncode":"EXC", "head_error_tail":repr(e)[:700]}

          def partial_read(url, label, max_bytes=1048576, timeout=180):
              t0 = time.time()
              h = hashlib.sha256()
              got = 0
              try:
                  req = urllib.request.Request(url, headers={"Range": f"bytes=0-{max_bytes-1}", "User-Agent":"ACIRM-R13M-N2A-preflight"})
                  with urllib.request.urlopen(req, timeout=timeout) as r:
                      status = getattr(r, "status", "")
                      headers = dict(r.headers.items())
                      while got < max_bytes:
                          chunk = r.read(min(65536, max_bytes-got))
                          if not chunk:
                              break
                          h.update(chunk)
                          got += len(chunk)
                  ok = got > 0 and status in (200, 206)
                  return {"label":label, "url":url, "partial_ok":ok, "http_status":status, "bytes_read":got, "sha256_first_bytes":h.hexdigest() if got else "", "content_range":headers.get("Content-Range", ""), "partial_elapsed_sec":round(time.time()-t0,3), "partial_error":""}
              except Exception as e:
                  return {"label":label, "url":url, "partial_ok":False, "http_status":"", "bytes_read":got, "sha256_first_bytes":"", "content_range":"", "partial_elapsed_sec":round(time.time()-t0,3), "partial_error":repr(e)[:900]}

          log("START N2A multi-lag download preflight only. No Fermipy analysis. No score.")

          unique_weeks = sorted({p["pre_week"] for p in LAG_PAIRS} | {p["post_week"] for p in LAG_PAIRS})
          required = []
          for w in unique_weeks:
              required.append({"label":f"photon_w{w:03d}", "kind":"photon", "week":w, "url":photon_url(w), "required":True})
              required.append({"label":f"spacecraft_w{w:03d}", "kind":"spacecraft", "week":w, "url":spacecraft_url(w), "required":True})
          required.append({"label":"catalog_gll_psc_v35_primary", "kind":"catalog", "week":"", "url":CATALOG_URLS[0], "required":False})
          required.append({"label":"catalog_gll_psc_v35_alt", "kind":"catalog", "week":"", "url":CATALOG_URLS[1], "required":False})

          write_json("LOCKED_CONTEXT.json", {
              "stage": STAGE,
              "purpose": "Preflight official LAT weekly photon/spacecraft/catalog inputs for N2 independent time-shift and multi-lag guardrail before expensive Fermipy analysis.",
              "center_week_inferred_from_N1": CENTER_WEEK,
              "lag_pairs": LAG_PAIRS,
              "unique_weeks": unique_weeks,
              "no_scientific_result": True,
              "claim_ceiling": "NO_SCORE_NOT_PROOF_NOT_DISCOVERY",
              "required_inputs": required,
          })
          write_csv("LAG_MANIFEST.csv", LAG_PAIRS, ["lag_id","lag_days_approx","lag_weeks","pre_week","post_week","role"])

          hosts = sorted({host_from_url(x["url"]) for x in required})
          host_rows = []
          for host in hosts:
              log(f"DNS/TLS check host={host}")
              d = dns_check(host)
              t = tls_check(host)
              row = dict(d)
              row.update({"tls_ok": t["tls_ok"], "tls_version": t["tls_version"], "tls_elapsed_sec": t["tls_elapsed_sec"], "tls_error": t["tls_error"]})
              host_rows.append(row)
          write_csv("HOST_CHECKS.csv", host_rows, ["host","dns_ok","addresses","elapsed_sec","error","tls_ok","tls_version","tls_elapsed_sec","tls_error"])

          url_rows = []
          partial_rows = []
          for item in required:
              log(f"HEAD check {item['label']}")
              hr = curl_head(item["url"], item["label"])
              hr.update({"kind":item["kind"], "week":item["week"], "required":item["required"]})
              url_rows.append(hr)
              log(f"PARTIAL read check {item['label']}")
              pr = partial_read(item["url"], item["label"])
              pr.update({"kind":item["kind"], "week":item["week"], "required":item["required"]})
              partial_rows.append(pr)
          write_csv("URL_CHECKS.csv", url_rows, ["label","kind","week","required","url","head_ok","http_codes","content_length","accept_ranges","head_elapsed_sec","returncode","head_error_tail"])
          write_csv("PARTIAL_READ_CHECKS.csv", partial_rows, ["label","kind","week","required","url","partial_ok","http_status","bytes_read","sha256_first_bytes","content_range","partial_elapsed_sec","partial_error"])

          weekly_rows = [r for r in partial_rows if r["kind"] in ("photon", "spacecraft")]
          weekly_ok = all(r["partial_ok"] for r in weekly_rows)
          catalog_ok = any(r["partial_ok"] for r in partial_rows if r["label"].startswith("catalog_gll_psc_v35"))
          all_required_ok = bool(weekly_ok and catalog_ok)

          if all_required_ok:
              decision = "N2A_MULTI_LAG_DOWNLOAD_PREFLIGHT_PASSED_READY_FOR_N2B_ANALYSIS_NO_SCORE"
              next_stage = "ACIRM_R13M_N2B_STAGED_MULTI_LAG_FERMIPY_ANALYSIS_NO_SCORE"
          else:
              decision = "TECHNICAL_STOP_N2A_MULTI_LAG_DOWNLOAD_PREFLIGHT_FAILED_NO_SCORE"
              next_stage = "WAIT_AND_RETRY_OR_USE_MANUAL_LAT_SERVER_EXPORT_NO_SCORE"

          final = {
              "stage": STAGE,
              "decision": decision,
              "scientific_result": False,
              "technical_stop": not all_required_ok,
              "unique_weeks_n": len(unique_weeks),
              "required_weekly_files_n": len(weekly_rows),
              "required_weekly_files_partial_ok": weekly_ok,
              "catalog_partial_ok": catalog_ok,
              "next_stage": next_stage,
              "claim_ceiling": "NO_SCORE_NOT_PROOF_NOT_DISCOVERY",
              "timestamp_utc": datetime.now(timezone.utc).isoformat(),
          }
          write_json("FINAL_DECISION.json", final)

          zipname = f"{STAGE}_RESULTS.zip"
          shutil.make_archive(zipname[:-4], "zip", root_dir=".", base_dir=str(OUT))
          sha = hashlib.sha256(Path(zipname).read_bytes()).hexdigest()
          Path(zipname + ".sha256.txt").write_text(f"{sha}  {zipname}\n", encoding="utf-8")
          log("FINAL_DECISION=" + decision)
          log("ZIP=" + zipname + " SHA256=" + sha)
          PY

      - name: Show final decision
        if: always()
        shell: bash
        run: |
          set +e
          cat ACIRM_R13M_N2A_INDEPENDENT_TIME_SHIFT_MULTI_LAG_DOWNLOAD_PREFLIGHT_ONLY_OUTPUT/FINAL_DECISION.json || true
          echo ""
          tail -n 120 ACIRM_R13M_N2A_INDEPENDENT_TIME_SHIFT_MULTI_LAG_DOWNLOAD_PREFLIGHT_ONLY_OUTPUT/PROGRESS.log || true

      - name: Upload N2A preflight artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ACIRM_R13M_N2A_MULTI_LAG_DOWNLOAD_PREFLIGHT_ONLY_RESULTS
          path: |
            ACIRM_R13M_N2A_INDEPENDENT_TIME_SHIFT_MULTI_LAG_DOWNLOAD_PREFLIGHT_ONLY_RESULTS.zip
            ACIRM_R13M_N2A_INDEPENDENT_TIME_SHIFT_MULTI_LAG_DOWNLOAD_PREFLIGHT_ONLY_RESULTS.zip.sha256.txt
            ACIRM_R13M_N2A_INDEPENDENT_TIME_SHIFT_MULTI_LAG_DOWNLOAD_PREFLIGHT_ONLY_OUTPUT/**
          retention-days: 14
