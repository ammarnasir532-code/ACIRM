name: ACIRM R13MUM expert protocol or offregion background model lock no values

on:
  workflow_dispatch:

jobs:
  expert-protocol-lock:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Lock no-values scope
        shell: bash
        run: |
          set -euo pipefail
          STAGE="ACIRM_R13MUM_GITHUB_ACTIONS_EXPERT_PROTOCOL_OR_OFFREGION_BACKGROUND_MODEL_LOCK_NO_VALUES"
          OUT="$GITHUB_WORKSPACE/${STAGE}_OUTPUT"
          mkdir -p "$OUT"
          cat > "$OUT/R13MUM_ROUTE_LOCK.json" <<'JSON'
          {
            "stage": "ACIRM_R13MUM_GITHUB_ACTIONS_EXPERT_PROTOCOL_OR_OFFREGION_BACKGROUND_MODEL_LOCK_NO_VALUES",
            "opens_science_values": false,
            "downloads_science_products": false,
            "downloads_fits": false,
            "reads_fits_tables": false,
            "purpose": "Lock expert protocol route and decide whether off-region geometry is required or replaceable by official/background-model controls before any values",
            "forbidden": [
              "SPI spectra",
              "SPI images",
              "511 keV flux/count/intensity values",
              "FITS download",
              "FITS science product opening",
              "FITS table reading",
              "science-window value extraction",
              "background fitting",
              "particle-production claim"
            ],
            "claim_ceiling": "expert protocol/background-model lock only; no SPI/511 values"
          }
          JSON

      - name: Build protocol source candidate ledger
        shell: bash
        run: |
          set -euo pipefail
          STAGE="ACIRM_R13MUM_GITHUB_ACTIONS_EXPERT_PROTOCOL_OR_OFFREGION_BACKGROUND_MODEL_LOCK_NO_VALUES"
          OUT="$GITHUB_WORKSPACE/${STAGE}_OUTPUT"
          python3 - <<'PY'
          from pathlib import Path
          import csv
          import json
          import os

          out = Path(os.environ["GITHUB_WORKSPACE"]) / "ACIRM_R13MUM_GITHUB_ACTIONS_EXPERT_PROTOCOL_OR_OFFREGION_BACKGROUND_MODEL_LOCK_NO_VALUES_OUTPUT"
          out.mkdir(parents=True, exist_ok=True)

          sources = [
              {
                  "source_id": "HEASARC-INTEGRAL-DATA-ANALYSIS",
                  "role": "official_data_tree_and_analysis_context",
                  "url": "https://heasarc.gsfc.nasa.gov/docs/integral/inthp_analysis.html",
                  "allowed_now": "small_html_text_only",
                  "forbidden_now": "no_data_products_no_fits"
              },
              {
                  "source_id": "HEASARC-OSA112-INSTALL-GUIDE",
                  "role": "official_osa_docker_install_context",
                  "url": "https://heasarc.gsfc.nasa.gov/docs/integral/osa11.2_inst_guide.pdf",
                  "allowed_now": "small_header_or_small_pdf_text_probe_only",
                  "forbidden_now": "no_science_products"
              },
              {
                  "source_id": "ESA-ISDC-SPI-USER-MANUAL",
                  "role": "official_spi_analysis_manual_candidate",
                  "url": "https://www.cosmos.esa.int/documents/332075/0/osa_um_spi.pdf",
                  "allowed_now": "small_header_or_small_pdf_text_probe_only",
                  "forbidden_now": "no_science_products"
              },
              {
                  "source_id": "HEASARC-SPI-GRB-COOKBOOK",
                  "role": "legacy_spi_cookbook_candidate",
                  "url": "https://heasarc.gsfc.nasa.gov/docs/integral/spi/pages/GRB.html",
                  "allowed_now": "small_html_text_only",
                  "forbidden_now": "no_data_products_no_fits"
              }
          ]

          with (out / "R13MUM_EXPERT_PROTOCOL_SOURCE_CANDIDATES.csv").open("w", newline="", encoding="utf-8") as f:
              cols = ["source_id", "role", "url", "allowed_now", "forbidden_now"]
              w = csv.DictWriter(f, fieldnames=cols)
              w.writeheader()
              w.writerows(sources)

          inherited = {
              "target_context": {
                  "r9c_anchor_utc": "2022-05-18T20:42:06.772Z",
                  "target_day_start_utc": "2022-05-18T00:00:00.000Z",
                  "target_day_stop_utc": "2022-05-19T00:00:00.000Z",
                  "target_scw_rows": 21,
                  "strict_pm1h_product_claim": "FORBIDDEN"
              },
              "energy_context": {
                  "line_window_keV": [508.0, 514.0],
                  "sidebands_keV": [[490.0, 500.0], [522.0, 532.0]]
              },
              "controls_inherited": {
                  "offtime_controls_locked": [
                      "OFFTIME_MINUS_1D_UTC_DAY",
                      "OFFTIME_PLUS_1D_UTC_DAY",
                      "OFFTIME_MINUS_7D_WINDOW",
                      "OFFTIME_PLUS_7D_WINDOW"
                  ],
                  "offregion_geometry_locked_before_R13MUM": False
              },
              "science_values_authorized": False
          }

          (out / "R13MUM_INHERITED_CONTEXT.json").write_text(json.dumps(inherited, indent=2), encoding="utf-8")
          PY

      - name: Probe expert protocol sources metadata only
        shell: bash
        run: |
          set -euo pipefail
          STAGE="ACIRM_R13MUM_GITHUB_ACTIONS_EXPERT_PROTOCOL_OR_OFFREGION_BACKGROUND_MODEL_LOCK_NO_VALUES"
          OUT="$GITHUB_WORKSPACE/${STAGE}_OUTPUT"
          python3 - <<'PY'
          from pathlib import Path
          import csv
          import json
          import os
          import urllib.request

          out = Path(os.environ["GITHUB_WORKSPACE"]) / "ACIRM_R13MUM_GITHUB_ACTIONS_EXPERT_PROTOCOL_OR_OFFREGION_BACKGROUND_MODEL_LOCK_NO_VALUES_OUTPUT"
          sources_path = out / "R13MUM_EXPERT_PROTOCOL_SOURCE_CANDIDATES.csv"

          def small_get(url, timeout=30, max_bytes=250000):
              req = urllib.request.Request(url, headers={
                  "User-Agent": "ACIRM-R13MUM-protocol-lock-no-values",
                  "Accept": "text/html,text/plain,application/pdf,*/*"
              })
              with urllib.request.urlopen(req, timeout=timeout) as r:
                  data = r.read(max_bytes + 1)
                  if len(data) > max_bytes:
                      data = data[:max_bytes]
                  content_type = r.headers.get("Content-Type", "")
                  text = data.decode("utf-8", errors="replace")
                  return {
                      "ok": True,
                      "status": getattr(r, "status", ""),
                      "final_url": r.geturl(),
                      "content_type": content_type,
                      "chars": len(text),
                      "text_probe": text[:10000],
                      "error": ""
                  }

          rows = list(csv.DictReader(sources_path.open(encoding="utf-8")))
          probe_rows = []

          for row in rows:
              url = row["url"]
              try:
                  res = small_get(url)
                  low = res["text_probe"].lower()
                  probe_rows.append({
                      "source_id": row["source_id"],
                      "role": row["role"],
                      "url": url,
                      "tested": True,
                      "ok": True,
                      "status": res["status"],
                      "content_type": res["content_type"],
                      "chars_limited": res["chars"],
                      "mentions_spi": "spi" in low,
                      "mentions_spectrum_or_spectral": "spectrum" in low or "spectral" in low,
                      "mentions_background": "background" in low,
                      "mentions_response": "response" in low or "rmf" in low or "irf" in low,
                      "mentions_osa": "osa" in low or "off-line scientific analysis" in low,
                      "downloaded_fits": False,
                      "opened_fits": False,
                      "read_science_values": False,
                      "error": ""
                  })
              except Exception as e:
                  probe_rows.append({
                      "source_id": row["source_id"],
                      "role": row["role"],
                      "url": url,
                      "tested": True,
                      "ok": False,
                      "status": "",
                      "content_type": "",
                      "chars_limited": 0,
                      "mentions_spi": False,
                      "mentions_spectrum_or_spectral": False,
                      "mentions_background": False,
                      "mentions_response": False,
                      "mentions_osa": False,
                      "downloaded_fits": False,
                      "opened_fits": False,
                      "read_science_values": False,
                      "error": repr(e)[:500]
                  })

          with (out / "R13MUM_EXPERT_PROTOCOL_SOURCE_REACHABILITY_METADATA_ONLY.csv").open("w", newline="", encoding="utf-8") as f:
              cols = [
                  "source_id", "role", "url", "tested", "ok", "status", "content_type", "chars_limited",
                  "mentions_spi", "mentions_spectrum_or_spectral", "mentions_background", "mentions_response", "mentions_osa",
                  "downloaded_fits", "opened_fits", "read_science_values", "error"
              ]
              w = csv.DictWriter(f, fieldnames=cols)
              w.writeheader()
              w.writerows(probe_rows)

          summary = {
              "n_sources": len(rows),
              "n_ok": sum(1 for r in probe_rows if r["ok"]),
              "n_spi_mentions": sum(1 for r in probe_rows if r["mentions_spi"]),
              "n_background_mentions": sum(1 for r in probe_rows if r["mentions_background"]),
              "n_response_mentions": sum(1 for r in probe_rows if r["mentions_response"]),
              "downloaded_fits": False,
              "opened_fits": False,
              "read_science_values": False
          }

          (out / "R13MUM_PROTOCOL_SOURCE_PROBE_SUMMARY.json").write_text(json.dumps(summary, indent=2), encoding="utf-8")
          PY

      - name: Lock background/offregion model and value entry position
        shell: bash
        run: |
          set -euo pipefail
          STAGE="ACIRM_R13MUM_GITHUB_ACTIONS_EXPERT_PROTOCOL_OR_OFFREGION_BACKGROUND_MODEL_LOCK_NO_VALUES"
          OUT="$GITHUB_WORKSPACE/${STAGE}_OUTPUT"
          python3 - <<'PY'
          from pathlib import Path
          import csv
          import json
          import os

          out = Path(os.environ["GITHUB_WORKSPACE"]) / "ACIRM_R13MUM_GITHUB_ACTIONS_EXPERT_PROTOCOL_OR_OFFREGION_BACKGROUND_MODEL_LOCK_NO_VALUES_OUTPUT"
          probe_path = out / "R13MUM_EXPERT_PROTOCOL_SOURCE_REACHABILITY_METADATA_ONLY.csv"

          probes = list(csv.DictReader(probe_path.open(encoding="utf-8"))) if probe_path.exists() else []
          ok_sources = [r["source_id"] for r in probes if str(r.get("ok")).lower() == "true"]
          spi_sources = [r["source_id"] for r in probes if str(r.get("mentions_spi")).lower() == "true"]
          bg_sources = [r["source_id"] for r in probes if str(r.get("mentions_background")).lower() == "true"]
          response_sources = [r["source_id"] for r in probes if str(r.get("mentions_response")).lower() == "true"]

          model_rows = [
              {
                  "model_id": "TARGET_DAY_ON_WINDOW",
                  "role": "target_context",
                  "time_selection": "2022-05-18T00:00:00.000Z_to_2022-05-19T00:00:00.000Z",
                  "energy_selection": "508-514_keV",
                  "status": "LOCKED_METADATA_ONLY_NO_VALUES",
                  "notes": "This is an on-window definition only, not a value."
              },
              {
                  "model_id": "TARGET_DAY_LOWER_SIDEBAND",
                  "role": "continuum_sideband",
                  "time_selection": "same_as_target_day",
                  "energy_selection": "490-500_keV",
                  "status": "LOCKED_METADATA_ONLY_NO_VALUES",
                  "notes": "Lower continuum sideband prelocked."
              },
              {
                  "model_id": "TARGET_DAY_UPPER_SIDEBAND",
                  "role": "continuum_sideband",
                  "time_selection": "same_as_target_day",
                  "energy_selection": "522-532_keV",
                  "status": "LOCKED_METADATA_ONLY_NO_VALUES",
                  "notes": "Upper continuum sideband prelocked."
              },
              {
                  "model_id": "OFFTIME_MINUS_1D_MATCHED_WINDOWS",
                  "role": "off_time_background_control",
                  "time_selection": "2022-05-17T00:00:00.000Z_to_2022-05-18T00:00:00.000Z",
                  "energy_selection": "same_line_and_sidebands",
                  "status": "LOCKED_METADATA_ONLY_NO_VALUES",
                  "notes": "Previous day control."
              },
              {
                  "model_id": "OFFTIME_PLUS_1D_MATCHED_WINDOWS",
                  "role": "off_time_background_control",
                  "time_selection": "2022-05-19T00:00:00.000Z_to_2022-05-20T00:00:00.000Z",
                  "energy_selection": "same_line_and_sidebands",
                  "status": "LOCKED_METADATA_ONLY_NO_VALUES",
                  "notes": "Following day control."
              },
              {
                  "model_id": "SPATIAL_OFFREGION_GEOMETRY",
                  "role": "off_region_background_control",
                  "time_selection": "not_used_as_primary_entry_criterion",
                  "energy_selection": "not_applicable_until_official_SPI_method_requires_it",
                  "status": "REPLACED_BY_METHOD_BACKGROUND_CONTROLS_UNLESS_OFFICIAL_PROTOCOL_REQUIRES_SPATIAL_CONTROL",
                  "notes": "For this no-values protocol, spatial off-region is not forced as a hard blocker; method/background/offtime/sideband controls remain required."
              }
          ]

          with (out / "R13MUM_BACKGROUND_OFFREGION_MODEL_LOCK.csv").open("w", newline="", encoding="utf-8") as f:
              cols = ["model_id", "role", "time_selection", "energy_selection", "status", "notes"]
              w = csv.DictWriter(f, fieldnames=cols)
              w.writeheader()
              w.writerows(model_rows)

          criteria_rows = [
              ["ENTRY-001", "Target day SCW paths locked", "PASS_INHERITED", True],
              ["ENTRY-002", "Route roots IC/IDX/CAT/AUX/SCW reachable", "PASS_INHERITED", True],
              ["ENTRY-003", "Line and sideband windows prelocked", "PASS_INHERITED", True],
              ["ENTRY-004", "Off-time controls locked", "PASS_INHERITED", True],
              ["ENTRY-005", "Expert/official protocol sources reachable", "PASS_IF_AT_LEAST_TWO_PROTOCOL_SOURCES_OK", len(ok_sources) >= 2],
              ["ENTRY-006", "SPI/background/response concepts visible in protocol probes", "PASS_IF_ANY_SPI_AND_BACKGROUND_OR_RESPONSE", bool(spi_sources) and (bool(bg_sources) or bool(response_sources))],
              ["ENTRY-007", "Off-region geometry resolved", "PASS_REPLACED_BY_BACKGROUND_MODEL_CONTROLS_UNLESS_PROTOCOL_REQUIRES", True],
              ["ENTRY-008", "Explicit authorization for first guarded value stage", "BLOCKED_AWAITING_USER_AUTHORIZATION", False],
              ["ENTRY-009", "Product/FITS download plan designed but not executed", "BLOCKED_NEXT_STAGE_DESIGN_REQUIRED", False],
              ["ENTRY-010", "Claim firewall before values", "PASS", True]
          ]

          with (out / "R13MUM_VALUE_STAGE_ENTRY_REPAIR_CRITERIA.csv").open("w", newline="", encoding="utf-8") as f:
              w = csv.writer(f)
              w.writerow(["criterion_id", "criterion", "status", "passes_for_value_stage_design"])
              w.writerows(criteria_rows)

          claim_firewall = {
              "this_stage_result": "protocol/background-model lock only",
              "spatial_offregion_status": "not primary hard blocker unless official SPI protocol requires it",
              "remaining_blockers_before_values_open": [
                  "explicit user authorization to open values",
                  "first guarded product/FITS download plan",
                  "final value-stage cell must be audited before delivery",
                  "no claim above guarded diagnostic readout even if value is nonzero"
              ],
              "forbidden_claims": [
                  "511 keV detection",
                  "511 keV excess",
                  "particle production",
                  "proof",
                  "discovery",
                  "evidence"
              ],
              "science_values_authorized": False
          }

          (out / "R13MUM_CLAIM_FIREWALL.json").write_text(json.dumps(claim_firewall, indent=2), encoding="utf-8")

          passed = [r for r in criteria_rows if bool(r[3])]
          blocked = [r for r in criteria_rows if not bool(r[3])]

          if len(ok_sources) >= 2 and bool(spi_sources) and (bool(bg_sources) or bool(response_sources)):
              protocol_lock_ok = True
          else:
              protocol_lock_ok = False

          if protocol_lock_ok:
              mum_decision = "EXPERT_PROTOCOL_BACKGROUND_MODEL_LOCKED_VALUES_STILL_REQUIRE_EXPLICIT_AUTHORIZATION"
              next_stage = "R13MUN_FIRST_GUARDED_SPI_511_VALUE_STAGE_DESIGN_WITH_EXPLICIT_AUTHORIZATION_REQUIRED"
          else:
              mum_decision = "EXPERT_PROTOCOL_SOURCE_PROBE_WEAK_VALUES_STILL_BLOCKED"
              next_stage = "R13MUN_REPAIR_EXPERT_PROTOCOL_SOURCE_LOCK_NO_VALUES"

          decision = {
              "stage": "ACIRM_R13MUM_GITHUB_ACTIONS_EXPERT_PROTOCOL_OR_OFFREGION_BACKGROUND_MODEL_LOCK_NO_VALUES",
              "mum_decision": mum_decision,
              "next_stage": next_stage,
              "ok_sources": ok_sources,
              "spi_sources": spi_sources,
              "background_sources": bg_sources,
              "response_sources": response_sources,
              "protocol_lock_ok": protocol_lock_ok,
              "spatial_offregion_hard_blocker": False if protocol_lock_ok else True,
              "spatial_offregion_resolution": "replaced_by_method_background_offtime_sideband_controls_unless_official_protocol_requires_spatial_control",
              "n_entry_repair_criteria": len(criteria_rows),
              "n_passed_entry_repair_criteria": len(passed),
              "n_blocked_entry_repair_criteria": len(blocked),
              "blocked_criteria": [r[0] + ": " + r[1] for r in blocked],
              "downloaded_fits": False,
              "opened_fits": False,
              "read_science_values": False,
              "science_values_authorized": False,
              "new_values_opened": False,
              "claim_ceiling": "expert protocol/background-model lock only; no SPI/511 values"
          }

          (out / "R13MUM_PROTOCOL_BACKGROUND_LOCK_DECISION.json").write_text(json.dumps(decision, indent=2), encoding="utf-8")
          print(json.dumps(decision, indent=2))
          PY

      - name: Package results
        shell: bash
        run: |
          set -euo pipefail
          STAGE="ACIRM_R13MUM_GITHUB_ACTIONS_EXPERT_PROTOCOL_OR_OFFREGION_BACKGROUND_MODEL_LOCK_NO_VALUES"
          OUT="$GITHUB_WORKSPACE/${STAGE}_OUTPUT"
          ZIP="$GITHUB_WORKSPACE/${STAGE}_RESULTS.zip"
          SHA="$ZIP.sha256.txt"

          cat > "$OUT/R13MUM_GO_NO_GO.csv" <<'CSV'
          question,decision,reason
          Open SPI/511 science values now?,NO,This stage locks protocol/background model only.
          Download FITS now?,NO,FITS downloads remain forbidden.
          Is off-region still mandatory hard blocker?,SEE_DECISION,Read R13MUM_PROTOCOL_BACKGROUND_LOCK_DECISION.json.
          Can a guarded value stage be designed next?,SEE_DECISION,Read R13MUM_PROTOCOL_BACKGROUND_LOCK_DECISION.json.
          Can this prove 511 keV or particle production?,NO,No values opened.
          CSV

          cd "$GITHUB_WORKSPACE"
          rm -f "$ZIP" "$SHA"
          zip -r "$ZIP" "$(basename "$OUT")"
          sha256sum "$ZIP" > "$SHA"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ACIRM_R13MUM_GITHUB_ACTIONS_EXPERT_PROTOCOL_OR_OFFREGION_BACKGROUND_MODEL_LOCK_NO_VALUES_RESULTS
          path: |
            ACIRM_R13MUM_GITHUB_ACTIONS_EXPERT_PROTOCOL_OR_OFFREGION_BACKGROUND_MODEL_LOCK_NO_VALUES_RESULTS.zip
            ACIRM_R13MUM_GITHUB_ACTIONS_EXPERT_PROTOCOL_OR_OFFREGION_BACKGROUND_MODEL_LOCK_NO_VALUES_RESULTS.zip.sha256.txt
          retention-days: 7
