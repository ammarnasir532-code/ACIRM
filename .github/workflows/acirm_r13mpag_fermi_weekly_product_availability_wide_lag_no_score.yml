name: ACIRM R13MPAG Fermi weekly product availability wide lag no score

on:
  workflow_dispatch:

jobs:
  r13mpag-fermi-weekly-products:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: R13MPAG Fermi weekly product availability for wide lag windows no score
        shell: bash
        run: |
          set +e
          STAGE="ACIRM_R13MPAG_FERMI_WEEKLY_PRODUCT_AVAILABILITY_WIDE_LAG_NO_SCORE"
          OUT="$GITHUB_WORKSPACE/${STAGE}_OUTPUT"
          mkdir -p "$OUT"
          cat > "$GITHUB_WORKSPACE/r13mpag_controller.py" <<'PYCODE'
          from pathlib import Path
          from urllib.parse import urlencode
          from urllib.request import Request, urlopen
          import csv, datetime, hashlib, json, os, re, subprocess, time, traceback

          STAGE = "ACIRM_R13MPAG_FERMI_WEEKLY_PRODUCT_AVAILABILITY_WIDE_LAG_NO_SCORE"
          BASE = Path(os.environ.get("GITHUB_WORKSPACE", "/tmp/acirm_r13mpag"))
          OUT = BASE / (STAGE + "_OUTPUT")
          OUT.mkdir(parents=True, exist_ok=True)

          LOCKED = {
              "stage": STAGE,
              "previous_stage": "ACIRM_R13MPAF_R1_WIDE_10000D_LAG_HIGH_ENERGY_DRIVER_PREFLIGHT_NO_SCORE",
              "purpose": "Product-availability bridge before photon counting. Query HEASARC/Xamin FERMILWEEK metadata/products for the prelocked +/-10000 day operational windows, without downloading photon FITS files and without scoring.",
              "locked_gate": "R9C is accepted as the locked ACIRM gate for this branch; this stage does not re-test R9C.",
              "r9c_time_utc": "2022-05-18T20:40:57.672000+00:00",
              "source": "Cyg X-1",
              "cygx1_ra_deg": 299.590315,
              "cygx1_dec_deg": 35.201606,
              "operational_horizon_days": 10000,
              "operational_horizon_policy": "+/-10000 days is an operational search/audit boundary only, not a theoretical ceiling or falsification rule.",
              "xamin_query_url": "https://heasarc.gsfc.nasa.gov/xamin/query",
              "fermilweek_table": "fermilweek",
              "lat_data_server_url": "https://fermi.gsfc.nasa.gov/cgi-bin/ssc/LAT/LATDataQuery.cgi",
              "fermi_weekly_photon_dir": "https://heasarc.gsfc.nasa.gov/FTP/fermi/data/lat/weekly/photon/",
              "fermi_weekly_spacecraft_dir": "https://heasarc.gsfc.nasa.gov/FTP/fermi/data/lat/weekly/spacecraft/",
              "fermi_data_start_utc_operational": "2008-08-04T15:43:36+00:00",
              "data_end_policy": "Use workflow run time minus 30 days as a conservative public-data availability guard for preflight; not a science cut.",
              "lag_bins_seconds_abs": [
                  [0, 3600, "0_1h"],
                  [3600, 21600, "1_6h"],
                  [21600, 86400, "6_24h"],
                  [86400, 604800, "1_7d"],
                  [604800, 2592000, "7_30d"],
                  [2592000, 8640000, "30_100d"],
                  [8640000, 25920000, "100_300d"],
                  [25920000, 86400000, "300_1000d"],
                  [86400000, 259200000, "1000_3000d"],
                  [259200000, 864000000, "3000_10000d"]
              ],
              "energy_bands_for_next_stage_mev": [
                  {"band": "GeV_1_10", "emin_mev": 1000, "emax_mev": 10000},
                  {"band": "GeV_10_100", "emin_mev": 10000, "emax_mev": 100000},
                  {"band": "GeV_100_1000", "emin_mev": 100000, "emax_mev": 1000000},
                  {"band": "GeV_1_1000_combined", "emin_mev": 1000, "emax_mev": 1000000}
              ],
              "claim_ceiling": "weekly product availability / query readiness only; no photon extraction, no counts, no score, no detection/evidence/proof/discovery claim"
          }

          def log(msg):
              print(str(msg), flush=True)
              with (OUT / "R13MPAG_PROGRESS.log").open("a", encoding="utf-8") as f:
                  f.write(str(msg) + "\n")

          def write_json(name, obj):
              (OUT / name).write_text(json.dumps(obj, indent=2, ensure_ascii=False), encoding="utf-8")

          def write_csv(name, rows, cols):
              with (OUT / name).open("w", newline="", encoding="utf-8") as f:
                  w = csv.DictWriter(f, fieldnames=cols)
                  w.writeheader()
                  for r in rows:
                      w.writerow({c: r.get(c, "") for c in cols})

          def sha256_file(path):
              h = hashlib.sha256()
              with open(path, "rb") as f:
                  for b in iter(lambda: f.read(1024 * 1024), b""):
                      h.update(b)
              return h.hexdigest()

          def final_decision(decision, next_stage, extra=None):
              obj = {
                  "stage": STAGE,
                  "decision": decision,
                  "next_stage": next_stage,
                  "claim_ceiling": LOCKED["claim_ceiling"],
                  "timestamp_utc": datetime.datetime.now(datetime.UTC).isoformat()
              }
              if extra:
                  obj.update(extra)
              write_json("R13MPAG_FINAL_DECISION.json", obj)
              log("FINAL_DECISION: " + decision)
              return obj

          def parse_utc(text):
              return datetime.datetime.fromisoformat(str(text).replace("Z", "+00:00")).astimezone(datetime.UTC)

          def iso(dt):
              return dt.astimezone(datetime.UTC).isoformat().replace("+00:00", "Z")

          def run_cmd(cmd, timeout=90):
              try:
                  p = subprocess.run(cmd, stdout=subprocess.PIPE, stderr=subprocess.STDOUT, text=True, timeout=timeout)
                  return p.returncode, p.stdout
              except Exception as e:
                  return 999, repr(e)

          def http_get_text(url, timeout=120):
              req = Request(url, headers={"User-Agent": "ACIRM-R13MPAG/1.0"})
              with urlopen(req, timeout=timeout) as r:
                  return r.read().decode("utf-8", errors="replace")

          def probe_url(url, label):
              rows = []
              commands = [
                  ("curl_head", "curl -L -I --connect-timeout 20 --max-time 60 --retry 1 --retry-all-errors " + repr(url)),
                  ("curl_range", "curl -L --fail --connect-timeout 20 --max-time 60 --retry 1 --retry-all-errors -r 0-0 -o /tmp/acirm_r13mpag_probe.bin " + repr(url))
              ]
              for method, shell in commands:
                  code, out = run_cmd(["bash", "-lc", shell], timeout=90)
                  rows.append({"label": label, "url": url, "method": method, "ok": code == 0, "exit_code": code, "log_tail": out[-1200:]})
              return rows

          def lag_class(label):
              if label in ["0_1h", "1_6h", "6_24h", "1_7d", "7_30d"]:
                  return "short_lag"
              if label in ["30_100d", "100_300d"]:
                  return "medium_lag"
              if label == "300_1000d":
                  return "long_lag"
              if label in ["1000_3000d", "3000_10000d"]:
                  return "ultra_long_lag"
              return "unknown_lag"

          def build_windows():
              t0 = parse_utc(LOCKED["r9c_time_utc"])
              data_start = parse_utc(LOCKED["fermi_data_start_utc_operational"])
              data_end_guard = datetime.datetime.now(datetime.UTC) - datetime.timedelta(days=30)
              rows = []
              for direction in ["post", "pre"]:
                  for start_abs, end_abs, label in LOCKED["lag_bins_seconds_abs"]:
                      if direction == "post":
                          planned_start = t0 + datetime.timedelta(seconds=float(start_abs))
                          planned_end = t0 + datetime.timedelta(seconds=float(end_abs))
                          role = "post_driver_search"
                          signed_start_days = start_abs / 86400.0
                          signed_end_days = end_abs / 86400.0
                      else:
                          planned_start = t0 - datetime.timedelta(seconds=float(end_abs))
                          planned_end = t0 - datetime.timedelta(seconds=float(start_abs))
                          role = "pre_control_search"
                          signed_start_days = -end_abs / 86400.0
                          signed_end_days = -start_abs / 86400.0
                      clipped_start = max(planned_start, data_start)
                      clipped_end = min(planned_end, data_end_guard)
                      available = clipped_start < clipped_end
                      status = "AVAILABLE" if available else "OUTSIDE_AVAILABLE_DATA_RANGE"
                      if available and clipped_start > planned_start:
                          status = "PARTIAL_CLIPPED_BY_DATA_START"
                      if available and clipped_end < planned_end:
                          status = "PARTIAL_CLIPPED_BY_DATA_END_GUARD" if status == "AVAILABLE" else status + "_AND_DATA_END_GUARD"
                      rows.append({
                          "window_id": ("P" if direction == "post" else "C") + "_" + label,
                          "direction": direction,
                          "role": role,
                          "lag_label": label,
                          "lag_class": lag_class(label),
                          "signed_start_days_from_R9C": signed_start_days,
                          "signed_end_days_from_R9C": signed_end_days,
                          "planned_start_utc": iso(planned_start),
                          "planned_end_utc": iso(planned_end),
                          "clipped_start_utc": iso(clipped_start) if available else "",
                          "clipped_end_utc": iso(clipped_end) if available else "",
                          "available_duration_s": (clipped_end - clipped_start).total_seconds() if available else 0.0,
                          "availability_status": status,
                          "non_detection_interpretation": "not_detected_within_operational_search_horizon_not_theory_failure"
                      })
              return rows

          def xamin_query_for_window(w):
              # Query only metadata/products. No photon FITS download.
              if w["availability_status"] == "OUTSIDE_AVAILABLE_DATA_RANGE":
                  return "", "SKIPPED_OUTSIDE_AVAILABLE_DATA_RANGE", ""
              time_range = w["clipped_start_utc"].replace("Z", "") + ".." + w["clipped_end_utc"].replace("Z", "")
              params = {
                  "table": LOCKED["fermilweek_table"],
                  "format": "stream",
                  "fields": "All",
                  "products": "true",
                  "time": time_range,
                  "resultmax": "10000",
                  "messages": "none"
              }
              url = LOCKED["xamin_query_url"] + "?" + urlencode(params)
              try:
                  text = http_get_text(url, timeout=160)
                  return text, "OK", url
              except Exception as e:
                  return "", "ERROR:" + repr(e)[:300], url

          def parse_stream_table(text):
              lines = [ln for ln in text.splitlines() if ln.strip()]
              pipe_lines = [ln for ln in lines if "|" in ln]
              if not pipe_lines:
                  return [], []
              header = [x.strip() for x in pipe_lines[0].split("|")]
              rows = []
              for ln in pipe_lines[1:]:
                  parts = [x.strip() for x in ln.split("|")]
                  if len(parts) < 2:
                      continue
                  while len(parts) < len(header):
                      parts.append("")
                  row = {header[i]: parts[i] for i in range(min(len(header), len(parts)))}
                  rows.append(row)
              return header, rows

          def find_urls_in_row(row):
              vals = list(row.values())
              text = " ".join(str(v) for v in vals)
              urls = re.findall(r"https?://[^\s|<>\"']+", text)
              rels = re.findall(r"/FTP/fermi/[^\s|<>\"']+", text)
              urls += ["https://heasarc.gsfc.nasa.gov" + r for r in rels]
              for token in re.findall(r"lat_[A-Za-z0-9_\.\-]+\.fits(?:\.gz)?", text):
                  if "photon" in token.lower():
                      urls.append(LOCKED["fermi_weekly_photon_dir"] + token)
                  elif "spacecraft" in token.lower() or "space" in token.lower() or "sc" in token.lower():
                      urls.append(LOCKED["fermi_weekly_spacecraft_dir"] + token)
              out = []
              seen = set()
              for u in urls:
                  u = u.strip().rstrip(",;)")
                  if u not in seen:
                      seen.add(u); out.append(u)
              return out

          write_json("R13MPAG_LOCKED_CONTEXT.json", LOCKED)
          log("R13MPAG started. Querying FERMILWEEK metadata/products only; no photon download and no score.")

          try:
              windows = build_windows()
              write_csv("R13MPAG_WIDE_LAG_WINDOWS_REUSED.csv", windows, [
                  "window_id", "direction", "role", "lag_label", "lag_class", "signed_start_days_from_R9C", "signed_end_days_from_R9C",
                  "planned_start_utc", "planned_end_utc", "clipped_start_utc", "clipped_end_utc", "available_duration_s", "availability_status", "non_detection_interpretation"
              ])

              endpoint_rows = []
              endpoint_rows += probe_url(LOCKED["xamin_query_url"], "xamin_query")
              endpoint_rows += probe_url(LOCKED["fermi_weekly_photon_dir"], "weekly_photon_dir")
              endpoint_rows += probe_url(LOCKED["lat_data_server_url"], "lat_data_server")
              write_csv("R13MPAG_ENDPOINT_PREFLIGHT.csv", endpoint_rows, ["label", "url", "method", "ok", "exit_code", "log_tail"])

              query_status_rows = []
              all_metadata_rows = []
              product_rows = []
              for w in windows:
                  text, status, url = xamin_query_for_window(w)
                  query_status_rows.append({
                      "window_id": w["window_id"], "lag_label": w["lag_label"], "direction": w["direction"],
                      "availability_status": w["availability_status"], "xamin_status": status, "query_url": url,
                      "response_chars": len(text), "response_head": text[:500].replace("\n", " ")
                  })
                  if status != "OK":
                      continue
                  header, rows = parse_stream_table(text)
                  for idx, r in enumerate(rows):
                      compact = {"window_id": w["window_id"], "lag_label": w["lag_label"], "direction": w["direction"], "row_index": idx}
                      compact["raw_row_json"] = json.dumps(r, ensure_ascii=False)
                      for key in ["time", "start_time", "stop_time", "name", "file", "photon", "spacecraft", "week", "mission_week"]:
                          for col, val in r.items():
                              if key.lower() in col.lower() and key not in compact:
                                  compact[key] = val
                      all_metadata_rows.append(compact)
                      urls = find_urls_in_row(r)
                      for u in urls:
                          lower = u.lower()
                          kind = "unknown"
                          if "photon" in lower or "_ph" in lower:
                              kind = "photon"
                          elif "spacecraft" in lower or "_sc" in lower:
                              kind = "spacecraft"
                          product_rows.append({
                              "window_id": w["window_id"], "lag_label": w["lag_label"], "direction": w["direction"],
                              "product_kind": kind, "url": u, "download_status": "NOT_DOWNLOADED_PRODUCT_AVAILABILITY_ONLY"
                          })

              write_csv("R13MPAG_XAMIN_QUERY_STATUS.csv", query_status_rows, ["window_id", "lag_label", "direction", "availability_status", "xamin_status", "query_url", "response_chars", "response_head"])
              write_csv("R13MPAG_FERMILWEEK_METADATA_ROWS_RAW_JSON.csv", all_metadata_rows, ["window_id", "lag_label", "direction", "row_index", "time", "start_time", "stop_time", "name", "file", "photon", "spacecraft", "week", "mission_week", "raw_row_json"])

              dedup = []
              seen = set()
              for r in product_rows:
                  key = (r["window_id"], r["url"])
                  if key in seen:
                      continue
                  seen.add(key); dedup.append(r)
              product_rows = dedup
              write_csv("R13MPAG_WEEKLY_PRODUCT_URLS_NOT_DOWNLOADED.csv", product_rows, ["window_id", "lag_label", "direction", "product_kind", "url", "download_status"])

              next_query_rows = []
              for w in windows:
                  if w["availability_status"] == "OUTSIDE_AVAILABLE_DATA_RANGE":
                      continue
                  for band in LOCKED["energy_bands_for_next_stage_mev"]:
                      next_query_rows.append({
                          "template_id": f"{w['window_id']}_{band['band']}",
                          "window_id": w["window_id"],
                          "direction": w["direction"],
                          "lag_label": w["lag_label"],
                          "lag_class": w["lag_class"],
                          "ra_deg": LOCKED["cygx1_ra_deg"],
                          "dec_deg": LOCKED["cygx1_dec_deg"],
                          "roi_deg": 5.0,
                          "start_utc": w["clipped_start_utc"],
                          "end_utc": w["clipped_end_utc"],
                          "emin_mev": band["emin_mev"],
                          "emax_mev": band["emax_mev"],
                          "energy_band": band["band"],
                          "preferred_data_route": "LAT_DATA_SERVER_EXACT_ROI_TIME_ENERGY_QUERY_OR_SELECTED_WEEKLY_FILE_DOWNLOAD_AFTER_MANUAL_APPROVAL",
                          "submit_status": "NOT_SUBMITTED_NO_SCORE"
                      })
              write_csv("R13MPAG_NEXT_STAGE_EXACT_ROI_TIME_ENERGY_QUERY_PLAN.csv", next_query_rows, [
                  "template_id", "window_id", "direction", "lag_label", "lag_class", "ra_deg", "dec_deg", "roi_deg", "start_utc", "end_utc",
                  "emin_mev", "emax_mev", "energy_band", "preferred_data_route", "submit_status"
              ])

              n_endpoint_ok = sum(1 for r in endpoint_rows if r.get("ok"))
              n_xamin_ok = sum(1 for r in query_status_rows if r.get("xamin_status") == "OK")
              n_available_windows = sum(1 for w in windows if w["availability_status"] != "OUTSIDE_AVAILABLE_DATA_RANGE")
              n_photon_products = sum(1 for r in product_rows if r["product_kind"] == "photon")
              n_spacecraft_products = sum(1 for r in product_rows if r["product_kind"] == "spacecraft")
              summary = {
                  "available_windows": n_available_windows,
                  "xamin_query_ok_windows": n_xamin_ok,
                  "metadata_rows_returned": len(all_metadata_rows),
                  "product_urls_total": len(product_rows),
                  "photon_product_urls": n_photon_products,
                  "spacecraft_product_urls": n_spacecraft_products,
                  "next_stage_exact_query_templates": len(next_query_rows),
                  "endpoint_ok_count": n_endpoint_ok,
                  "claim_ceiling": LOCKED["claim_ceiling"],
                  "non_detection_interpretation": "This stage has no non-detection meaning because it does not read photons. +/-10000 days remains operational only, not theory ceiling."
              }
              write_json("R13MPAG_PRODUCT_AVAILABILITY_SUMMARY.json", summary)

              if n_endpoint_ok == 0:
                  decision = "TECHNICAL_STOP_HIGH_ENERGY_ENDPOINTS_UNREACHABLE_NO_SCORE"
                  next_stage = "RERUN_WHEN_NETWORK_AVAILABLE"
              elif n_xamin_ok == 0:
                  decision = "FERMILWEEK_XAMIN_PRODUCT_QUERY_FAILED_NO_SCORE"
                  next_stage = "USE_LAT_DATA_SERVER_EXACT_QUERY_TEMPLATES_OR_REPAIR_XAMIN_PARAMETERS"
              elif len(all_metadata_rows) > 0:
                  decision = "FERMILWEEK_PRODUCT_AVAILABILITY_READY_FOR_SELECTED_PHOTON_DOWNLOAD_OR_LAT_DATA_SERVER_QUERY_NO_SCORE"
                  next_stage = "ACIRM_R13MPAH_SELECTED_FERMI_LAT_PHOTON_COUNT_SMOKE_TEST_NO_LIKELIHOOD_NO_SCORE"
              else:
                  decision = "FERMILWEEK_QUERIES_OK_BUT_NO_METADATA_ROWS_RETURNED_NO_SCORE"
                  next_stage = "REPAIR_TIME_QUERY_FORMAT_OR_USE_LAT_DATA_SERVER_EXACT_QUERY_TEMPLATES"
              final_decision(decision, next_stage, {"summary": summary})
          except Exception as e:
              (OUT / "R13MPAG_EXCEPTION_TRACEBACK.txt").write_text(traceback.format_exc(), encoding="utf-8")
              final_decision("TECHNICAL_STOP_EXCEPTION_DURING_R13MPAG", "REPAIR_FROM_TRACEBACK", {"error": repr(e)[:500]})
          PYCODE
          python3 "$GITHUB_WORKSPACE/r13mpag_controller.py" > "$OUT/R13MPAG_CONTROLLER_STDOUT.txt" 2> "$OUT/R13MPAG_CONTROLLER_STDERR.txt"
          CODE=$?
          echo "controller_exit_code=$CODE" > "$OUT/R13MPAG_STEP_STATUS.log"
          if [ ! -f "$OUT/R13MPAG_FINAL_DECISION.json" ]; then
            cat > "$OUT/R13MPAG_FINAL_DECISION.json" <<'JSON'
          {
            "stage": "ACIRM_R13MPAG_FERMI_WEEKLY_PRODUCT_AVAILABILITY_WIDE_LAG_NO_SCORE",
            "decision": "CONTROLLER_FAILED_BEFORE_FINAL_DECISION",
            "next_stage": "REPAIR_FROM_STDOUT_STDERR",
            "claim_ceiling": "no reliable result"
          }
          JSON
          fi
          cd "$GITHUB_WORKSPACE"
          ZIP="$GITHUB_WORKSPACE/${STAGE}_RESULTS.zip"
          SHA="$ZIP.sha256.txt"
          rm -f "$ZIP" "$SHA"
          zip -r "$ZIP" "$(basename "$OUT")"
          sha256sum "$ZIP" > "$SHA"
          exit 0

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ACIRM_R13MPAG_FERMI_WEEKLY_PRODUCT_AVAILABILITY_WIDE_LAG_NO_SCORE_RESULTS
          path: |
            ACIRM_R13MPAG_FERMI_WEEKLY_PRODUCT_AVAILABILITY_WIDE_LAG_NO_SCORE_RESULTS.zip
            ACIRM_R13MPAG_FERMI_WEEKLY_PRODUCT_AVAILABILITY_WIDE_LAG_NO_SCORE_RESULTS.zip.sha256.txt
          retention-days: 7
