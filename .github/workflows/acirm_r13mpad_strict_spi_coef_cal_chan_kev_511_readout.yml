name: ACIRM R13MPAD strict SPI COEF CAL CHAN KEV 511 readout

on:
  workflow_dispatch:

jobs:
  r13mpad-strict-coef-cal-readout:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: R13MPAD strict SPI COEF CAL CHAN_KEV readout
        shell: bash
        run: |
          set +e
          STAGE="ACIRM_R13MPAD_STRICT_SPI_COEF_CAL_CHAN_KEV_511_READOUT"
          OUT="$GITHUB_WORKSPACE/${STAGE}_OUTPUT"
          DATA="$GITHUB_WORKSPACE/${STAGE}_DATA"
          mkdir -p "$OUT" "$DATA"
          python3 -m pip install --user --no-cache-dir --upgrade numpy astropy > "$OUT/R13MPAD_PIP_INSTALL.log" 2>&1
          cat > "$GITHUB_WORKSPACE/r13mpad_controller.py" <<'PYCODE'
          from pathlib import Path
          from urllib.request import Request, urlopen
          import csv, datetime, hashlib, json, math, os, shutil, subprocess, sys, traceback
          import numpy as np
          from astropy.io import fits

          STAGE = "ACIRM_R13MPAD_STRICT_SPI_COEF_CAL_CHAN_KEV_511_READOUT"
          BASE = Path(os.environ.get("GITHUB_WORKSPACE", "/tmp/acirm_r13mpad"))
          OUT = BASE / (STAGE + "_OUTPUT")
          DATA = BASE / (STAGE + "_DATA")
          OUT.mkdir(parents=True, exist_ok=True)
          DATA.mkdir(parents=True, exist_ok=True)

          LOCKED = {
              "stage": STAGE,
              "purpose": "Strict repair after R13MPAC: ignore SPI.-GAIN-CFG and all flag-like columns. Use only SPI.-COEF-CAL rows with CHAN_KEV/KEV_CHAN, DET_ID, E_RANGE, OBT_START/OBT_END to map 16384 COUNTS channels to keV and read 511 only if mapping is safe.",
              "locked_scw_ids": ["250400090010", "250400020010", "250400080010", "250400030010", "250400070021", "250400040010", "250400060010", "250400050010"],
              "heasarc_scw_base": "https://heasarc.gsfc.nasa.gov/FTP/integral/data/scw/2504",
              "heasarc_ic_spi_cal_base": "https://heasarc.gsfc.nasa.gov/FTP/integral/data/ic/spi/cal",
              "target_public_file": "spi_spectra.fits.gz",
              "accepted_cal_hdu": "SPI.-COEF-CAL",
              "required_columns": ["DET_ID", "E_RANGE", "OBT_START", "OBT_END", "CHAN_KEV", "KEV_CHAN"],
              "locked_line_keV": [508.0, 514.0],
              "locked_lower_sideband_keV": [490.0, 500.0],
              "locked_upper_sideband_keV": [522.0, 532.0],
              "minimum_candidate_ratio": 1.2,
              "claim_ceiling": "strict SPI.-COEF-CAL / CHAN_KEV diagnostic only; no evidence/proof/discovery claim",
              "artifact_policy": "Do not include downloaded FITS or IC data in final artifact. Keep CSV, JSON, logs only."
          }
          LINE = tuple(LOCKED["locked_line_keV"])
          LOWER = tuple(LOCKED["locked_lower_sideband_keV"])
          UPPER = tuple(LOCKED["locked_upper_sideband_keV"])
          MIN_RATIO = float(LOCKED["minimum_candidate_ratio"])

          def log(msg):
              print(str(msg), flush=True)
              with (OUT / "R13MPAD_PROGRESS.log").open("a", encoding="utf-8") as f:
                  f.write(str(msg) + "\n")

          def write_json(name, obj):
              (OUT / name).write_text(json.dumps(obj, indent=2, ensure_ascii=False), encoding="utf-8")

          def write_csv(name, rows, cols):
              with (OUT / name).open("w", newline="", encoding="utf-8") as f:
                  w = csv.DictWriter(f, fieldnames=cols)
                  w.writeheader()
                  for r in rows:
                      w.writerow({c: r.get(c, "") for c in cols})

          def sha256_file(path):
              h = hashlib.sha256()
              with open(path, "rb") as f:
                  for b in iter(lambda: f.read(1024 * 1024), b""):
                      h.update(b)
              return h.hexdigest()

          def final_decision(decision, next_stage, extra=None):
              obj = {
                  "stage": STAGE,
                  "decision": decision,
                  "next_stage": next_stage,
                  "claim_ceiling": LOCKED["claim_ceiling"],
                  "timestamp_utc": datetime.datetime.utcnow().isoformat() + "Z"
              }
              if extra:
                  obj.update(extra)
              write_json("R13MPAD_FINAL_DECISION.json", obj)
              log("FINAL_DECISION: " + decision)
              return obj

          def url_probe(url, timeout=30):
              last = ""
              for method in ["HEAD", "GET"]:
                  try:
                      headers = {"User-Agent": "ACIRM-R13MPAD/1.0"}
                      if method == "GET":
                          headers["Range"] = "bytes=0-0"
                      req = Request(url, headers=headers, method=method)
                      with urlopen(req, timeout=timeout) as r:
                          cl = r.headers.get("Content-Length") or r.headers.get("Content-length")
                          return {"ok": True, "status": getattr(r, "status", ""), "content_length": int(cl) if str(cl).isdigit() else None, "final_url": r.geturl(), "error": ""}
                  except Exception as e:
                      last = repr(e)[:350]
              return {"ok": False, "status": "", "content_length": None, "final_url": "", "error": last}

          def download_url(url, dest, timeout=1800):
              dest.parent.mkdir(parents=True, exist_ok=True)
              tmp = dest.with_suffix(dest.suffix + ".part")
              if tmp.exists():
                  tmp.unlink()
              req = Request(url, headers={"User-Agent": "ACIRM-R13MPAD/1.0"})
              with urlopen(req, timeout=timeout) as r, open(tmp, "wb") as f:
                  shutil.copyfileobj(r, f, length=1024 * 1024)
              tmp.rename(dest)
              return dest

          def col_array(data, col):
              try:
                  arr = np.asarray(data[col])
                  if arr.size == 0:
                      return None
                  if not np.issubdtype(arr.dtype, np.number):
                      arr = arr.astype(float)
                  return np.asarray(arr, dtype=float)
              except Exception:
                  return None

          def edge_indices(emin, emax, window):
              return np.where((emax > window[0]) & (emin < window[1]))[0]

          def scalar_or_first(x):
              arr = np.asarray(x, dtype=float).ravel()
              arr = arr[np.isfinite(arr)]
              return float(arr[0]) if arr.size else None

          def decode_chan_kev_to_edges(chan_kev_value, nchan=16384):
              """Return (emin, emax, method, notes) or (None,None,reason,notes).
              Accepted forms:
              - direct edges length nchan+1
              - direct centers length nchan
              - polynomial coefficients length 2..6, interpreted as E_keV = c0 + c1*ch + c2*ch^2...
              The mapping must be finite, monotonic, plausible, and bracket all locked windows.
              """
              arr = np.asarray(chan_kev_value, dtype=float)
              flat = arr.ravel()
              flat = flat[np.isfinite(flat)]
              if flat.size == 0:
                  return None, None, "empty_CHAN_KEV", ""

              def validate_edges(edges, method):
                  edges = np.asarray(edges, dtype=float).ravel()
                  if edges.size != nchan + 1:
                      return None, None, "bad_edge_length", method
                  if not np.all(np.isfinite(edges)):
                      return None, None, "nonfinite_edges", method
                  dif = np.diff(edges)
                  if np.all(dif > 0):
                      emin, emax = edges[:-1], edges[1:]
                  elif np.all(dif < 0):
                      emin, emax = edges[1:], edges[:-1]
                  else:
                      return None, None, "nonmonotonic_edges", method
                  if np.nanmin(emin) > 100.0 or np.nanmax(emax) < 1000.0:
                      return None, None, "does_not_cover_SPI_gamma_range", method
                  if np.nanmin(emin) < -100.0 or np.nanmax(emax) > 20000.0:
                      return None, None, "implausible_energy_range", method
                  widths = emax - emin
                  medw = float(np.nanmedian(widths))
                  if medw <= 0 or medw > 5.0:
                      return None, None, "implausible_channel_width", method
                  if len(edge_indices(emin, emax, LOWER)) == 0 or len(edge_indices(emin, emax, LINE)) == 0 or len(edge_indices(emin, emax, UPPER)) == 0:
                      return None, None, "locked_windows_not_bracketed", method
                  return emin, emax, "ok", method

              if flat.size == nchan + 1:
                  return validate_edges(flat, "CHAN_KEV_DIRECT_EDGES")
              if flat.size == nchan:
                  centers = flat
                  mids = 0.5 * (centers[:-1] + centers[1:])
                  first = centers[0] - (mids[0] - centers[0])
                  last = centers[-1] + (centers[-1] - mids[-1])
                  edges = np.concatenate([[first], mids, [last]])
                  return validate_edges(edges, "CHAN_KEV_DIRECT_CENTERS")
              if 2 <= flat.size <= 6:
                  ch_edges = np.arange(nchan + 1, dtype=float)
                  edges = np.zeros_like(ch_edges)
                  for power, coef in enumerate(flat):
                      edges += coef * np.power(ch_edges, power)
                  return validate_edges(edges, "CHAN_KEV_POLYNOMIAL_COEFFS_LEN_%d" % flat.size)
              return None, None, "unsupported_CHAN_KEV_shape_%s" % str(arr.shape), ""

          def time_overlap_score(spec_start, spec_end, cal_start, cal_end):
              try:
                  ss = scalar_or_first(spec_start); se = scalar_or_first(spec_end)
                  cs = scalar_or_first(cal_start); ce = scalar_or_first(cal_end)
                  if ss is None or se is None or cs is None or ce is None:
                      return 0.0, False
                  mid = 0.5 * (ss + se)
                  inside = (cs <= mid <= ce) or (cs <= ss <= ce) or (cs <= se <= ce)
                  overlap = max(0.0, min(se, ce) - max(ss, cs))
                  return float(overlap), bool(inside or overlap > 0)
              except Exception:
                  return 0.0, False

          write_json("R13MPAD_LOCKED_CONTEXT.json", LOCKED)

          spectra_rows = []
          spectra_records = []
          for scw in LOCKED["locked_scw_ids"]:
              url = f"{LOCKED['heasarc_scw_base']}/{scw}.001/{LOCKED['target_public_file']}"
              probe = url_probe(url)
              row = {"scw_id": scw, "url": url, **probe, "download_ok": False, "path": "", "size_bytes": "", "sha256": ""}
              if probe["ok"]:
                  dest = DATA / "spectra" / scw / LOCKED["target_public_file"]
                  try:
                      log("Downloading spectra " + scw)
                      download_url(url, dest)
                      row.update({"download_ok": True, "path": str(dest), "size_bytes": dest.stat().st_size, "sha256": sha256_file(dest)})
                      with fits.open(dest, memmap=False) as hdul:
                          for hdu_i, hdu in enumerate(hdul):
                              data = getattr(hdu, "data", None)
                              cols = []
                              if hasattr(hdu, "columns") and hdu.columns is not None:
                                  try:
                                      cols = list(hdu.columns.names)
                                  except Exception:
                                      cols = []
                              upper = {str(c).upper(): c for c in cols}
                              if data is None or "COUNTS" not in upper:
                                  continue
                              counts = col_array(data, upper["COUNTS"])
                              if counts is None or counts.shape[-1] != 16384:
                                  continue
                              det = col_array(data, upper["DET_ID"]) if "DET_ID" in upper else None
                              erange = col_array(data, upper["E_RANGE"]) if "E_RANGE" in upper else None
                              lobt_s = col_array(data, upper["LOBT_START"]) if "LOBT_START" in upper else None
                              lobt_e = col_array(data, upper["LOBT_END"]) if "LOBT_END" in upper else None
                              for ridx in range(counts.shape[0] if counts.ndim >= 2 else 1):
                                  spectrum = counts[ridx] if counts.ndim >= 2 else counts
                                  spectra_records.append({
                                      "scw_id": scw, "file": str(dest), "hdu_index": hdu_i, "hdu_name": getattr(hdu, "name", ""),
                                      "row_index": ridx, "counts": spectrum,
                                      "det_id": int(det.ravel()[ridx]) if det is not None and ridx < det.size and np.isfinite(det.ravel()[ridx]) else None,
                                      "e_range": int(erange.ravel()[ridx]) if erange is not None and ridx < erange.size and np.isfinite(erange.ravel()[ridx]) else None,
                                      "lobt_start": scalar_or_first(lobt_s[ridx] if lobt_s is not None and getattr(lobt_s, 'shape', [0])[0] > ridx else None),
                                      "lobt_end": scalar_or_first(lobt_e[ridx] if lobt_e is not None and getattr(lobt_e, 'shape', [0])[0] > ridx else None)
                                  })
                  except Exception as e:
                      row["error"] = "download_or_parse_exception_" + repr(e)[:300]
              spectra_rows.append(row)
          write_csv("R13MPAD_SPI_SPECTRA_DOWNLOADS.csv", spectra_rows, ["scw_id", "url", "ok", "status", "content_length", "final_url", "error", "download_ok", "path", "size_bytes", "sha256"])

          cal_download_rows = []
          cal_files = []
          for i in range(1, 80):
              fname = f"spi_coef_cal_{i:04d}.fits"
              url = f"{LOCKED['heasarc_ic_spi_cal_base']}/{fname}"
              probe = url_probe(url)
              row = {"filename": fname, "url": url, **probe, "download_ok": False, "path": "", "size_bytes": "", "sha256": ""}
              if probe["ok"]:
                  dest = DATA / "cal" / fname
                  try:
                      log("Downloading calibration " + fname)
                      download_url(url, dest)
                      row.update({"download_ok": True, "path": str(dest), "size_bytes": dest.stat().st_size, "sha256": sha256_file(dest)})
                      cal_files.append(dest)
                  except Exception as e:
                      row["error"] = "download_exception_" + repr(e)[:300]
              cal_download_rows.append(row)
          write_csv("R13MPAD_SPI_COEF_CAL_DOWNLOADS.csv", cal_download_rows, ["filename", "url", "ok", "status", "content_length", "final_url", "error", "download_ok", "path", "size_bytes", "sha256"])

          cal_schema_rows = []
          cal_records = []
          errors = []
          for pth in cal_files:
              try:
                  with fits.open(pth, memmap=False) as hdul:
                      for hdu_i, hdu in enumerate(hdul):
                          hname = str(getattr(hdu, "name", ""))
                          data = getattr(hdu, "data", None)
                          cols = []
                          if hasattr(hdu, "columns") and hdu.columns is not None:
                              try:
                                  cols = list(hdu.columns.names)
                              except Exception:
                                  cols = []
                          cal_schema_rows.append({"file": str(pth), "filename": pth.name, "hdu_index": hdu_i, "hdu_name": hname, "columns": "|".join(cols), "n_columns": len(cols), "data_shape": str(getattr(data, "shape", ""))})
                          if data is None or hname.upper() != LOCKED["accepted_cal_hdu"]:
                              continue
                          upper = {str(c).upper(): c for c in cols}
                          if not all(c in upper for c in LOCKED["required_columns"]):
                              continue
                          det = col_array(data, upper["DET_ID"])
                          erange = col_array(data, upper["E_RANGE"])
                          obt_s = col_array(data, upper["OBT_START"])
                          obt_e = col_array(data, upper["OBT_END"])
                          ontime = col_array(data, upper["ONTIME"])
                          chan_kev = col_array(data, upper["CHAN_KEV"])
                          kev_chan = col_array(data, upper["KEV_CHAN"])
                          nrows = len(data)
                          for ridx in range(nrows):
                              ck = chan_kev[ridx] if chan_kev is not None and chan_kev.shape[0] > ridx else None
                              emin, emax, status, method = decode_chan_kev_to_edges(ck, 16384)
                              cal_records.append({
                                  "file": str(pth), "filename": pth.name, "hdu_index": hdu_i, "hdu_name": hname, "row_index": ridx,
                                  "det_id": int(det.ravel()[ridx]) if det is not None and ridx < det.size and np.isfinite(det.ravel()[ridx]) else None,
                                  "e_range": int(erange.ravel()[ridx]) if erange is not None and ridx < erange.size and np.isfinite(erange.ravel()[ridx]) else None,
                                  "obt_start": scalar_or_first(obt_s[ridx] if obt_s is not None and getattr(obt_s, 'shape', [0])[0] > ridx else None),
                                  "obt_end": scalar_or_first(obt_e[ridx] if obt_e is not None and getattr(obt_e, 'shape', [0])[0] > ridx else None),
                                  "ontime": scalar_or_first(ontime[ridx] if ontime is not None and getattr(ontime, 'shape', [0])[0] > ridx else None),
                                  "chan_kev_shape": str(np.asarray(ck).shape), "kev_chan_shape": str(np.asarray(kev_chan[ridx]).shape) if kev_chan is not None and kev_chan.shape[0] > ridx else "",
                                  "mapping_status": status, "mapping_method": method, "emin": emin, "emax": emax
                              })
              except Exception as e:
                  errors.append({"stage": "cal_parse", "file": str(pth), "error": repr(e)[:500]})
          write_csv("R13MPAD_STRICT_COEF_CAL_SCHEMA.csv", cal_schema_rows, ["file", "filename", "hdu_index", "hdu_name", "columns", "n_columns", "data_shape"])
          cal_audit_rows = []
          for r in cal_records:
              cal_audit_rows.append({k: r.get(k, "") for k in ["file", "filename", "hdu_index", "hdu_name", "row_index", "det_id", "e_range", "obt_start", "obt_end", "ontime", "chan_kev_shape", "kev_chan_shape", "mapping_status", "mapping_method"]})
          write_csv("R13MPAD_STRICT_COEF_CAL_MAPPING_AUDIT.csv", cal_audit_rows, ["file", "filename", "hdu_index", "hdu_name", "row_index", "det_id", "e_range", "obt_start", "obt_end", "ontime", "chan_kev_shape", "kev_chan_shape", "mapping_status", "mapping_method"])

          readout_rows = []
          match_audit_rows = []
          usable_cals = [r for r in cal_records if r["mapping_status"] == "ok" and r["emin"] is not None and r["emax"] is not None]
          for s in spectra_records:
              candidates = []
              for c in usable_cals:
                  if s["det_id"] is not None and c["det_id"] is not None and int(s["det_id"]) != int(c["det_id"]):
                      continue
                  if s["e_range"] is not None and c["e_range"] is not None and int(s["e_range"]) != int(c["e_range"]):
                      continue
                  overlap, inside = time_overlap_score(s["lobt_start"], s["lobt_end"], c["obt_start"], c["obt_end"])
                  score = (1000 if inside else 0) + overlap
                  candidates.append((score, inside, overlap, c))
              candidates = sorted(candidates, key=lambda x: x[0], reverse=True)
              if not candidates or candidates[0][0] <= 0:
                  match_audit_rows.append({"scw_id": s["scw_id"], "row_index": s["row_index"], "det_id": s["det_id"], "e_range": s["e_range"], "matched": False, "reason": "no_time_overlapping_strict_SPI_COEF_CAL_match"})
                  continue
              score, inside, overlap, c = candidates[0]
              emin, emax = c["emin"], c["emax"]
              li = edge_indices(emin, emax, LINE)
              lo = edge_indices(emin, emax, LOWER)
              up = edge_indices(emin, emax, UPPER)
              if len(li) == 0 or len(lo) == 0 or len(up) == 0:
                  match_audit_rows.append({"scw_id": s["scw_id"], "row_index": s["row_index"], "det_id": s["det_id"], "e_range": s["e_range"], "matched": False, "reason": "matched_calibration_missing_locked_energy_bins"})
                  continue
              spec = np.asarray(s["counts"], dtype=float)
              lv = float(np.nansum(spec[li])); lov = float(np.nansum(spec[lo])); uv = float(np.nansum(spec[up]))
              side = 0.5 * (lov + uv)
              ratio = lv / side if side > 0 else None
              row = {
                  "scw_id": s["scw_id"], "spectra_file": Path(s["file"]).name, "spectra_hdu": s["hdu_name"], "spectra_row_index": s["row_index"],
                  "det_id": s["det_id"], "e_range": s["e_range"], "lobt_start": s["lobt_start"], "lobt_end": s["lobt_end"],
                  "cal_file": c["filename"], "cal_hdu": c["hdu_name"], "cal_row_index": c["row_index"], "cal_obt_start": c["obt_start"], "cal_obt_end": c["obt_end"],
                  "mapping_method": c["mapping_method"], "match_overlap": overlap, "match_inside": inside,
                  "line_bin_count": int(len(li)), "lower_bin_count": int(len(lo)), "upper_bin_count": int(len(up)),
                  "line_508_514_counts": lv, "lower_490_500_counts": lov, "upper_522_532_counts": uv, "sideband_mean": side,
                  "line_to_sideband_ratio": ratio, "candidate_ratio_ge_1p2": bool(ratio is not None and ratio >= MIN_RATIO),
                  "claim": "STRICT_SPI_COEF_CAL_CHAN_KEV_DIAGNOSTIC_ONLY"
              }
              readout_rows.append(row)
              match_audit_rows.append({"scw_id": s["scw_id"], "row_index": s["row_index"], "det_id": s["det_id"], "e_range": s["e_range"], "matched": True, "reason": "strict_time_overlapping_SPI_COEF_CAL_match", "cal_file": c["filename"], "mapping_method": c["mapping_method"], "overlap": overlap, "inside": inside})
          write_csv("R13MPAD_STRICT_COEF_CAL_MATCH_AUDIT.csv", match_audit_rows, ["scw_id", "row_index", "det_id", "e_range", "matched", "reason", "cal_file", "mapping_method", "overlap", "inside"])
          readout_cols = ["scw_id", "spectra_file", "spectra_hdu", "spectra_row_index", "det_id", "e_range", "lobt_start", "lobt_end", "cal_file", "cal_hdu", "cal_row_index", "cal_obt_start", "cal_obt_end", "mapping_method", "match_overlap", "match_inside", "line_bin_count", "lower_bin_count", "upper_bin_count", "line_508_514_counts", "lower_490_500_counts", "upper_522_532_counts", "sideband_mean", "line_to_sideband_ratio", "candidate_ratio_ge_1p2", "claim"]
          write_csv("R13MPAD_STRICT_COEF_CAL_511_READOUT.csv", readout_rows if readout_rows else [{"claim": "NO_STRICT_SPI_COEF_CAL_CHAN_KEV_READOUT"}], readout_cols)
          write_json("R13MPAD_ERRORS.json", {"errors_count": len(errors), "errors": errors[:200]})

          if readout_rows:
              line_sum = sum(float(r["line_508_514_counts"]) for r in readout_rows)
              lower_sum = sum(float(r["lower_490_500_counts"]) for r in readout_rows)
              upper_sum = sum(float(r["upper_522_532_counts"]) for r in readout_rows)
              side = 0.5 * (lower_sum + upper_sum)
              ratio = line_sum / side if side > 0 else None
              candidate = bool(ratio is not None and ratio >= MIN_RATIO)
          else:
              line_sum = lower_sum = upper_sum = side = ratio = None
              candidate = False
          summary = {
              "downloaded_spectra_files": len([r for r in spectra_rows if r.get("download_ok")]),
              "spectra_records": len(spectra_records),
              "downloaded_spi_coef_cal_files": len(cal_files),
              "strict_coef_cal_rows": len(cal_records),
              "usable_chan_kev_mappings": len(usable_cals),
              "strict_readout_rows": len(readout_rows),
              "line_508_514_sum": line_sum,
              "lower_490_500_sum": lower_sum,
              "upper_522_532_sum": upper_sum,
              "sideband_mean": side,
              "line_to_sideband_ratio": ratio,
              "minimum_candidate_ratio": MIN_RATIO,
              "candidate_ratio_ge_1p2": candidate,
              "errors_count": len(errors),
              "claim_ceiling": LOCKED["claim_ceiling"]
          }
          write_json("R13MPAD_STRICT_COEF_CAL_511_SUMMARY.json", summary)
          if candidate:
              decision = "STRICT_SPI_COEF_CAL_511_RATIO_CANDIDATE_DIAGNOSTIC_ONLY_REQUIRES_BACKGROUND_RESPONSE_AND_OSA_REPLICATION"
              next_stage = "RUN_BACKGROUND_RESPONSE_OFF_ENERGY_OFF_TIME_NULLS_AND_OFFICIAL_OSA_REPLICATION_BEFORE_ANY_CLAIM"
          elif readout_rows:
              decision = "STRICT_SPI_COEF_CAL_511_READOUT_COMPLETED_NO_RATIO_EXCESS"
              next_stage = "STOP_OR_OPTIONAL_OFF_ENERGY_BACKGROUND_CONTROLS_NO_DETECTION_CLAIM"
          elif usable_cals:
              decision = "STRICT_SPI_COEF_CAL_MAPPINGS_FOUND_BUT_NO_TIME_MATCHED_511_READOUT"
              next_stage = "AUDIT_LOBT_OBT_TIME_MATCH_OR_RUN_OFFICIAL_OSA_SPIBOUNDS_SPIHIST"
          else:
              decision = "STRICT_SPI_COEF_CAL_CHAN_KEV_MAPPING_NOT_USABLE_511_BLOCKED"
              next_stage = "OFFICIAL_OSA_SPIBOUNDS_SPIHIST_REQUIRED"
          final_decision(decision, next_stage, {"summary": summary})
          try:
              shutil.rmtree(DATA)
          except Exception:
              pass
          PYCODE
          python3 "$GITHUB_WORKSPACE/r13mpad_controller.py" > "$OUT/R13MPAD_CONTROLLER_STDOUT.txt" 2> "$OUT/R13MPAD_CONTROLLER_STDERR.txt"
          CODE=$?
          echo "controller_exit_code=$CODE" > "$OUT/R13MPAD_STEP_STATUS.log"
          if [ ! -f "$OUT/R13MPAD_FINAL_DECISION.json" ]; then
            cat > "$OUT/R13MPAD_FINAL_DECISION.json" <<'JSON'
          {
            "stage": "ACIRM_R13MPAD_STRICT_SPI_COEF_CAL_CHAN_KEV_511_READOUT",
            "decision": "CONTROLLER_FAILED_BEFORE_FINAL_DECISION",
            "next_stage": "REPAIR_FROM_STDOUT_STDERR",
            "claim_ceiling": "no reliable result"
          }
          JSON
          fi
          cd "$GITHUB_WORKSPACE"
          ZIP="$GITHUB_WORKSPACE/${STAGE}_RESULTS.zip"
          SHA="$ZIP.sha256.txt"
          rm -f "$ZIP" "$SHA"
          rm -rf "$GITHUB_WORKSPACE/${STAGE}_DATA"
          zip -r "$ZIP" "$(basename "$OUT")"
          sha256sum "$ZIP" > "$SHA"
          exit 0

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ACIRM_R13MPAD_STRICT_SPI_COEF_CAL_CHAN_KEV_511_READOUT_RESULTS
          path: |
            ACIRM_R13MPAD_STRICT_SPI_COEF_CAL_CHAN_KEV_511_READOUT_RESULTS.zip
            ACIRM_R13MPAD_STRICT_SPI_COEF_CAL_CHAN_KEV_511_READOUT_RESULTS.zip.sha256.txt
          retention-days: 7
