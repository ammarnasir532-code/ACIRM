name: ACIRM R13MPAB E_RANGE value audit public SPI spectra 511 gate

on:
  workflow_dispatch:

jobs:
  r13mpab-e-range-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: R13MPAB audit E_RANGE values and allow 511 only if keV mapping is explicit
        shell: bash
        run: |
          set +e
          STAGE="ACIRM_R13MPAB_E_RANGE_VALUE_AUDIT_PUBLIC_SPI_SPECTRA_511_GATE"
          OUT="$GITHUB_WORKSPACE/${STAGE}_OUTPUT"
          mkdir -p "$OUT"
          python3 -m pip install --user --no-cache-dir --upgrade numpy astropy > "$OUT/R13MPAB_PIP_INSTALL.log" 2>&1
          cat > "$GITHUB_WORKSPACE/r13mpab_controller.py" <<'PYCODE'
          # ACIRM_R13MPAB controller
          # Purpose: audit E_RANGE values in public INTEGRAL/SPI spi_spectra.fits.gz products.
          # It reads 511 only if E_RANGE is an explicit safe keV bin mapping. Otherwise it blocks.
          from pathlib import Path
          from urllib.request import Request, urlopen
          import csv, datetime, hashlib, json, math, os, shutil, sys, traceback
          
          import numpy as np
          from astropy.io import fits
          
          STAGE = "ACIRM_R13MPAB_E_RANGE_VALUE_AUDIT_PUBLIC_SPI_SPECTRA_511_GATE"
          BASE = Path(os.environ.get("GITHUB_WORKSPACE", "/tmp/acirm_r13mpab"))
          OUT = BASE / (STAGE + "_OUTPUT")
          DATA = BASE / (STAGE + "_DATA")
          OUT.mkdir(parents=True, exist_ok=True)
          DATA.mkdir(parents=True, exist_ok=True)
          
          LOCKED = {
              "stage": STAGE,
              "previous_stage": "ACIRM_R13MPAA_PUBLIC_SPI_SPECTRA_SCHEMA_SAFE_511_READOUT_NO_OG_CREATE",
              "previous_decision": "PUBLIC_SPI_PRODUCTS_SCHEMA_INSPECTED_NO_SAFE_KEV_COUNTS_PAIR_FOR_511_READOUT",
              "purpose": "Audit E_RANGE values in public spi_spectra.fits.gz products. Read locked 511 keV only if E_RANGE is proven to be a safe keV bin mapping, not merely an internal range/channel selector.",
              "locked_scw_ids": [
                  "250400090010", "250400020010", "250400080010", "250400030010",
                  "250400070021", "250400040010", "250400060010", "250400050010"
              ],
              "heasarc_scw_base": "https://heasarc.gsfc.nasa.gov/FTP/integral/data/scw/2504",
              "target_public_file": "spi_spectra.fits.gz",
              "target_hdu_hint": "SPI.-ACOF-RAW",
              "locked_line_keV": [508.0, 514.0],
              "locked_lower_sideband_keV": [490.0, 500.0],
              "locked_upper_sideband_keV": [522.0, 532.0],
              "minimum_candidate_ratio": 1.2,
              "strict_safe_mapping_rule": [
                  "E_RANGE or equivalent must supply per-bin numeric energy lower/upper edges, or per-bin centers with unambiguous keV units.",
                  "A two-number global range for a 16384-channel COUNTS vector is not sufficient for a safe 511 keV readout unless bin edges are explicit.",
                  "If only a global range exists, optional linearized values are recorded as blocked diagnostics only, not as a claim."
              ],
              "claim_ceiling": "E_RANGE/schema audit only; no evidence/proof/discovery claim",
              "artifact_policy": "Do not include downloaded FITS files in final artifact. Keep CSV, JSON, logs only."
          }
          
          LINE = tuple(LOCKED["locked_line_keV"])
          LOWER = tuple(LOCKED["locked_lower_sideband_keV"])
          UPPER = tuple(LOCKED["locked_upper_sideband_keV"])
          MIN_RATIO = LOCKED["minimum_candidate_ratio"]
          
          
          def log(msg):
              print(msg, flush=True)
              with (OUT / "R13MPAB_PROGRESS.log").open("a", encoding="utf-8") as f:
                  f.write(str(msg) + "\n")
          
          
          def write_json(name, obj):
              (OUT / name).write_text(json.dumps(obj, indent=2, ensure_ascii=False), encoding="utf-8")
          
          
          def write_csv(name, rows, cols):
              with (OUT / name).open("w", newline="", encoding="utf-8") as f:
                  w = csv.DictWriter(f, fieldnames=cols)
                  w.writeheader()
                  for r in rows:
                      w.writerow({c: r.get(c, "") for c in cols})
          
          
          def sha256_file(path):
              h = hashlib.sha256()
              with open(path, "rb") as f:
                  for b in iter(lambda: f.read(1024 * 1024), b""):
                      h.update(b)
              return h.hexdigest()
          
          
          def final_decision(decision, next_stage, extra=None):
              obj = {
                  "stage": STAGE,
                  "decision": decision,
                  "next_stage": next_stage,
                  "claim_ceiling": LOCKED["claim_ceiling"],
                  "timestamp_utc": datetime.datetime.utcnow().isoformat() + "Z"
              }
              if extra:
                  obj.update(extra)
              write_json("R13MPAB_FINAL_DECISION.json", obj)
              log("FINAL_DECISION: " + decision)
              return obj
          
          
          def url_probe(url, timeout=30):
              last = ""
              for method in ["HEAD", "GET"]:
                  try:
                      headers = {"User-Agent": "ACIRM-R13MPAB/1.0"}
                      if method == "GET":
                          headers["Range"] = "bytes=0-0"
                      req = Request(url, headers=headers, method=method)
                      with urlopen(req, timeout=timeout) as r:
                          cl = r.headers.get("Content-Length") or r.headers.get("Content-length")
                          return {"ok": True, "status": getattr(r, "status", ""), "content_length": int(cl) if str(cl).isdigit() else None, "content_type": r.headers.get("Content-Type", ""), "final_url": r.geturl(), "error": ""}
                  except Exception as e:
                      last = repr(e)[:350]
              return {"ok": False, "status": "", "content_length": None, "content_type": "", "final_url": "", "error": last}
          
          
          def download_url(url, dest, timeout=1800):
              dest.parent.mkdir(parents=True, exist_ok=True)
              tmp = dest.with_suffix(dest.suffix + ".part")
              if tmp.exists():
                  tmp.unlink()
              req = Request(url, headers={"User-Agent": "ACIRM-R13MPAB/1.0"})
              with urlopen(req, timeout=timeout) as r, open(tmp, "wb") as f:
                  shutil.copyfileobj(r, f, length=1024 * 1024)
              tmp.rename(dest)
              return dest
          
          
          def col_meta(hdu, col):
              meta = {"unit": "", "format": "", "dim": ""}
              try:
                  for c in hdu.columns:
                      if c.name == col:
                          meta = {"unit": str(c.unit or ""), "format": str(c.format or ""), "dim": str(c.dim or "")}
                          break
              except Exception:
                  pass
              return meta
          
          
          def as_float_array(data, col):
              try:
                  arr = np.asarray(data[col])
                  if arr.size == 0:
                      return None
                  if not np.issubdtype(arr.dtype, np.number):
                      arr = arr.astype(float)
                  return np.asarray(arr, dtype=float)
              except Exception:
                  return None
          
          
          def summarize_array(arr, max_unique=40):
              arr = np.asarray(arr)
              flat = arr.ravel()
              summary = {
                  "shape": str(arr.shape),
                  "ndim": int(arr.ndim),
                  "size": int(arr.size),
                  "dtype": str(arr.dtype)
              }
              if arr.size and np.issubdtype(arr.dtype, np.number):
                  summary.update({
                      "min": float(np.nanmin(flat)),
                      "max": float(np.nanmax(flat)),
                      "median": float(np.nanmedian(flat)),
                      "finite_fraction": float(np.isfinite(flat).sum()) / float(flat.size)
                  })
                  vals = np.unique(flat[np.isfinite(flat)])
                  if len(vals) <= max_unique:
                      summary["unique_values"] = [float(x) for x in vals]
                  else:
                      summary["unique_values_sample"] = [float(x) for x in vals[:max_unique]]
                      summary["unique_count"] = int(len(vals))
              return summary
          
          
          def values_keV_like(vals, unit_text):
              vals = np.asarray(vals, dtype=float).ravel()
              vals = vals[np.isfinite(vals)]
              if len(vals) == 0:
                  return False
              unit = str(unit_text).lower()
              if "kev" in unit:
                  return True
              return (np.nanmin(vals) >= -1.0 and np.nanmax(vals) >= UPPER[1] and np.nanmax(vals) <= 20000.0)
          
          
          def edge_indices(emin, emax, window):
              return np.where((emax > window[0]) & (emin < window[1]))[0]
          
          
          def try_explicit_energy_mapping(e_arr, e_unit, count_shape):
              arr = np.asarray(e_arr, dtype=float)
              if arr.size == 0:
                  return None
              energy_axes = [dim for dim in count_shape if isinstance(dim, int) and dim > 1]
              candidates = []
          
              def validate_edges(emin, emax, relation):
                  emin = np.asarray(emin, dtype=float).ravel()
                  emax = np.asarray(emax, dtype=float).ravel()
                  if len(emin) != len(emax) or len(emin) < 2:
                      return None
                  if not (np.isfinite(emin).all() and np.isfinite(emax).all()):
                      return None
                  if not np.all(emax > emin):
                      return None
                  if np.any(np.diff(emin) < -1e-8) or np.any(np.diff(emax) < -1e-8):
                      return None
                  if not values_keV_like(np.concatenate([emin, emax]), e_unit):
                      return None
                  li = edge_indices(emin, emax, LINE)
                  lo = edge_indices(emin, emax, LOWER)
                  up = edge_indices(emin, emax, UPPER)
                  if len(li) == 0 or len(lo) == 0 or len(up) == 0:
                      return None
                  return {"emin": emin, "emax": emax, "n_bins": len(emin), "relation": relation, "line_idx": li, "lower_idx": lo, "upper_idx": up}
          
              flat = arr.ravel()
              for nbin in energy_axes:
                  if flat.size == nbin + 1:
                      cand = validate_edges(flat[:-1], flat[1:], f"E_RANGE_1D_edges_len_{flat.size}")
                      if cand:
                          candidates.append(cand)
                  if flat.size == nbin:
                      vals = flat
                      if np.all(np.isfinite(vals)) and np.all(np.diff(vals) > 0) and values_keV_like(vals, e_unit):
                          mids = 0.5 * (vals[:-1] + vals[1:])
                          first = vals[0] - (mids[0] - vals[0])
                          last = vals[-1] + (vals[-1] - mids[-1])
                          edges = np.concatenate([[first], mids, [last]])
                          cand = validate_edges(edges[:-1], edges[1:], f"E_RANGE_1D_centers_len_{flat.size}")
                          if cand:
                              candidates.append(cand)
          
              if arr.ndim >= 2 and arr.shape[-1] == 2:
                  pair_count = int(np.prod(arr.shape[:-1]))
                  for nbin in energy_axes:
                      if pair_count == nbin:
                          pairs = arr.reshape(-1, 2)
                          cand = validate_edges(pairs[:, 0], pairs[:, 1], f"E_RANGE_pair_edges_count_{pair_count}")
                          if cand:
                              candidates.append(cand)
              return candidates[0] if candidates else None
          
          
          write_json("R13MPAB_LOCKED_CONTEXT.json", LOCKED)
          log("Downloading public spi_spectra.fits.gz products for locked SCWs.")
          
          download_rows = []
          local_files = []
          for scw in LOCKED["locked_scw_ids"]:
              url = f"{LOCKED['heasarc_scw_base']}/{scw}.001/{LOCKED['target_public_file']}"
              probe = url_probe(url)
              row = {"scw_id": scw, "url": url, **probe, "download_ok": False, "path": "", "size_bytes": "", "sha256": ""}
              if probe["ok"]:
                  dest = DATA / scw / LOCKED["target_public_file"]
                  try:
                      log(f"Downloading {scw} spi_spectra.fits.gz")
                      download_url(url, dest)
                      row.update({"download_ok": True, "path": str(dest), "size_bytes": dest.stat().st_size, "sha256": sha256_file(dest)})
                      local_files.append((scw, dest))
                  except Exception as e:
                      row["error"] = "download_exception_" + repr(e)[:300]
              download_rows.append(row)
          write_csv("R13MPAB_SPI_SPECTRA_DOWNLOADS.csv", download_rows, ["scw_id", "url", "ok", "status", "content_length", "content_type", "final_url", "error", "download_ok", "path", "size_bytes", "sha256"])
          
          hdu_rows = []
          erange_rows = []
          counts_rows = []
          explicit_readout_rows = []
          blocked_linear_rows = []
          errors = []
          
          for scw, path in local_files:
              try:
                  with fits.open(path, memmap=False) as hdul:
                      for hdu_i, hdu in enumerate(hdul):
                          hname = getattr(hdu, "name", "")
                          data = getattr(hdu, "data", None)
                          cols = []
                          if hasattr(hdu, "columns") and hdu.columns is not None:
                              try:
                                  cols = list(hdu.columns.names)
                              except Exception:
                                  cols = []
                          hdu_rows.append({"scw_id": scw, "filename": path.name, "hdu_index": hdu_i, "hdu_name": hname, "columns": "|".join(cols), "n_columns": len(cols), "data_shape": str(getattr(data, "shape", ""))})
                          if data is None or not cols:
                              continue
                          upper = {str(c).upper(): c for c in cols}
                          e_col = upper.get("E_RANGE")
                          c_col = upper.get("COUNTS")
                          if e_col:
                              e_arr = as_float_array(data, e_col)
                              emeta = col_meta(hdu, e_col)
                              if e_arr is not None:
                                  s = summarize_array(e_arr)
                                  erange_rows.append({"scw_id": scw, "filename": path.name, "hdu_index": hdu_i, "hdu_name": hname, "col": e_col, "unit": emeta["unit"], "format": emeta["format"], "dim": emeta["dim"], "shape": s.get("shape", ""), "ndim": s.get("ndim", ""), "size": s.get("size", ""), "min": s.get("min", ""), "max": s.get("max", ""), "median": s.get("median", ""), "finite_fraction": s.get("finite_fraction", ""), "unique_values_or_sample": json.dumps(s.get("unique_values", s.get("unique_values_sample", [])))[:1000], "unique_count": s.get("unique_count", "")})
                          if c_col:
                              c_arr = as_float_array(data, c_col)
                              cmeta = col_meta(hdu, c_col)
                              if c_arr is not None:
                                  s = summarize_array(c_arr, max_unique=10)
                                  counts_rows.append({"scw_id": scw, "filename": path.name, "hdu_index": hdu_i, "hdu_name": hname, "col": c_col, "unit": cmeta["unit"], "format": cmeta["format"], "dim": cmeta["dim"], "shape": s.get("shape", ""), "ndim": s.get("ndim", ""), "size": s.get("size", ""), "min": s.get("min", ""), "max": s.get("max", ""), "median": s.get("median", ""), "finite_fraction": s.get("finite_fraction", "")})
                          if e_col and c_col:
                              e_arr = as_float_array(data, e_col)
                              c_arr = as_float_array(data, c_col)
                              emeta = col_meta(hdu, e_col)
                              if e_arr is not None and c_arr is not None:
                                  explicit = try_explicit_energy_mapping(e_arr, emeta["unit"], tuple(c_arr.shape))
                                  if explicit:
                                      axes = [ax for ax, dim in enumerate(c_arr.shape) if dim == explicit["n_bins"]]
                                      axis = axes[-1] if axes else None
                                      if axis is not None:
                                          lv = float(np.nansum(np.take(c_arr, explicit["line_idx"], axis=axis)))
                                          lov = float(np.nansum(np.take(c_arr, explicit["lower_idx"], axis=axis)))
                                          uv = float(np.nansum(np.take(c_arr, explicit["upper_idx"], axis=axis)))
                                          side = 0.5 * (lov + uv)
                                          ratio = lv / side if side > 0 else None
                                          explicit_readout_rows.append({"scw_id": scw, "filename": path.name, "hdu_index": hdu_i, "hdu_name": hname, "mapping_relation": explicit["relation"], "energy_axis": axis, "energy_bins": explicit["n_bins"], "line_value": lv, "lower_value": lov, "upper_value": uv, "sideband_mean": side, "line_to_sideband_ratio": ratio, "candidate_ratio_ge_1p2": bool(ratio is not None and ratio >= MIN_RATIO), "claim": "SAFE_EXPLICIT_ERANGE_KEV_MAPPING_READOUT"})
                                  else:
                                      flat = np.asarray(e_arr, dtype=float).ravel()
                                      unique = np.unique(flat[np.isfinite(flat)]) if flat.size else np.array([])
                                      if len(unique) >= 2 and c_arr.ndim >= 1:
                                          lo = float(np.nanmin(unique))
                                          hi = float(np.nanmax(unique))
                                          nchan = int(c_arr.shape[-1])
                                          unit = emeta["unit"]
                                          linear_possible = values_keV_like(np.array([lo, hi]), unit) and hi > lo and nchan > 10
                                          if linear_possible:
                                              edges = np.linspace(lo, hi, nchan + 1)
                                              li = edge_indices(edges[:-1], edges[1:], LINE)
                                              lbi = edge_indices(edges[:-1], edges[1:], LOWER)
                                              ubi = edge_indices(edges[:-1], edges[1:], UPPER)
                                              if len(li) and len(lbi) and len(ubi):
                                                  axis = c_arr.ndim - 1
                                                  lv = float(np.nansum(np.take(c_arr, li, axis=axis)))
                                                  lov = float(np.nansum(np.take(c_arr, lbi, axis=axis)))
                                                  uv = float(np.nansum(np.take(c_arr, ubi, axis=axis)))
                                                  side = 0.5 * (lov + uv)
                                                  ratio = lv / side if side > 0 else None
                                              else:
                                                  lv = lov = uv = side = ratio = None
                                          else:
                                              lv = lov = uv = side = ratio = None
                                          blocked_linear_rows.append({"scw_id": scw, "filename": path.name, "hdu_index": hdu_i, "hdu_name": hname, "erange_unit": unit, "erange_shape": str(np.asarray(e_arr).shape), "erange_unique_values_or_sample": json.dumps([float(x) for x in unique[:30]])[:1000], "counts_shape": str(c_arr.shape), "why_blocked": "E_RANGE is not explicit per-bin lower/upper keV mapping; linearization is not safe for claim.", "linearized_diagnostic_possible": bool(linear_possible), "linearized_line_value_not_for_claim": lv, "linearized_lower_value_not_for_claim": lov, "linearized_upper_value_not_for_claim": uv, "linearized_sideband_mean_not_for_claim": side, "linearized_ratio_not_for_claim": ratio})
              except Exception as e:
                  errors.append({"scw_id": scw, "file": str(path), "error": repr(e)[:500], "traceback": traceback.format_exc()[:1500]})
          
          write_csv("R13MPAB_FITS_HDU_SCHEMA.csv", hdu_rows, ["scw_id", "filename", "hdu_index", "hdu_name", "columns", "n_columns", "data_shape"])
          write_csv("R13MPAB_ERANGE_VALUE_AUDIT.csv", erange_rows, ["scw_id", "filename", "hdu_index", "hdu_name", "col", "unit", "format", "dim", "shape", "ndim", "size", "min", "max", "median", "finite_fraction", "unique_values_or_sample", "unique_count"])
          write_csv("R13MPAB_COUNTS_ARRAY_AUDIT.csv", counts_rows, ["scw_id", "filename", "hdu_index", "hdu_name", "col", "unit", "format", "dim", "shape", "ndim", "size", "min", "max", "median", "finite_fraction"])
          write_csv("R13MPAB_SAFE_EXPLICIT_511_READOUT.csv", explicit_readout_rows if explicit_readout_rows else [{"claim": "NO_SAFE_EXPLICIT_ERANGE_KEV_READOUT"}], ["scw_id", "filename", "hdu_index", "hdu_name", "mapping_relation", "energy_axis", "energy_bins", "line_value", "lower_value", "upper_value", "sideband_mean", "line_to_sideband_ratio", "candidate_ratio_ge_1p2", "claim"])
          write_csv("R13MPAB_BLOCKED_LINEARIZED_ERANGE_DIAGNOSTIC_NOT_FOR_CLAIM.csv", blocked_linear_rows if blocked_linear_rows else [{"why_blocked": "NO_GLOBAL_ERANGE_LINEAR_DIAGNOSTIC"}], ["scw_id", "filename", "hdu_index", "hdu_name", "erange_unit", "erange_shape", "erange_unique_values_or_sample", "counts_shape", "why_blocked", "linearized_diagnostic_possible", "linearized_line_value_not_for_claim", "linearized_lower_value_not_for_claim", "linearized_upper_value_not_for_claim", "linearized_sideband_mean_not_for_claim", "linearized_ratio_not_for_claim"])
          write_json("R13MPAB_ERRORS.json", {"errors_count": len(errors), "errors": errors})
          
          if explicit_readout_rows:
              line_sum = sum(float(r["line_value"]) for r in explicit_readout_rows)
              lower_sum = sum(float(r["lower_value"]) for r in explicit_readout_rows)
              upper_sum = sum(float(r["upper_value"]) for r in explicit_readout_rows)
              side = 0.5 * (lower_sum + upper_sum)
              ratio = line_sum / side if side > 0 else None
              candidate = bool(ratio is not None and ratio >= MIN_RATIO)
          else:
              line_sum = lower_sum = upper_sum = side = ratio = None
              candidate = False
          
          linear_possible_count = sum(1 for r in blocked_linear_rows if r.get("linearized_diagnostic_possible"))
          summary = {
              "downloaded_spi_spectra_count": len(local_files),
              "hdu_rows": len(hdu_rows),
              "erange_rows": len(erange_rows),
              "counts_rows": len(counts_rows),
              "safe_explicit_readout_rows": len(explicit_readout_rows),
              "safe_explicit_line_sum": line_sum,
              "safe_explicit_lower_sum": lower_sum,
              "safe_explicit_upper_sum": upper_sum,
              "safe_explicit_sideband_mean": side,
              "safe_explicit_ratio": ratio,
              "safe_explicit_candidate_ratio_ge_1p2": candidate,
              "blocked_linearized_rows": len(blocked_linear_rows),
              "blocked_linearized_possible_count": linear_possible_count,
              "errors_count": len(errors),
              "claim_ceiling": LOCKED["claim_ceiling"]
          }
          write_json("R13MPAB_ERANGE_AUDIT_SUMMARY.json", summary)
          
          if candidate:
              decision = "SAFE_EXPLICIT_ERANGE_KEV_511_RATIO_CANDIDATE_DIAGNOSTIC_ONLY"
              next_stage = "RUN_BACKGROUND_RESPONSE_OFF_ENERGY_OFF_TIME_NULLS_AND_OFFICIAL_OSA_REPLICATION_BEFORE_ANY_CLAIM"
          elif explicit_readout_rows:
              decision = "SAFE_EXPLICIT_ERANGE_KEV_511_READOUT_COMPLETED_NO_RATIO_EXCESS"
              next_stage = "STOP_OR_RUN_CONTROL_WINDOWS_NO_DETECTION_CLAIM"
          elif erange_rows and counts_rows and linear_possible_count:
              decision = "ERANGE_EXISTS_BUT_ONLY_GLOBAL_OR_NON_EXPLICIT_LINEARIZED_511_REMAINS_BLOCKED"
              next_stage = "OFFICIAL_OSA_ENERGY_BOUNDARIES_OR_SPI_CALIBRATION_SCHEMA_REQUIRED_BEFORE_511_READOUT"
          elif erange_rows and counts_rows:
              decision = "ERANGE_AND_COUNTS_EXIST_BUT_ERANGE_NOT_KEV_BIN_MAPPING_511_BLOCKED"
              next_stage = "OFFICIAL_OSA_ENERGY_BOUNDARIES_REQUIRED"
          elif counts_rows:
              decision = "COUNTS_EXIST_BUT_NO_ERANGE_ENERGY_MAPPING_511_BLOCKED"
              next_stage = "OFFICIAL_OSA_ENERGY_BOUNDARIES_REQUIRED"
          else:
              decision = "SPI_SPECTRA_PRODUCTS_DID_NOT_EXPOSE_COUNTS_ERANGE_SCHEMA"
              next_stage = "OFFICIAL_OSA_PRODUCTS_REQUIRED"
          final_decision(decision, next_stage, {"summary": summary})
          
          try:
              shutil.rmtree(DATA)
          except Exception:
              pass
          PYCODE
          python3 "$GITHUB_WORKSPACE/r13mpab_controller.py" > "$OUT/R13MPAB_CONTROLLER_STDOUT.txt" 2> "$OUT/R13MPAB_CONTROLLER_STDERR.txt"
          CODE=$?
          echo "controller_exit_code=$CODE" > "$OUT/R13MPAB_STEP_STATUS.log"
          if [ ! -f "$OUT/R13MPAB_FINAL_DECISION.json" ]; then
            cat > "$OUT/R13MPAB_FINAL_DECISION.json" <<'JSON'
          {
            "stage": "ACIRM_R13MPAB_E_RANGE_VALUE_AUDIT_PUBLIC_SPI_SPECTRA_511_GATE",
