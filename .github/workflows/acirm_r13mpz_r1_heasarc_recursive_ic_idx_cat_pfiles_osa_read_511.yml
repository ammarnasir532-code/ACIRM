name: ACIRM R13MPZ R1 HEASARC recursive IC IDX CAT PFILES OSA read 511

on:
  workflow_dispatch:

jobs:
  r13mpz-r1:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: R13MPZ R1 recursive HEASARC IC IDX CAT plus PFILES repair then OSA 511 readout
        shell: bash
        run: |
          set +e
          STAGE="ACIRM_R13MPZ_R1_HEASARC_RECURSIVE_IC_IDX_CAT_PFILES_OSA_READ_511"
          OUT="$GITHUB_WORKSPACE/${STAGE}_OUTPUT"
          REPO="$GITHUB_WORKSPACE/isdc_repo_r13mpz_r1"
          WORK="$GITHUB_WORKSPACE/osa_work_r13mpz_r1"
          mkdir -p "$OUT" "$REPO" "$WORK" "$WORK/pfiles" "$WORK/obs" "$WORK/logs"

          cat > "$OUT/R13MPZ_R1_FIREWALL.json" <<'JSON'
          {
            "stage": "ACIRM_R13MPZ_R1_HEASARC_RECURSIVE_IC_IDX_CAT_PFILES_OSA_READ_511",
            "purpose": "Repair R13MPY technical stop by downloading HEASARC IC IDX CAT using the official recursive tree approach, setting OSA PFILES with system parameter files, rerunning og_create, searching for energy_boundaries and evts_det_spec, and reading locked 511 keV windows only if safe mapping exists.",
            "locked_scw_ids": ["250400090010", "250400020010", "250400080010", "250400030010", "250400070021", "250400040010", "250400060010", "250400050010"],
            "locked_line_window_keV": [508.0, 514.0],
            "locked_lower_sideband_keV": [490.0, 500.0],
            "locked_upper_sideband_keV": [522.0, 532.0],
            "minimum_candidate_ratio": 1.2,
            "no_retuning": true,
            "artifact_policy": "Final artifact contains logs, manifests, JSON, CSV only. Downloaded science data and OSA work repository are deleted before packaging.",
            "claim_ceiling": "guarded diagnostic candidate at most; no evidence, proof, discovery, or final detection claim"
          }
          JSON

          cat > "$OUT/R13MPZ_R1_LOCKED_CONTEXT.json" <<'JSON'
          {
            "previous_stop": "R13MPY stopped technically: OSA tools existed and 332 public SCW files were downloaded, but IC IDX CAT AUX were empty, og_create returned -3003, and no energy_boundaries or evts_det_spec were generated.",
            "repair_1": "Use HEASARC official recursive IC IDX CAT branch download pattern instead of looking only for tarballs that timed out or returned 404.",
            "repair_2": "Set PFILES to include the discovered OSA system parameter-file directory, because og_create -h previously failed with CommonInit mode -3003.",
            "locked_line_window_keV": [508.0, 514.0],
            "locked_lower_sideband_keV": [490.0, 500.0],
            "locked_upper_sideband_keV": [522.0, 532.0],
            "minimum_candidate_ratio": 1.2
          }
          JSON

          python3 -m pip install --user --no-cache-dir --upgrade numpy astropy pandas > "$OUT/R13MPZ_R1_PIP_INSTALL.log" 2>&1

          echo "Pulling OSA Docker image" | tee "$OUT/R13MPZ_R1_PROGRESS.log"
          docker pull integralsw/osa:latest > "$OUT/R13MPZ_R1_DOCKER_PULL.log" 2>&1

          echo "Downloading HEASARC IC IDX CAT trees using recursive wget" | tee -a "$OUT/R13MPZ_R1_PROGRESS.log"
          cat > "$OUT/R13MPZ_R1_HEASARC_TREE_URLS.txt" <<'URLS'
          https://heasarc.gsfc.nasa.gov/FTP/integral/data/ic/ibis/
          https://heasarc.gsfc.nasa.gov/FTP/integral/data/ic/irem/
          https://heasarc.gsfc.nasa.gov/FTP/integral/data/ic/jmx1/
          https://heasarc.gsfc.nasa.gov/FTP/integral/data/ic/jmx2/
          https://heasarc.gsfc.nasa.gov/FTP/integral/data/ic/omc/
          https://heasarc.gsfc.nasa.gov/FTP/integral/data/ic/sc/
          https://heasarc.gsfc.nasa.gov/FTP/integral/data/ic/spi/
          https://heasarc.gsfc.nasa.gov/FTP/integral/data/idx/ic/
          https://heasarc.gsfc.nasa.gov/FTP/integral/data/idx/rev/
          https://heasarc.gsfc.nasa.gov/FTP/integral/data/idx/scw/
          https://heasarc.gsfc.nasa.gov/FTP/integral/data/cat/hec/
          https://heasarc.gsfc.nasa.gov/FTP/integral/data/cat/omc/
          URLS

          : > "$OUT/R13MPZ_R1_HEASARC_TREE_WGET.log"
          : > "$OUT/R13MPZ_R1_HEASARC_TREE_WGET_STATUS.csv"
          echo "url,exit_code" > "$OUT/R13MPZ_R1_HEASARC_TREE_WGET_STATUS.csv"
          while read -r URL; do
            [ -z "$URL" ] && continue
            echo "TREE_BEGIN $URL" | tee -a "$OUT/R13MPZ_R1_HEASARC_TREE_WGET.log"
            timeout 2100 wget -nv -nH --no-check-certificate --cut-dirs=3 -r -l0 -c -N -np -R 'index*' -erobots=off --retr-symlinks -P "$REPO" "$URL" >> "$OUT/R13MPZ_R1_HEASARC_TREE_WGET.log" 2>&1
            CODE=$?
            echo "TREE_END $URL exit=$CODE" | tee -a "$OUT/R13MPZ_R1_HEASARC_TREE_WGET.log"
            printf '%s,%s\n' "$URL" "$CODE" >> "$OUT/R13MPZ_R1_HEASARC_TREE_WGET_STATUS.csv"
          done < "$OUT/R13MPZ_R1_HEASARC_TREE_URLS.txt"

          echo "Downloading locked SCW directories recursively" | tee -a "$OUT/R13MPZ_R1_PROGRESS.log"
          : > "$OUT/R13MPZ_R1_SCW_WGET.log"
          : > "$OUT/R13MPZ_R1_SCW_WGET_STATUS.csv"
          echo "scw_id,url,exit_code" > "$OUT/R13MPZ_R1_SCW_WGET_STATUS.csv"
          for SCW in 250400090010 250400020010 250400080010 250400030010 250400070021 250400040010 250400060010 250400050010; do
            URL="https://heasarc.gsfc.nasa.gov/FTP/integral/data/scw/2504/${SCW}.001/"
            echo "SCW_BEGIN $SCW $URL" | tee -a "$OUT/R13MPZ_R1_SCW_WGET.log"
            timeout 1500 wget -nv -nH --no-check-certificate --cut-dirs=3 -r -l0 -c -N -np -R 'index*' -erobots=off --retr-symlinks -P "$REPO" "$URL" >> "$OUT/R13MPZ_R1_SCW_WGET.log" 2>&1
            CODE=$?
            echo "SCW_END $SCW exit=$CODE" | tee -a "$OUT/R13MPZ_R1_SCW_WGET.log"
            printf '%s,%s,%s\n' "$SCW" "$URL" "$CODE" >> "$OUT/R13MPZ_R1_SCW_WGET_STATUS.csv"
          done

          echo "Creating repository manifest before OSA" | tee -a "$OUT/R13MPZ_R1_PROGRESS.log"
          find "$REPO" -type f | sed "s#^$REPO/##" | sort > "$OUT/R13MPZ_R1_REPO_FILE_MANIFEST_BEFORE_OSA.txt"
          du -sh "$REPO" > "$OUT/R13MPZ_R1_REPO_DU_BEFORE_OSA.txt" 2>&1
          python3 - <<'PY'
          from pathlib import Path
          import json, os
          out = Path(os.environ['GITHUB_WORKSPACE']) / 'ACIRM_R13MPZ_R1_HEASARC_RECURSIVE_IC_IDX_CAT_PFILES_OSA_READ_511_OUTPUT'
          repo = Path(os.environ['GITHUB_WORKSPACE']) / 'isdc_repo_r13mpz_r1'
          summary = {}
          for branch in ['ic','idx','cat','aux','scw']:
              d = repo / branch
              files = [p for p in d.rglob('*') if p.is_file()] if d.exists() else []
              summary[branch] = {
                  'exists': d.exists(),
                  'file_count': len(files),
                  'sample_files': [str(p.relative_to(repo)) for p in files[:40]]
              }
          (out/'R13MPZ_R1_REPO_BRANCH_SUMMARY_BEFORE_OSA.json').write_text(json.dumps(summary, indent=2), encoding='utf-8')
          PY

          cat > "$WORK/scw_ids.txt" <<'SCWLIST'
          250400090010
          250400020010
          250400080010
          250400030010
          250400070021
          250400040010
          250400060010
          250400050010
          SCWLIST

          : > "$WORK/swg_container_paths.txt"
          for SCW in 250400090010 250400020010 250400080010 250400030010 250400070021 250400040010 250400060010 250400050010; do
            if [ -f "$REPO/scw/2504/${SCW}.001/swg.fits" ]; then
              echo "/repo/scw/2504/${SCW}.001/swg.fits" >> "$WORK/swg_container_paths.txt"
            elif [ -f "$REPO/scw/2504/${SCW}.001/swg.fits.gz" ]; then
              echo "/repo/scw/2504/${SCW}.001/swg.fits.gz" >> "$WORK/swg_container_paths.txt"
            fi
          done

          cat > "$OUT/R13MPZ_R1_OSA_ATTEMPT.sh" <<'BASH'
          #!/usr/bin/env bash
          set +e
          export PATH=/opt/osa/bin:$PATH
          LIBGUI=$(find /opt /usr -name libGui.so 2>/dev/null | head -1)
          if [ -n "$LIBGUI" ]; then
            export LD_LIBRARY_PATH=$(dirname "$LIBGUI"):/opt/osa/lib:/opt/osa/lib64:$LD_LIBRARY_PATH
          else
            export LD_LIBRARY_PATH=/opt/osa/lib:/opt/osa/lib64:$LD_LIBRARY_PATH
          fi
          PAR_FILE=$(find /opt /usr -name og_create.par 2>/dev/null | head -1)
          PAR_DIR=""
          if [ -n "$PAR_FILE" ]; then PAR_DIR=$(dirname "$PAR_FILE"); fi
          mkdir -p /work/pfiles /work/obs /work/logs
          if [ -n "$PAR_DIR" ]; then
            export PFILES="/work/pfiles;$PAR_DIR"
          else
            export PFILES="/work/pfiles"
          fi
          export REP_BASE=/repo
          export ISDC_REF_CAT=/repo/cat
          cd /work
          echo "R13MPZ_R1_OSA_ATTEMPT_START"
          echo "PAR_FILE=$PAR_FILE"
          echo "PFILES=$PFILES"
          echo "REP_BASE=$REP_BASE"
          echo "ISDC_REF_CAT=$ISDC_REF_CAT"
          echo "PATH=$PATH"
          echo "LD_LIBRARY_PATH=$LD_LIBRARY_PATH"
          echo "PFILES_DISCOVERY"
          find /opt /usr -name 'og_create.par' -o -name 'spi_science_analysis.par' 2>/dev/null | head -50
          echo "TOOL_STATUS"
          for t in og_create spi_science_analysis dal_list spiros idx_find plist pquery pset; do
            if command -v "$t" >/dev/null 2>&1; then echo "TOOL_FOUND|$t|$(command -v "$t")"; else echo "TOOL_MISSING|$t"; fi
          done
          echo "PLIST_OG_CREATE_BEGIN"
          timeout 60 plist og_create > /work/logs/plist_og_create.log 2>&1
          echo "PLIST_OG_CREATE_EXIT=$?"
          cat /work/logs/plist_og_create.log || true
          echo "PLIST_OG_CREATE_END"
          echo "OG_CREATE_HELP_BEGIN"
          timeout 60 og_create -h > /work/logs/og_create_help.log 2>&1
          echo "OG_CREATE_HELP_EXIT=$?"
          cat /work/logs/og_create_help.log || true
          echo "OG_CREATE_HELP_END"
          echo "REPO_COUNTS"
          for d in /repo/ic /repo/idx /repo/cat /repo/aux /repo/scw; do echo "$d $(find $d -type f 2>/dev/null | wc -l)"; done
          echo "SWG_LIST"
          cat /work/swg_container_paths.txt || true

          try_og() {
            LABEL="$1"
            shift
            echo "TRY_OG_BEGIN|$LABEL"
            timeout 900 og_create "$@" > "/work/logs/og_${LABEL}.log" 2>&1
            CODE=$?
            echo "TRY_OG_EXIT|$LABEL|$CODE"
            tail -240 "/work/logs/og_${LABEL}.log" || true
            echo "TRY_OG_END|$LABEL"
          }

          try_og ids_idxSwg idxSwg=/work/scw_ids.txt ogid=ACIRM_R13MPZ_R1_IDS baseDir=/work/obs instrument=SPI
          try_og swg_paths idxSwg=/work/swg_container_paths.txt ogid=ACIRM_R13MPZ_R1_SWG baseDir=/work/obs instrument=SPI
          try_og ids_no_instr idxSwg=/work/scw_ids.txt ogid=ACIRM_R13MPZ_R1_IDS2 baseDir=/work/obs
          try_og swg_no_instr idxSwg=/work/swg_container_paths.txt ogid=ACIRM_R13MPZ_R1_SWG2 baseDir=/work/obs

          echo "WORK_FILE_LIST_AFTER_OSA"
          find /work -type f | sort | sed 's#^#WORK_FILE|#' | head -2000
          echo "REPO_REQUIRED_PRODUCT_NAMES"
          find /repo /work -type f \( -iname '*energy*bound*' -o -iname '*evts*det*spec*' -o -iname '*det*spec*' \) 2>/dev/null | sort | head -300
          echo "R13MPZ_R1_OSA_ATTEMPT_END"
          BASH
          chmod +x "$OUT/R13MPZ_R1_OSA_ATTEMPT.sh"

          echo "Running OSA attempt with repaired PFILES" | tee -a "$OUT/R13MPZ_R1_PROGRESS.log"
          docker run --rm \
            -v "$OUT:/out" \
            -v "$REPO:/repo" \
            -v "$WORK:/work" \
            --entrypoint /bin/bash \
            integralsw/osa:latest \
            /out/R13MPZ_R1_OSA_ATTEMPT.sh > "$OUT/R13MPZ_R1_OSA_ATTEMPT.log" 2>&1

          echo "Searching products and reading 511 if safe" | tee -a "$OUT/R13MPZ_R1_PROGRESS.log"
          python3 - <<'PY'
          from pathlib import Path
          import csv, datetime, hashlib, json, math, os, sys
          import numpy as np
          from astropy.io import fits

          STAGE='ACIRM_R13MPZ_R1_HEASARC_RECURSIVE_IC_IDX_CAT_PFILES_OSA_READ_511'
          base=Path(os.environ['GITHUB_WORKSPACE'])
          out=base/(STAGE+'_OUTPUT')
          repo=base/'isdc_repo_r13mpz_r1'
          work=base/'osa_work_r13mpz_r1'
          LINE=(508.0,514.0); LOWER=(490.0,500.0); UPPER=(522.0,532.0); MIN_RATIO=1.2

          def sha256_file(p):
              h=hashlib.sha256()
              with open(p,'rb') as f:
                  for b in iter(lambda:f.read(1024*1024), b''):
                      h.update(b)
              return h.hexdigest()
          def write_json(name,obj):
              (out/name).write_text(json.dumps(obj, indent=2, ensure_ascii=False), encoding='utf-8')
          def write_csv(name, rows, cols):
              with (out/name).open('w', newline='', encoding='utf-8') as f:
                  w=csv.DictWriter(f, fieldnames=cols); w.writeheader()
                  for r in rows: w.writerow({c:r.get(c,'') for c in cols})

          branch_summary={}
          for branch in ['ic','idx','cat','aux','scw']:
              d=repo/branch
              files=[p for p in d.rglob('*') if p.is_file()] if d.exists() else []
              branch_summary[branch]={'exists':d.exists(),'file_count':len(files),'sample_files':[str(p.relative_to(repo)) for p in files[:30]]}
          write_json('R13MPZ_R1_REPO_BRANCH_SUMMARY_AFTER_OSA.json', branch_summary)

          rows=[]
          for root in [repo, work]:
              if not root.exists(): continue
              for p in root.rglob('*'):
                  if not p.is_file(): continue
                  low=p.name.lower()
                  if ('energy_bound' in low or 'evts_det_spec' in low or ('det' in low and 'spec' in low)):
                      rows.append({'path':str(p),'name':p.name,'size_bytes':p.stat().st_size,'sha256':sha256_file(p) if p.stat().st_size < 100*1024*1024 else 'SKIPPED_LARGE'})
          write_csv('R13MPZ_R1_REQUIRED_PRODUCT_SEARCH.csv', rows, ['path','name','size_bytes','sha256'])

          errors=[]
          def parse_energy_file(path):
              candidates=[]
              try:
                  with fits.open(path, memmap=False) as hdul:
                      for hdu_i,hdu in enumerate(hdul):
                          data=getattr(hdu,'data',None)
                          if data is None: continue
                          cols=[]
                          if hasattr(hdu,'columns') and hdu.columns is not None:
                              try: cols=list(hdu.columns.names)
                              except Exception: cols=[]
                          cu={str(c).upper():c for c in cols}
                          lo=hi=None
                          for k in ['E_MIN','E_LO','ENERG_LO','ENERGY_LO','CHANNEL_E_MIN','EMIN','E_LOW','EBOUND_LO']:
                              if k in cu: lo=cu[k]; break
                          for k in ['E_MAX','E_HI','ENERG_HI','ENERGY_HI','CHANNEL_E_MAX','EMAX','E_HIGH','EBOUND_HI']:
                              if k in cu: hi=cu[k]; break
                          if lo and hi:
                              emin=np.asarray(data[lo], dtype=float).ravel(); emax=np.asarray(data[hi], dtype=float).ravel()
                              if len(emin)==len(emax) and len(emin)>0:
                                  candidates.append({'path':str(path),'hdu_index':hdu_i,'hdu_name':getattr(hdu,'name',''),'lo_col':lo,'hi_col':hi,'emin':emin,'emax':emax})
              except Exception as e:
                  errors.append('parse_energy_file '+str(path)+' '+repr(e)[:300])
              return candidates
          def collect_numeric_arrays(path):
              arrays=[]
              try:
                  with fits.open(path, memmap=False) as hdul:
                      for hdu_i,hdu in enumerate(hdul):
                          data=getattr(hdu,'data',None)
                          if data is None: continue
                          cols=[]
                          if hasattr(hdu,'columns') and hdu.columns is not None:
                              try: cols=list(hdu.columns.names)
                              except Exception: cols=[]
                          if cols:
                              for col in cols:
                                  try:
                                      arr=np.asarray(data[col], dtype=float)
                                      if arr.size>0: arrays.append({'path':str(path),'hdu_index':hdu_i,'hdu_name':getattr(hdu,'name',''),'array_name':col,'array':arr})
                                  except Exception:
                                      pass
                          else:
                              try:
                                  arr=np.asarray(data, dtype=float)
                                  if arr.size>0: arrays.append({'path':str(path),'hdu_index':hdu_i,'hdu_name':getattr(hdu,'name',''),'array_name':'IMAGE_OR_PRIMARY_ARRAY','array':arr})
                              except Exception:
                                  pass
              except Exception as e:
                  errors.append('collect_numeric_arrays '+str(path)+' '+repr(e)[:300])
              return arrays

          energy_files=[Path(r['path']) for r in rows if 'energy_bound' in r['name'].lower()]
          spec_files=[Path(r['path']) for r in rows if 'evts_det_spec' in r['name'].lower()]
          if not spec_files:
              spec_files=[Path(r['path']) for r in rows if ('det' in r['name'].lower() and 'spec' in r['name'].lower())]

          profile=[]; readout=[]; selected_meta={}; safe=False
          if energy_files and spec_files:
              candidates=[]
              for ef in energy_files: candidates.extend(parse_energy_file(ef))
              selected=None
              for c in candidates:
                  emin,emax=c['emin'],c['emax']
                  li=np.where((emax>LINE[0]) & (emin<LINE[1]))[0]
                  lo=np.where((emax>LOWER[0]) & (emin<LOWER[1]))[0]
                  up=np.where((emax>UPPER[0]) & (emin<UPPER[1]))[0]
                  if len(li)>0 and len(lo)>0 and len(up)>0:
                      selected=c; break
              if selected is not None:
                  safe=True
                  emin,emax=selected['emin'],selected['emax']
                  li=np.where((emax>LINE[0]) & (emin<LINE[1]))[0]
                  lo=np.where((emax>LOWER[0]) & (emin<LOWER[1]))[0]
                  up=np.where((emax>UPPER[0]) & (emin<UPPER[1]))[0]
                  selected_meta={'path':selected['path'],'hdu_index':selected['hdu_index'],'hdu_name':selected['hdu_name'],'lo_col':selected['lo_col'],'hi_col':selected['hi_col'],'bin_count':len(emin)}
                  for i in range(len(emin)):
                      if i<20 or (emax[i]>480 and emin[i]<540):
                          profile.append({'bin_index':i,'emin_keV':float(emin[i]),'emax_keV':float(emax[i]),'overlap_line':int(i in set(map(int,li))),'overlap_lower':int(i in set(map(int,lo))),'overlap_upper':int(i in set(map(int,up)))})
                  for sf in spec_files:
                      for a in collect_numeric_arrays(sf):
                          arr=a['array']; axes=[ax for ax,dim in enumerate(arr.shape) if dim==len(emin)]
                          if not axes: continue
                          axis=axes[-1]
                          try:
                              lv=float(np.nansum(np.take(arr, li, axis=axis)))
                              lov=float(np.nansum(np.take(arr, lo, axis=axis)))
                              uv=float(np.nansum(np.take(arr, up, axis=axis)))
                              side=0.5*(lov+uv)
                              ratio=lv/side if side>0 else None
                              readout.append({'energy_file':Path(selected['path']).name,'spec_file':Path(sf).name,'hdu_index':a['hdu_index'],'hdu_name':a['hdu_name'],'array_name':a['array_name'],'array_shape':str(arr.shape),'energy_axis':axis,'line_508_514_value':lv,'lower_490_500_value':lov,'upper_522_532_value':uv,'sideband_mean':side,'line_to_sideband_ratio':ratio,'candidate_ratio_ge_1p2':bool(ratio is not None and ratio>=MIN_RATIO),'claim':'GUARDED_DIAGNOSTIC_ONLY'})
                          except Exception as e:
                              errors.append('readout '+str(sf)+' '+repr(e)[:300])

          write_csv('R13MPZ_R1_ENERGY_BOUNDARY_PROFILE_AROUND_511.csv', profile if profile else [{}], ['bin_index','emin_keV','emax_keV','overlap_line','overlap_lower','overlap_upper'])
          write_csv('R13MPZ_R1_GUARDED_511_READOUT_VALUES.csv', readout if readout else [{'claim':'NO_SAFE_READOUT_EXTRACTED'}], ['energy_file','spec_file','hdu_index','hdu_name','array_name','array_shape','energy_axis','line_508_514_value','lower_490_500_value','upper_522_532_value','sideband_mean','line_to_sideband_ratio','candidate_ratio_ge_1p2','claim'])

          if readout:
              line_sum=sum(float(r['line_508_514_value']) for r in readout)
              lower_sum=sum(float(r['lower_490_500_value']) for r in readout)
              upper_sum=sum(float(r['upper_522_532_value']) for r in readout)
              side=0.5*(lower_sum+upper_sum)
              ratio=line_sum/side if side>0 else None
              candidate=bool(ratio is not None and ratio>=MIN_RATIO)
          else:
              line_sum=lower_sum=upper_sum=side=ratio=None; candidate=False
          summary={
              'repo_branch_summary': branch_summary,
              'required_product_rows': len(rows),
              'energy_boundaries_found_count': len(energy_files),
              'detector_spectrum_candidate_count': len(spec_files),
              'safe_energy_mapping_found': safe,
              'selected_energy': selected_meta,
              'readout_rows': len(readout),
              'line_sum': line_sum,
              'lower_sum': lower_sum,
              'upper_sum': upper_sum,
              'sideband_mean': side,
              'line_to_sideband_ratio': ratio,
              'minimum_candidate_ratio': MIN_RATIO,
              'candidate_ratio_ge_1p2': candidate,
              'errors_count': len(errors),
              'errors': errors[:60]
          }
          write_json('R13MPZ_R1_GUARDED_NUMERIC_SUMMARY.json', summary)
          if candidate:
              decision='GUARDED_511_TARGET_FILTERED_CANDIDATE_REQUIRES_NULLS_AND_REPLICATION'
              next_stage='OFF_TIME_NULLS_AND_REPLICATION_BEFORE_ANY_EVIDENCE_CLAIM'
          elif readout:
              decision='NO_GUARDED_511_EXCESS_UNDER_LOCKED_WINDOWS_AFTER_R13MPZ_R1'
              next_stage='STOP_OR_INDEPENDENT_REPLICATION_WITH_SAME_LOCKS'
          elif rows:
              decision='PRODUCTS_FOUND_BUT_SAFE_511_READOUT_NOT_EXECUTED'
              next_stage='MANUAL_SCHEMA_REVIEW_REQUIRED'
          else:
              decision='R13MPZ_R1_TECHNICAL_STOP_REQUIRED_PRODUCTS_NOT_GENERATED_AFTER_RECURSIVE_REPO_AND_PFILES_REPAIR'
              next_stage='LOCAL_FULL_OSA_ISDC_RUN_OR_OFFICIAL_HELPDESK_RECIPE_REQUIRED'
          final={
              'stage': STAGE,
              'decision': decision,
              'next_stage': next_stage,
              'claim_ceiling': 'guarded diagnostic candidate at most; no proof/evidence/discovery claim',
              'timestamp_utc': datetime.datetime.utcnow().isoformat()+'Z',
              'summary': summary
          }
          write_json('R13MPZ_R1_FINAL_DECISION.json', final)
          print(json.dumps(final, indent=2))
          PY

          echo "Creating compact artifact and deleting large data repository" | tee -a "$OUT/R13MPZ_R1_PROGRESS.log"
          du -sh "$REPO" "$WORK" > "$OUT/R13MPZ_R1_DU_BEFORE_CLEANUP.txt" 2>&1
          rm -rf "$REPO" "$WORK"
          cd "$GITHUB_WORKSPACE"
          ZIP="$GITHUB_WORKSPACE/${STAGE}_RESULTS.zip"
          SHA="$ZIP.sha256.txt"
          rm -f "$ZIP" "$SHA"
          zip -r "$ZIP" "$(basename "$OUT")"
          sha256sum "$ZIP" > "$SHA"
          exit 0

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ACIRM_R13MPZ_R1_HEASARC_RECURSIVE_IC_IDX_CAT_PFILES_OSA_READ_511_RESULTS
          path: |
            ACIRM_R13MPZ_R1_HEASARC_RECURSIVE_IC_IDX_CAT_PFILES_OSA_READ_511_RESULTS.zip
            ACIRM_R13MPZ_R1_HEASARC_RECURSIVE_IC_IDX_CAT_PFILES_OSA_READ_511_RESULTS.zip.sha256.txt
          retention-days: 7
