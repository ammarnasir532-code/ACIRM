name: ACIRM R13MUN first guarded SPI 511 value stage with authorization

on:
  workflow_dispatch:
    inputs:
      confirm_authorization:
        description: "Type exactly: I_AUTHORIZE_R13MUN_GUARDED_VALUE_OPEN"
        required: true
        default: "I_AUTHORIZE_R13MUN_GUARDED_VALUE_OPEN"

jobs:
  first-guarded-value-stage:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Authorization and claim firewall
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event.inputs.confirm_authorization }}" != "I_AUTHORIZE_R13MUN_GUARDED_VALUE_OPEN" ]; then
            echo "Authorization string mismatch. Stopping before any value-stage action."
            exit 1
          fi

          STAGE="ACIRM_R13MUN_FIRST_GUARDED_SPI_511_VALUE_STAGE_WITH_AUTHORIZATION"
          OUT="$GITHUB_WORKSPACE/${STAGE}_OUTPUT"
          mkdir -p "$OUT"

          cat > "$OUT/R13MUN_AUTHORIZATION_AND_FIREWALL.json" <<'JSON'
          {
            "stage": "ACIRM_R13MUN_FIRST_GUARDED_SPI_511_VALUE_STAGE_WITH_AUTHORIZATION",
            "authorization": "explicit_user_authorization_received_in_chat_for_guarded_R13MUN_value_open",
            "guarded_value_open_allowed": true,
            "scope": "first guarded diagnostic value-stage attempt only",
            "forbidden_claims_even_if_nonzero": [
              "proof",
              "discovery",
              "evidence",
              "confirmed 511 keV detection",
              "particle production",
              "ACIRM established"
            ],
            "allowed_output": [
              "value-stage route attempted",
              "available official product/index metadata",
              "if safe product exists: guarded diagnostic row only",
              "if safe product does not exist: blocked/no usable value"
            ],
            "hard_stops": [
              "no blind broad search",
              "no post-hoc window changes",
              "no energy-window tuning",
              "no source-switching",
              "no claim promotion",
              "no uncontrolled full archive download"
            ]
          }
          JSON

      - name: Write locked R13MUN protocol
        shell: bash
        run: |
          set -euo pipefail
          STAGE="ACIRM_R13MUN_FIRST_GUARDED_SPI_511_VALUE_STAGE_WITH_AUTHORIZATION"
          OUT="$GITHUB_WORKSPACE/${STAGE}_OUTPUT"
          python3 - <<'PY'
          from pathlib import Path
          import csv
          import json
          import os

          out = Path(os.environ["GITHUB_WORKSPACE"]) / "ACIRM_R13MUN_FIRST_GUARDED_SPI_511_VALUE_STAGE_WITH_AUTHORIZATION_OUTPUT"
          out.mkdir(parents=True, exist_ok=True)

          locked_context = {
              "target": {
                  "r9c_anchor_utc": "2022-05-18T20:42:06.772Z",
                  "target_day_start_utc": "2022-05-18T00:00:00.000Z",
                  "target_day_stop_utc": "2022-05-19T00:00:00.000Z",
                  "strict_pm1h_product_claim": "FORBIDDEN_pm1h_rows_0"
              },
              "energy_windows_keV": {
                  "line_511": [508.0, 514.0],
                  "lower_sideband": [490.0, 500.0],
                  "upper_sideband": [522.0, 532.0]
              },
              "controls": {
                  "offtime_minus_1d": ["2022-05-17T00:00:00.000Z", "2022-05-18T00:00:00.000Z"],
                  "offtime_plus_1d": ["2022-05-19T00:00:00.000Z", "2022-05-20T00:00:00.000Z"]
              },
              "locked_scw_revision": "2504",
              "locked_target_scw_count": 21,
              "claim_ceiling": "first guarded diagnostic value-stage attempt only"
          }
          (out / "R13MUN_LOCKED_VALUE_STAGE_CONTEXT.json").write_text(json.dumps(locked_context, indent=2), encoding="utf-8")

          scw_rows = [
              ["250400110021","001","2504","slew",133],
              ["250400120010","001","2504","pointing",0],
              ["250400090021","001","2504","slew",132],
              ["250400090010","001","2504","pointing",3278],
              ["250400080021","001","2504","slew",133],
              ["250400020010","001","2504","pointing",3472],
              ["250400010021","001","2504","slew",115],
              ["250400010010","001","2504","pointing",770],
              ["250400080010","001","2504","pointing",3248],
              ["250400020021","001","2504","slew",133],
              ["250400030010","001","2504","pointing",3299],
              ["250400070021","001","2504","slew",7159],
              ["250400070010","001","2504","pointing",0],
              ["250400030021","001","2504","slew",136],
              ["250400060021","001","2504","slew",115],
              ["250400040010","001","2504","pointing",5100],
              ["250400060010","001","2504","pointing",3275],
              ["250400040021","001","2504","slew",115],
              ["250400050021","001","2504","slew",131],
              ["250400000031","001","2504","slew",461],
              ["250400050010","001","2504","pointing",3297]
          ]
          with (out / "R13MUN_LOCKED_TARGET_DAY_SCW_LIST_21.csv").open("w", newline="", encoding="utf-8") as f:
              w = csv.writer(f)
              w.writerow(["scw_id", "scw_ver", "rev_dir", "scw_type", "good_spi", "url"])
              for row in scw_rows:
                  scw_id, ver, rev, typ, good_spi = row
                  url = f"https://heasarc.gsfc.nasa.gov/FTP/integral/data/scw/{rev}/{scw_id}.{ver}/"
                  w.writerow([scw_id, ver, rev, typ, good_spi, url])
          PY

      - name: Inspect target SCW directories and identify safe FITS product candidates
        shell: bash
        run: |
          set -euo pipefail
          STAGE="ACIRM_R13MUN_FIRST_GUARDED_SPI_511_VALUE_STAGE_WITH_AUTHORIZATION"
          OUT="$GITHUB_WORKSPACE/${STAGE}_OUTPUT"
          python3 - <<'PY'
          from pathlib import Path
          from urllib.parse import urljoin
          import csv
          import json
          import os
          import re
          import urllib.request

          out = Path(os.environ["GITHUB_WORKSPACE"]) / "ACIRM_R13MUN_FIRST_GUARDED_SPI_511_VALUE_STAGE_WITH_AUTHORIZATION_OUTPUT"
          scw_path = out / "R13MUN_LOCKED_TARGET_DAY_SCW_LIST_21.csv"

          def small_get(url, timeout=25, max_bytes=500000):
              req = urllib.request.Request(url, headers={
                  "User-Agent": "ACIRM-R13MUN-guarded-value-stage",
                  "Accept": "text/html,text/plain,*/*"
              })
              with urllib.request.urlopen(req, timeout=timeout) as r:
                  data = r.read(max_bytes + 1)
                  if len(data) > max_bytes:
                      data = data[:max_bytes]
                  text = data.decode("utf-8", errors="replace")
                  return getattr(r, "status", ""), r.headers.get("Content-Type", ""), text

          def hrefs(text):
              return re.findall(r"href=[\"']([^\"']+)[\"']", text, flags=re.I)

          rows = list(csv.DictReader(scw_path.open(encoding="utf-8")))
          dir_rows = []
          candidate_rows = []

          for row in rows:
              url = row["url"]
              try:
                  status, content_type, text = small_get(url)
                  hlist = hrefs(text)
                  dir_rows.append({
                      "scw_id": row["scw_id"],
                      "url": url,
                      "ok": True,
                      "status": status,
                      "content_type": content_type,
                      "href_count": len(hlist),
                      "error": ""
                  })
                  for h in hlist:
                      lname = h.lower()
                      abs_url = urljoin(url, h)
                      is_fits = (".fits" in lname or ".fit" in lname or ".fits.gz" in lname or ".fit.gz" in lname)
                      looks_spi = ("spi" in lname or lname.startswith("sp") or "/spi" in abs_url.lower())
                      looks_spectrum = any(tok in lname for tok in ["spec", "spectrum", "pha", "rmf", "arf", "rsp", "resp", "energy", "evts", "events"])
                      if is_fits and (looks_spi or looks_spectrum):
                          candidate_rows.append({
                              "scw_id": row["scw_id"],
                              "source_dir": url,
                              "href": h,
                              "candidate_url": abs_url,
                              "is_fits_name": is_fits,
                              "looks_spi": looks_spi,
                              "looks_spectrum_or_response": looks_spectrum,
                              "download_allowed_in_this_stage": False,
                              "selection_reason": "candidate name only; not yet downloaded"
                          })
              except Exception as e:
                  dir_rows.append({
                      "scw_id": row["scw_id"],
                      "url": url,
                      "ok": False,
                      "status": "",
                      "content_type": "",
                      "href_count": 0,
                      "error": repr(e)[:500]
                  })

          with (out / "R13MUN_SCW_DIRECTORY_INSPECTION.csv").open("w", newline="", encoding="utf-8") as f:
              cols = ["scw_id", "url", "ok", "status", "content_type", "href_count", "error"]
              w = csv.DictWriter(f, fieldnames=cols)
              w.writeheader()
              w.writerows(dir_rows)

          with (out / "R13MUN_SAFE_FITS_PRODUCT_CANDIDATES_NAME_ONLY.csv").open("w", newline="", encoding="utf-8") as f:
              cols = ["scw_id", "source_dir", "href", "candidate_url", "is_fits_name", "looks_spi", "looks_spectrum_or_response", "download_allowed_in_this_stage", "selection_reason"]
              w = csv.DictWriter(f, fieldnames=cols)
              w.writeheader()
              w.writerows(candidate_rows)

          summary = {
              "scw_dirs_tested": len(rows),
              "scw_dirs_ok": sum(1 for r in dir_rows if r["ok"]),
              "candidate_fits_name_rows": len(candidate_rows),
              "downloaded_fits_so_far": False,
              "opened_fits_so_far": False,
              "read_science_values_so_far": False
          }
          (out / "R13MUN_PRODUCT_CANDIDATE_DISCOVERY_SUMMARY.json").write_text(json.dumps(summary, indent=2), encoding="utf-8")
          print(json.dumps(summary, indent=2))
          PY

      - name: Attempt guarded value read only if precomputed spectra-like products are safely discoverable
        shell: bash
        run: |
          set -euo pipefail
          STAGE="ACIRM_R13MUN_FIRST_GUARDED_SPI_511_VALUE_STAGE_WITH_AUTHORIZATION"
          OUT="$GITHUB_WORKSPACE/${STAGE}_OUTPUT"
          python3 - <<'PY'
          from pathlib import Path
          import csv
          import json
          import os
          import urllib.request
          import tempfile
          import subprocess
          import sys

          out = Path(os.environ["GITHUB_WORKSPACE"]) / "ACIRM_R13MUN_FIRST_GUARDED_SPI_511_VALUE_STAGE_WITH_AUTHORIZATION_OUTPUT"
          cand_path = out / "R13MUN_SAFE_FITS_PRODUCT_CANDIDATES_NAME_ONLY.csv"

          candidates = list(csv.DictReader(cand_path.open(encoding="utf-8"))) if cand_path.exists() else []

          allowed_tokens = ["spec", "spectrum", "pha"]
          forbidden_tokens = ["evt", "event", "events"]
          filtered = []
          for r in candidates:
              lname = r["href"].lower()
              if any(tok in lname for tok in allowed_tokens) and not any(tok in lname for tok in forbidden_tokens):
                  filtered.append(r)

          value_rows = []
          downloaded_any = False
          opened_any = False
          read_values_any = False
          stage_status = "NO_SAFE_PRECOMPUTED_SPECTRUM_PRODUCT_FOUND_VALUES_NOT_OPENED"

          if len(filtered) > 0:
              subprocess.run([sys.executable, "-m", "pip", "-q", "install", "astropy"], check=False)
              from astropy.io import fits

              for r in filtered[:3]:
                  url = r["candidate_url"]
                  with tempfile.NamedTemporaryFile(suffix=".fits", delete=False) as tf:
                      tmp = Path(tf.name)
                  try:
                      urllib.request.urlretrieve(url, tmp)
                      downloaded_any = True
                      with fits.open(tmp, memmap=False) as hdul:
                          opened_any = True
                          hdus = []
                          for i, h in enumerate(hdul):
                              cols = []
                              if hasattr(h, "columns") and h.columns is not None:
                                  try:
                                      cols = list(h.columns.names)
                                  except Exception:
                                      cols = []
                              hdus.append({"hdu_index": i, "name": h.name, "class": h.__class__.__name__, "columns": cols})
                          value_rows.append({
                              "candidate_url": url,
                              "status": "OPENED_STRUCTURE_ONLY_NO_DIAGNOSTIC_VALUE",
                              "hdu_count": len(hdul),
                              "hdu_summary_json": json.dumps(hdus)[:5000],
                              "line_508_514_value": "",
                              "lower_490_500_value": "",
                              "upper_522_532_value": "",
                              "diagnostic_ratio": "",
                              "claim": "NO_DETECTION_CLAIM"
                          })
                      stage_status = "SAFE_PRODUCT_OPENED_STRUCTURE_ONLY_NO_DIAGNOSTIC_VALUE"
                  except Exception as e:
                      value_rows.append({
                          "candidate_url": url,
                          "status": "DOWNLOAD_OR_OPEN_FAILED",
                          "hdu_count": "",
                          "hdu_summary_json": "",
                          "line_508_514_value": "",
                          "lower_490_500_value": "",
                          "upper_522_532_value": "",
                          "diagnostic_ratio": "",
                          "claim": "NO_DETECTION_CLAIM",
                          "error": repr(e)[:500]
                      })
                  finally:
                      try:
                          tmp.unlink()
                      except Exception:
                          pass

          if not value_rows:
              value_rows.append({
                  "candidate_url": "",
                  "status": stage_status,
                  "hdu_count": "",
                  "hdu_summary_json": "",
                  "line_508_514_value": "",
                  "lower_490_500_value": "",
                  "upper_522_532_value": "",
                  "diagnostic_ratio": "",
                  "claim": "NO_DETECTION_CLAIM"
              })

          with (out / "R13MUN_FIRST_GUARDED_VALUE_READOUT.csv").open("w", newline="", encoding="utf-8") as f:
              cols = ["candidate_url", "status", "hdu_count", "hdu_summary_json", "line_508_514_value", "lower_490_500_value", "upper_522_532_value", "diagnostic_ratio", "claim"]
              extra_cols = sorted(set().union(*[set(r.keys()) for r in value_rows]) - set(cols))
              w = csv.DictWriter(f, fieldnames=cols + extra_cols)
              w.writeheader()
              w.writerows(value_rows)

          result = {
              "stage_status": stage_status,
              "safe_precomputed_spectrum_candidates": len(filtered),
              "downloaded_any_product": downloaded_any,
              "opened_any_product": opened_any,
              "read_science_values": read_values_any,
              "diagnostic_value_rows": len([r for r in value_rows if r.get("line_508_514_value") not in ["", None]]),
              "claim": "NO_DETECTION_CLAIM_NO_PROOF_NO_DISCOVERY",
              "note": "If this stage stops with no safe product, the next step is an explicit OSA product-generation workflow, not claim-making."
          }
          (out / "R13MUN_FIRST_GUARDED_VALUE_STAGE_RESULT.json").write_text(json.dumps(result, indent=2), encoding="utf-8")
          print(json.dumps(result, indent=2))
          PY

      - name: Final classification
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import json
          import os

          out = Path(os.environ["GITHUB_WORKSPACE"]) / "ACIRM_R13MUN_FIRST_GUARDED_SPI_511_VALUE_STAGE_WITH_AUTHORIZATION_OUTPUT"
          result_path = out / "R13MUN_FIRST_GUARDED_VALUE_STAGE_RESULT.json"
          cand_sum_path = out / "R13MUN_PRODUCT_CANDIDATE_DISCOVERY_SUMMARY.json"
          result = json.loads(result_path.read_text()) if result_path.exists() else {}
          cand = json.loads(cand_sum_path.read_text()) if cand_sum_path.exists() else {}

          diagnostic_rows = int(result.get("diagnostic_value_rows", 0) or 0)
          safe_candidates = int(result.get("safe_precomputed_spectrum_candidates", 0) or 0)
          opened_any = bool(result.get("opened_any_product", False))
          read_values = bool(result.get("read_science_values", False))

          if diagnostic_rows > 0:
              decision = "FIRST_GUARDED_DIAGNOSTIC_VALUE_READ_VALUES_OPENED_NO_CLAIM"
              next_stage = "R13MUO_VALIDATE_DIAGNOSTIC_VALUE_WITH_CONTROLS_AND_NULLS"
          elif opened_any:
              decision = "PRODUCT_STRUCTURE_OPENED_BUT_NO_DIAGNOSTIC_VALUE_EXTRACTED_NO_CLAIM"
              next_stage = "R13MUO_REPAIR_PRODUCT_COLUMN_MAPPING_OR_USE_OSA_GENERATION"
          elif safe_candidates == 0:
              decision = "NO_SAFE_PRECOMPUTED_SPECTRUM_PRODUCT_FOUND_VALUES_NOT_OPENED"
              next_stage = "R13MUO_EXPLICIT_OSA_PRODUCT_GENERATION_WORKFLOW_REQUIRED"
          else:
              decision = "GUARDED_VALUE_STAGE_ATTEMPT_INCONCLUSIVE_NO_CLAIM"
              next_stage = "R13MUO_REPAIR_GUARDED_VALUE_STAGE"

          final = {
              "stage": "ACIRM_R13MUN_FIRST_GUARDED_SPI_511_VALUE_STAGE_WITH_AUTHORIZATION",
              "decision": decision,
              "next_stage": next_stage,
              "candidate_fits_name_rows": cand.get("candidate_fits_name_rows", 0),
              "safe_precomputed_spectrum_candidates": safe_candidates,
              "opened_any_product": opened_any,
              "read_science_values": read_values,
              "diagnostic_value_rows": diagnostic_rows,
              "claim_ceiling": "guarded diagnostic attempt only; no detection/evidence/proof/discovery/particle-production claim"
          }
          (out / "R13MUN_FINAL_DECISION.json").write_text(json.dumps(final, indent=2), encoding="utf-8")
          print(json.dumps(final, indent=2))
          PY

      - name: Package results
        shell: bash
        run: |
          set -euo pipefail
          STAGE="ACIRM_R13MUN_FIRST_GUARDED_SPI_511_VALUE_STAGE_WITH_AUTHORIZATION"
          OUT="$GITHUB_WORKSPACE/${STAGE}_OUTPUT"
          ZIP="$GITHUB_WORKSPACE/${STAGE}_RESULTS.zip"
          SHA="$ZIP.sha256.txt"

          cat > "$OUT/R13MUN_GO_NO_GO.csv" <<'CSV'
          question,decision,reason
          Was R13MUN authorized?,YES,Explicit authorization was required and checked.
          Does this claim 511 keV detection?,NO,Claim firewall forbids detection/evidence/proof/discovery.
          Did it perform a broad search?,NO,Locked windows and target day only.
          Is this final proof?,NO,At most a guarded diagnostic attempt.
          CSV

          cd "$GITHUB_WORKSPACE"
          rm -f "$ZIP" "$SHA"
          zip -r "$ZIP" "$(basename "$OUT")"
          sha256sum "$ZIP" > "$SHA"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ACIRM_R13MUN_FIRST_GUARDED_SPI_511_VALUE_STAGE_WITH_AUTHORIZATION_RESULTS
          path: |
            ACIRM_R13MUN_FIRST_GUARDED_SPI_511_VALUE_STAGE_WITH_AUTHORIZATION_RESULTS.zip
            ACIRM_R13MUN_FIRST_GUARDED_SPI_511_VALUE_STAGE_WITH_AUTHORIZATION_RESULTS.zip.sha256.txt
          retention-days: 7
