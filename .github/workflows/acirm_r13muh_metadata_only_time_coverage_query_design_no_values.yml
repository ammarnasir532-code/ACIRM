name: ACIRM R13MUH metadata only time coverage query design no values

on:
  workflow_dispatch:

jobs:
  time-coverage-design:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lock no-values scope
        shell: bash
        run: |
          set -euo pipefail
          STAGE="ACIRM_R13MUH_GITHUB_ACTIONS_METADATA_ONLY_TIME_COVERAGE_QUERY_DESIGN_NO_VALUES"
          OUT="$GITHUB_WORKSPACE/${STAGE}_OUTPUT"
          mkdir -p "$OUT"
          cat > "$OUT/R13MUH_ROUTE_LOCK.json" <<'JSON'
          {
            "stage": "ACIRM_R13MUH_GITHUB_ACTIONS_METADATA_ONLY_TIME_COVERAGE_QUERY_DESIGN_NO_VALUES",
            "opens_science_values": false,
            "downloads_science_products": false,
            "downloads_fits": false,
            "reads_fits_tables": false,
            "purpose": "Design metadata-only SCW time-coverage query logic before any values",
            "forbidden": [
              "SPI spectra",
              "SPI images",
              "511 keV flux/count/intensity values",
              "FITS download",
              "FITS science product opening",
              "FITS table reading",
              "science-window value extraction",
              "particle-production claim"
            ],
            "claim_ceiling": "metadata-only time coverage query design"
          }
          JSON

      - name: System info
        shell: bash
        run: |
          set -euo pipefail
          STAGE="ACIRM_R13MUH_GITHUB_ACTIONS_METADATA_ONLY_TIME_COVERAGE_QUERY_DESIGN_NO_VALUES"
          OUT="$GITHUB_WORKSPACE/${STAGE}_OUTPUT"
          {
            echo "date_utc=$(date -u)"
            echo "runner_os=$RUNNER_OS"
            echo "runner_arch=$RUNNER_ARCH"
            echo "kernel=$(uname -a)"
            python3 --version || true
            df -h
          } > "$OUT/R13MUH_SYSTEM_INFO.txt"

      - name: Build formal time coverage query design ledger
        shell: bash
        run: |
          set -euo pipefail
          STAGE="ACIRM_R13MUH_GITHUB_ACTIONS_METADATA_ONLY_TIME_COVERAGE_QUERY_DESIGN_NO_VALUES"
          OUT="$GITHUB_WORKSPACE/${STAGE}_OUTPUT"
          python3 - <<'PY'
          from pathlib import Path
          import csv
          import json
          import os

          root = Path(os.environ["GITHUB_WORKSPACE"])
          out = root / "ACIRM_R13MUH_GITHUB_ACTIONS_METADATA_ONLY_TIME_COVERAGE_QUERY_DESIGN_NO_VALUES_OUTPUT"

          rows = [
              {
                  "item_id": "TIME-LOCK-001",
                  "requirement": "exact_R9C_gate_or_phase_inversion_UTC_interval",
                  "required_before_values": True,
                  "available_in_this_workflow": False,
                  "status": "HARD_BLOCKER_BEFORE_VALUES",
                  "allowed_now": "record requirement only",
                  "forbidden_now": "do not infer time from science values",
                  "notes": "The exact interval must come from a prior locked ACIRM/R9C handoff or user-supplied locked timestamp package."
              },
              {
                  "item_id": "TIME-LOCK-002",
                  "requirement": "time_system_mapping",
                  "required_before_values": True,
                  "available_in_this_workflow": False,
                  "status": "HARD_BLOCKER_BEFORE_VALUES",
                  "allowed_now": "define conversion requirements",
                  "forbidden_now": "do not mix MET/UTC/IJD without provenance",
                  "notes": "INTEGRAL/OSA workflows often use time systems that must be explicitly converted and audited."
              },
              {
                  "item_id": "SCW-QUERY-001",
                  "requirement": "official_SCW_metadata_route",
                  "required_before_values": True,
                  "available_in_this_workflow": True,
                  "status": "DESIGN_READY_NO_VALUES",
                  "allowed_now": "use SCW directory names and small HTML index metadata only",
                  "forbidden_now": "download FITS or open science-window products",
                  "notes": "R13MUG selected the official SCW root route."
              },
              {
                  "item_id": "SCW-QUERY-002",
                  "requirement": "SCW_identifier_extraction_from_directory_names",
                  "required_before_values": True,
                  "available_in_this_workflow": True,
                  "status": "DESIGN_READY_NO_VALUES",
                  "allowed_now": "parse href names and candidate directory identifiers only",
                  "forbidden_now": "read FITS headers or tables",
                  "notes": "This stage can design identifier parsing without product downloads."
              },
              {
                  "item_id": "SCW-QUERY-003",
                  "requirement": "SCW_time_coverage_metadata_method",
                  "required_before_values": True,
                  "available_in_this_workflow": False,
                  "status": "METHOD_REQUIRED_NO_VALUES",
                  "allowed_now": "define method options only",
                  "forbidden_now": "do not open FITS to read TSTART/TSTOP in this stage",
                  "notes": "Next stage must find an official non-FITS metadata route or create a strict FITS-header-only gate if authorized later."
              },
              {
                  "item_id": "BACKGROUND-001",
                  "requirement": "background_context_window_rules",
                  "required_before_values": True,
                  "available_in_this_workflow": False,
                  "status": "HARD_BLOCKER_BEFORE_VALUES",
                  "allowed_now": "document need for prelocked pre/post/control windows",
                  "forbidden_now": "no background fitting",
                  "notes": "Background handling must be locked before values."
              },
              {
                  "item_id": "LINE-001",
                  "requirement": "511_keV_line_and_sideband_windows",
                  "required_before_values": True,
                  "available_in_this_workflow": False,
                  "status": "HARD_BLOCKER_BEFORE_VALUES",
                  "allowed_now": "document need for predeclared line/continuum windows",
                  "forbidden_now": "no 511 keV counts or flux extraction",
                  "notes": "Line and sideband windows remain unfinalized before values."
              },
              {
                  "item_id": "NO-VALUES-001",
                  "requirement": "no_values_opened",
                  "required_before_values": True,
                  "available_in_this_workflow": True,
                  "status": "PASS_NO_VALUES",
                  "allowed_now": "metadata-only route/index work",
                  "forbidden_now": "science value access",
                  "notes": "This workflow downloads no FITS and opens no science values."
              }
          ]

          ledger_path = out / "R13MUH_TIME_COVERAGE_QUERY_DESIGN_LEDGER.csv"
          with ledger_path.open("w", newline="", encoding="utf-8") as f:
              cols = ["item_id", "requirement", "required_before_values", "available_in_this_workflow", "status", "allowed_now", "forbidden_now", "notes"]
              w = csv.DictWriter(f, fieldnames=cols)
              w.writeheader()
              w.writerows(rows)

          query_template = {
              "stage": "R13MUH",
              "selected_scw_root": "https://heasarc.gsfc.nasa.gov/FTP/integral/data/scw/",
              "metadata_only_selection_algorithm": [
                  "1. Use the locked R9C/phase-gate UTC interval once supplied by a prior locked package.",
                  "2. Convert the interval to the official INTEGRAL time system only through a documented conversion.",
                  "3. Query or parse SCW metadata without downloading FITS.",
                  "4. Select candidate SCWs whose official start/stop metadata overlaps the locked interval plus predeclared margins.",
                  "5. Freeze selected SCW identifiers and route URLs before any science value step.",
                  "6. Stop if exact interval, time conversion, or metadata source is missing."
              ],
              "overlap_rule_prelock": "candidate_SCW if SCW_STOP >= TARGET_START_MINUS_MARGIN and SCW_START <= TARGET_STOP_PLUS_MARGIN",
              "margins_status": "not_locked_yet",
              "target_interval_status": "not_supplied_in_this_workflow",
              "science_values_authorized": False
          }
          (out / "R13MUH_TIME_COVERAGE_QUERY_TEMPLATE.json").write_text(json.dumps(query_template, indent=2), encoding="utf-8")
          PY

      - name: Check SCW root directory metadata only
        shell: bash
        run: |
          set -euo pipefail
          STAGE="ACIRM_R13MUH_GITHUB_ACTIONS_METADATA_ONLY_TIME_COVERAGE_QUERY_DESIGN_NO_VALUES"
          OUT="$GITHUB_WORKSPACE/${STAGE}_OUTPUT"
          python3 - <<'PY'
          from pathlib import Path
          from urllib.parse import urljoin
          import csv
          import json
          import os
          import re
          import urllib.request

          root = Path(os.environ["GITHUB_WORKSPACE"])
          out = root / "ACIRM_R13MUH_GITHUB_ACTIONS_METADATA_ONLY_TIME_COVERAGE_QUERY_DESIGN_NO_VALUES_OUTPUT"

          scw_root = "https://heasarc.gsfc.nasa.gov/FTP/integral/data/scw/"

          def small_get(url, timeout=25, max_bytes=600000):
              req = urllib.request.Request(url, headers={
                  "User-Agent": "ACIRM-R13MUH-time-coverage-design-no-values",
                  "Accept": "text/html,text/plain,*/*"
              })
              with urllib.request.urlopen(req, timeout=timeout) as r:
                  data = r.read(max_bytes + 1)
                  if len(data) > max_bytes:
                      data = data[:max_bytes]
                  text = data.decode("utf-8", errors="replace")
                  return {
                      "ok": True,
                      "status": getattr(r, "status", ""),
                      "content_type": r.headers.get("Content-Type", ""),
                      "chars": len(text),
                      "text": text,
                      "error": ""
                  }

          def hrefs_from_html(text):
              hrefs = re.findall(r"href=[\"']([^\"']+)[\"']", text, flags=re.I)
              clean = []
              for h in hrefs:
                  if not h or h.startswith("?") or h.startswith("#"):
                      continue
                  if h not in clean:
                      clean.append(h)
              return clean

          rows = []
          try:
              res = small_get(scw_root)
              hrefs = hrefs_from_html(res["text"])
              for h in hrefs[:500]:
                  clean = h.strip("/")
                  is_numeric_dir = clean.isdigit()
                  rows.append({
                      "source_url": scw_root,
                      "href": h,
                      "absolute_url": urljoin(scw_root, h),
                      "looks_directory": h.endswith("/"),
                      "numeric_dir_candidate": is_numeric_dir,
                      "numeric_dir_value": clean if is_numeric_dir else "",
                      "mentions_fits_name": ".fits" in h.lower() or ".fit" in h.lower() or ".fits.gz" in h.lower()
                  })
              root_summary = {
                  "scw_root_ok": True,
                  "status": res["status"],
                  "content_type": res["content_type"],
                  "chars": res["chars"],
                  "href_count_limited": len(hrefs[:500]),
                  "numeric_dir_candidate_count": sum(1 for r in rows if r["numeric_dir_candidate"]),
                  "downloaded_fits": False,
                  "opened_fits": False,
                  "read_science_values": False
              }
          except Exception as e:
              root_summary = {
                  "scw_root_ok": False,
                  "error": repr(e)[:500],
                  "href_count_limited": 0,
                  "numeric_dir_candidate_count": 0,
                  "downloaded_fits": False,
                  "opened_fits": False,
                  "read_science_values": False
              }

          with (out / "R13MUH_SCW_ROOT_NUMERIC_DIRECTORY_METADATA.csv").open("w", newline="", encoding="utf-8") as f:
              cols = ["source_url", "href", "absolute_url", "looks_directory", "numeric_dir_candidate", "numeric_dir_value", "mentions_fits_name"]
              w = csv.DictWriter(f, fieldnames=cols)
              w.writeheader()
              w.writerows(rows)

          (out / "R13MUH_SCW_ROOT_METADATA_SUMMARY.json").write_text(json.dumps(root_summary, indent=2), encoding="utf-8")
          PY

      - name: Design no-values decision
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import csv
          import json
          import os

          root = Path(os.environ["GITHUB_WORKSPACE"])
          out = root / "ACIRM_R13MUH_GITHUB_ACTIONS_METADATA_ONLY_TIME_COVERAGE_QUERY_DESIGN_NO_VALUES_OUTPUT"

          summary_path = out / "R13MUH_SCW_ROOT_METADATA_SUMMARY.json"
          ledger_path = out / "R13MUH_TIME_COVERAGE_QUERY_DESIGN_LEDGER.csv"

          root_summary = json.loads(summary_path.read_text()) if summary_path.exists() else {}
          ledger_rows = list(csv.DictReader(ledger_path.open(encoding="utf-8"))) if ledger_path.exists() else []

          scw_root_ok = bool(root_summary.get("scw_root_ok", False))
          numeric_dir_count = int(root_summary.get("numeric_dir_candidate_count", 0) or 0)

          hard_blockers = [
              r["requirement"] for r in ledger_rows
              if r.get("status") in ["HARD_BLOCKER_BEFORE_VALUES", "METHOD_REQUIRED_NO_VALUES"]
          ]

          no_values_confirmed = (
              root_summary.get("downloaded_fits") is False and
              root_summary.get("opened_fits") is False and
              root_summary.get("read_science_values") is False
          )

          if scw_root_ok and numeric_dir_count > 0 and no_values_confirmed:
              design_decision = "TIME_COVERAGE_QUERY_DESIGN_READY_INTERVAL_STILL_REQUIRED_VALUES_BLOCKED"
              next_stage = "R13MUI_LOCK_TARGET_INTERVAL_OR_METADATA_SOURCE_NO_VALUES"
          elif scw_root_ok and no_values_confirmed:
              design_decision = "TIME_COVERAGE_QUERY_DESIGN_BUILT_SCW_ROOT_OK_DIRECTORY_PARSE_WEAK_NO_VALUES"
              next_stage = "R13MUI_REPAIR_SCW_DIRECTORY_PARSE_OR_LOCK_INTERVAL_NO_VALUES"
          else:
              design_decision = "TIME_COVERAGE_QUERY_DESIGN_REPAIR_REQUIRED_NO_VALUES"
              next_stage = "R13MUI_REPAIR_SCW_ROOT_OR_NO_VALUES_CONFIRMATION"

          decision = {
              "stage": "ACIRM_R13MUH_GITHUB_ACTIONS_METADATA_ONLY_TIME_COVERAGE_QUERY_DESIGN_NO_VALUES",
              "design_decision": design_decision,
              "next_stage": next_stage,
              "scw_root_ok": scw_root_ok,
              "numeric_dir_candidate_count": numeric_dir_count,
              "hard_blockers_before_values": hard_blockers,
              "target_interval_supplied": False,
              "time_conversion_locked": False,
              "downloaded_fits": False,
              "opened_fits": False,
              "read_science_values": False,
              "science_values_authorized": False,
              "new_values_opened": False,
              "claim_ceiling": "metadata-only time coverage query design; no SPI/511 values"
          }
          (out / "R13MUH_TIME_COVERAGE_QUERY_DESIGN_DECISION.json").write_text(json.dumps(decision, indent=2), encoding="utf-8")
          print(json.dumps(decision, indent=2))
          PY

      - name: Package results
        shell: bash
        run: |
          set -euo pipefail
          STAGE="ACIRM_R13MUH_GITHUB_ACTIONS_METADATA_ONLY_TIME_COVERAGE_QUERY_DESIGN_NO_VALUES"
          OUT="$GITHUB_WORKSPACE/${STAGE}_OUTPUT"
          ZIP="$GITHUB_WORKSPACE/${STAGE}_RESULTS.zip"
          SHA="$ZIP.sha256.txt"

          cat > "$OUT/R13MUH_GO_NO_GO.csv" <<'CSV'
          question,decision,reason
          Open SPI/511 science values now?,NO,This stage is metadata-only time coverage query design.
          Download FITS now?,NO,FITS downloads remain forbidden.
          Is exact R9C/phase-gate interval supplied?,NO,This is the next hard blocker.
          Can this prove 511 keV or particle production?,NO,No values opened.
          CSV

          cd "$GITHUB_WORKSPACE"
          rm -f "$ZIP" "$SHA"
          zip -r "$ZIP" "$(basename "$OUT")"
          sha256sum "$ZIP" > "$SHA"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ACIRM_R13MUH_GITHUB_ACTIONS_METADATA_ONLY_TIME_COVERAGE_QUERY_DESIGN_NO_VALUES_RESULTS
          path: |
            ACIRM_R13MUH_GITHUB_ACTIONS_METADATA_ONLY_TIME_COVERAGE_QUERY_DESIGN_NO_VALUES_RESULTS.zip
            ACIRM_R13MUH_GITHUB_ACTIONS_METADATA_ONLY_TIME_COVERAGE_QUERY_DESIGN_NO_VALUES_RESULTS.zip.sha256.txt
          retention-days: 7
