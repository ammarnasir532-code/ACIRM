name: ACIRM R13M D wide catalog lag scan

on:
  workflow_dispatch:

jobs:
  r13m-d:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Run wide 10000d Fermi catalog lag context scan
        shell: bash
        run: |
          set +e
          STAGE="ACIRM_R13M_D_WIDE_10000D_FERMI_CATALOG_LAG_CONTEXT_NO_SCORE"
          OUT="$GITHUB_WORKSPACE/${STAGE}_OUTPUT"
          DATA="$GITHUB_WORKSPACE/${STAGE}_DATA"
          mkdir -p "$OUT" "$DATA"
          python3 -m pip install --user --no-cache-dir --upgrade numpy astropy > "$OUT/PIP_INSTALL.log" 2>&1
          python3 - <<'PY' > "$OUT/STDOUT.txt" 2> "$OUT/STDERR.txt"
          from pathlib import Path
          from urllib.request import Request, urlopen
          import csv, datetime, hashlib, json, math, os, shutil, subprocess, traceback
          import numpy as np
          from astropy.io import fits
          from astropy.time import Time

          STAGE = "ACIRM_R13M_D_WIDE_10000D_FERMI_CATALOG_LAG_CONTEXT_NO_SCORE"
          BASE = Path(os.environ.get("GITHUB_WORKSPACE", "/tmp/acirm_r13m_d"))
          OUT = BASE / (STAGE + "_OUTPUT")
          DATA = BASE / (STAGE + "_DATA")
          OUT.mkdir(parents=True, exist_ok=True)
          DATA.mkdir(parents=True, exist_ok=True)

          CFG = {
              "r9c_utc": "2022-05-18T20:40:57.672000+00:00",
              "cygx1_ra_deg": 299.590315,
              "cygx1_dec_deg": 35.201606,
              "roi_primary_deg": 5.0,
              "roi_audit_deg": 10.0,
              "operational_horizon_days": 10000.0,
              "catalog_url": "https://fermi.gsfc.nasa.gov/ssc/data/access/lat/14yr_catalog/gll_psc_v35.fit",
              "claim_ceiling": "catalog time-peak/source-context scan only; no photon extraction, no likelihood, no exposure correction, no score, no evidence/proof/discovery claim",
              "horizon_policy": "+/-10000 days is an operational audit/search horizon only, not a theoretical ceiling or falsification boundary. Non-detection in this horizon means observationally unresolved within the operational search range, not theory failure."
          }

          LAG_BINS = [
              (0.0, 7.0, "0_7d", "short_lag"),
              (7.0, 30.0, "7_30d", "short_medium_lag"),
              (30.0, 100.0, "30_100d", "medium_lag"),
              (100.0, 300.0, "100_300d", "medium_lag"),
              (300.0, 1000.0, "300_1000d", "long_lag"),
              (1000.0, 3000.0, "1000_3000d", "ultra_long_lag"),
              (3000.0, 10000.0, "3000_10000d", "operational_horizon_lag")
          ]

          def log(msg):
              print(str(msg), flush=True)
              with (OUT / "PROGRESS.log").open("a", encoding="utf-8") as f:
                  f.write(str(msg) + "\n")

          def write_json(name, obj):
              (OUT / name).write_text(json.dumps(obj, indent=2, ensure_ascii=False), encoding="utf-8")

          def write_csv(name, rows, cols):
              with (OUT / name).open("w", newline="", encoding="utf-8") as f:
                  w = csv.DictWriter(f, fieldnames=cols)
                  w.writeheader()
                  for r in rows:
                      w.writerow({c: r.get(c, "") for c in cols})

          def sha256(path):
              h = hashlib.sha256()
              with open(path, "rb") as f:
                  for b in iter(lambda: f.read(1024 * 1024), b""):
                      h.update(b)
              return h.hexdigest()

          def final(decision, next_stage, extra=None):
              d = {
                  "stage": STAGE,
                  "decision": decision,
                  "next_stage": next_stage,
                  "claim_ceiling": CFG["claim_ceiling"],
                  "horizon_policy": CFG["horizon_policy"],
                  "timestamp_utc": datetime.datetime.now(datetime.UTC).isoformat()
              }
              if extra:
                  d.update(extra)
              write_json("FINAL_DECISION.json", d)
              log("FINAL_DECISION: " + decision)

          def parse_utc(text):
              return datetime.datetime.fromisoformat(str(text).replace("Z", "+00:00")).astimezone(datetime.UTC)

          def run(cmd, timeout=300):
              try:
                  p = subprocess.run(cmd, stdout=subprocess.PIPE, stderr=subprocess.STDOUT, text=True, timeout=timeout)
                  return p.returncode, p.stdout
              except Exception as e:
                  return 999, repr(e)

          def download(url, dest):
              tmp = dest.with_suffix(dest.suffix + ".part")
              if tmp.exists():
                  try:
                      tmp.unlink()
                  except Exception:
                      pass
              row = {"url": url, "path": str(dest), "download_ok": False, "size_bytes": "", "sha256": "", "method": "", "exit_code": "", "error": ""}
              cmd = ["bash", "-lc", "curl -L --fail --connect-timeout 30 --max-time 900 --retry 3 --retry-delay 5 --retry-all-errors -o " + repr(str(tmp)) + " " + repr(url)]
              code, out = run(cmd, timeout=1020)
              (OUT / "CATALOG_DOWNLOAD_CURL.log").write_text(out[-5000:], encoding="utf-8")
              if code == 0 and tmp.exists() and tmp.stat().st_size > 0:
                  tmp.rename(dest)
                  row.update({"download_ok": True, "size_bytes": dest.stat().st_size, "sha256": sha256(dest), "method": "curl", "exit_code": code})
                  return row
              if tmp.exists():
                  try:
                      tmp.unlink()
                  except Exception:
                      pass
              try:
                  req = Request(url, headers={"User-Agent": "ACIRM-R13M-D/1.0"})
                  with urlopen(req, timeout=900) as r, open(tmp, "wb") as f:
                      shutil.copyfileobj(r, f, length=1024 * 1024)
                  if tmp.exists() and tmp.stat().st_size > 0:
                      tmp.rename(dest)
                      row.update({"download_ok": True, "size_bytes": dest.stat().st_size, "sha256": sha256(dest), "method": "urllib", "exit_code": 0})
                      return row
              except Exception as e:
                  row["error"] = repr(e)[:500]
              row.update({"method": "curl_urllib", "exit_code": "FAILED"})
              return row

          def bstr(x):
              try:
                  if hasattr(x, "item"):
                      x = x.item()
              except Exception:
                  pass
              if isinstance(x, bytes):
                  return x.decode("utf-8", errors="ignore").strip()
              if x is None:
                  return ""
              return str(x).strip()

          def cols_of(hdu):
              try:
                  return list(hdu.columns.names)
              except Exception:
                  return []

          def pick(cols, names):
              lut = {str(c).upper(): c for c in cols}
              for n in names:
                  if n.upper() in lut:
                      return lut[n.upper()]
              return None

          def rowval(row, col, default=""):
              if col is None:
                  return default
              try:
                  val = row[col]
                  try:
                      if hasattr(val, "mask") and bool(val.mask):
                          return default
                  except Exception:
                      pass
                  return val
              except Exception:
                  return default

          def ffloat(x, default=""):
              try:
                  v = float(x)
                  if not np.isfinite(v):
                      return default
                  return v
              except Exception:
                  return default

          def fint(x, default=""):
              try:
                  return int(x)
              except Exception:
                  return default

          def sep_deg(ra1, dec1, ra2, dec2):
              r1 = math.radians(float(ra1))
              d1 = math.radians(float(dec1))
              r2 = math.radians(float(ra2))
              d2 = math.radians(float(dec2))
              s = math.sin((d1 - d2) / 2.0) ** 2 + math.cos(d1) * math.cos(d2) * math.sin((r1 - r2) / 2.0) ** 2
              return math.degrees(2.0 * math.asin(min(1.0, math.sqrt(max(0.0, s)))))

          def classify_lag(delta_days):
              try:
                  d = float(delta_days)
              except Exception:
                  return "", "", False
              direction = "post" if d >= 0 else "pre"
              ad = abs(d)
              if ad > CFG["operational_horizon_days"]:
                  return direction, "beyond_10000d_operational_horizon", False
              for lo, hi, label, cls in LAG_BINS:
                  if ad >= lo and ad < hi:
                      return direction, label + "_" + cls, True
              if ad == CFG["operational_horizon_days"]:
                  return direction, "3000_10000d_operational_horizon_lag", True
              return direction, "unclassified_inside_horizon", True

          def time_peak_to_mjd(value):
              v = ffloat(value, "")
              if v == "":
                  return ""
              if v < 30000 or v > 80000:
                  return ""
              return v

          write_json("LOCKED_CONTEXT.json", {"stage": STAGE, **CFG, "lag_bins": LAG_BINS})
          log("R13M_D started: wide +/-10000 day catalog time-peak context scan; no photons and no score.")

          try:
              catalog_path = DATA / "gll_psc_v35.fit"
              drow = download(CFG["catalog_url"], catalog_path)
              write_csv("CATALOG_DOWNLOAD.csv", [drow], ["url", "path", "download_ok", "size_bytes", "sha256", "method", "exit_code", "error"])

              if not drow["download_ok"]:
                  final("TECHNICAL_STOP_4FGL_CATALOG_DOWNLOAD_FAILED_NO_SCORE", "RETRY_DOWNLOAD_OR_USE_EXISTING_CATALOG_FILE", {"download": drow})
              else:
                  r9c = parse_utc(CFG["r9c_utc"])
                  r9c_mjd = Time(r9c).mjd
                  source_rows = []
                  timepeak_rows = []
                  context = {}
                  errors = []

                  with fits.open(catalog_path, memmap=False) as hdul:
                      table = None
                      for h in hdul:
                          cols = cols_of(h)
                          if pick(cols, ["RAJ2000", "RA"]) and pick(cols, ["DEJ2000", "DEC"]):
                              table = h
                              break
                      if table is None:
                          raise RuntimeError("No source table with RA/DEC columns found in catalog")

                      cols = cols_of(table)
                      data = table.data
                      c_ra = pick(cols, ["RAJ2000", "RA"])
                      c_dec = pick(cols, ["DEJ2000", "DEC"])
                      c_name = pick(cols, ["Source_Name", "SourceName", "NAME"])
                      c_assoc1 = pick(cols, ["ASSOC1", "ASSOC"])
                      c_assoc2 = pick(cols, ["ASSOC2"])
                      c_class = pick(cols, ["CLASS1", "CLASS"])
                      c_sig = pick(cols, ["Signif_Avg", "Detection_Significance"])
                      c_var = pick(cols, ["Variability_Index"])
                      c_frac = pick(cols, ["Frac_Variability"])
                      c_tev = pick(cols, ["TeVCat_Flag", "TEVCAT_FLAG"])
                      c_flags = pick(cols, ["Flags", "FLAGS"])
                      c_tp = pick(cols, ["Time_Peak"])
                      c_tpi = pick(cols, ["Time_Peak_Interval"])
                      c_flux1 = pick(cols, ["Flux_1_100_GeV", "Flux1000"])
                      c_eflux = pick(cols, ["Energy_Flux100", "Energy_Flux"])

                      context = {
                          "table_hdu_name": str(getattr(table, "name", "")),
                          "row_count": int(len(data)),
                          "columns_available": cols,
                          "time_peak_column_found": bool(c_tp),
                          "time_peak_interval_column_found": bool(c_tpi),
                          "r9c_mjd": float(r9c_mjd)
                      }

                      for i, row in enumerate(data):
                          try:
                              ra = float(rowval(row, c_ra))
                              dec = float(rowval(row, c_dec))
                              s = sep_deg(CFG["cygx1_ra_deg"], CFG["cygx1_dec_deg"], ra, dec)
                              if s <= CFG["roi_audit_deg"]:
                                  tp_mjd = time_peak_to_mjd(rowval(row, c_tp))
                                  tp_delta = ""
                                  tp_utc = ""
                                  lag_direction = ""
                                  lag_bin = ""
                                  inside = False

                                  if tp_mjd != "":
                                      tp_delta = float(tp_mjd) - float(r9c_mjd)
                                      lag_direction, lag_bin, inside = classify_lag(tp_delta)
                                      try:
                                          tp_utc = Time(tp_mjd, format="mjd", scale="utc").utc.isot
                                      except Exception:
                                          tp_utc = ""

                                  out = {
                                      "row_index": i,
                                      "source_name": bstr(rowval(row, c_name)),
                                      "assoc1": bstr(rowval(row, c_assoc1)),
                                      "assoc2": bstr(rowval(row, c_assoc2)),
                                      "class": bstr(rowval(row, c_class)),
                                      "ra_deg": ra,
                                      "dec_deg": dec,
                                      "sep_from_cygx1_deg": s,
                                      "within_5deg": bool(s <= CFG["roi_primary_deg"]),
                                      "within_10deg": bool(s <= CFG["roi_audit_deg"]),
                                      "significance": ffloat(rowval(row, c_sig)),
                                      "variability_index": ffloat(rowval(row, c_var)),
                                      "frac_variability": ffloat(rowval(row, c_frac)),
                                      "tevcat_flag": bstr(rowval(row, c_tev)),
                                      "flags": fint(rowval(row, c_flags)),
                                      "flux_1_100_gev": ffloat(rowval(row, c_flux1)),
                                      "energy_flux": ffloat(rowval(row, c_eflux)),
                                      "time_peak_mjd": tp_mjd,
                                      "time_peak_utc": tp_utc,
                                      "time_peak_delta_days_from_r9c": tp_delta,
                                      "time_peak_lag_direction": lag_direction,
                                      "time_peak_lag_bin": lag_bin,
                                      "time_peak_inside_operational_horizon": bool(inside),
                                      "time_peak_interval": ffloat(rowval(row, c_tpi)),
                                      "claim": "CATALOG_CONTEXT_ONLY_NO_PHOTON_EXTRACTION_NO_SCORE"
                                  }
                                  source_rows.append(out)
                                  if tp_mjd != "" and inside:
                                      timepeak_rows.append(out)
                          except Exception as e:
                              errors.append({"row_index": i, "error": repr(e)[:200]})

                  source_rows = sorted(source_rows, key=lambda x: float(x["sep_from_cygx1_deg"]))
                  timepeak_rows = sorted(timepeak_rows, key=lambda x: abs(float(x["time_peak_delta_days_from_r9c"])))

                  src_cols = [
                      "row_index", "source_name", "assoc1", "assoc2", "class",
                      "ra_deg", "dec_deg", "sep_from_cygx1_deg",
                      "within_5deg", "within_10deg", "significance",
                      "variability_index", "frac_variability", "tevcat_flag",
                      "flags", "flux_1_100_gev", "energy_flux",
                      "time_peak_mjd", "time_peak_utc", "time_peak_delta_days_from_r9c",
                      "time_peak_lag_direction", "time_peak_lag_bin",
                      "time_peak_inside_operational_horizon", "time_peak_interval", "claim"
                  ]

                  write_csv("CATALOG_SOURCES_WITHIN_10DEG_CYGX1.csv", source_rows, src_cols)
                  write_csv("CATALOG_TIME_PEAK_CANDIDATES_WITHIN_10000D.csv", timepeak_rows, src_cols)
                  write_json("CATALOG_CONTEXT.json", context)
                  write_json("ROW_PARSE_ERRORS.json", {"error_count": len(errors), "errors_sample": errors[:50]})

                  bin_counts = {}
                  for r in timepeak_rows:
                      key = r.get("time_peak_lag_bin", "")
                      bin_counts[key] = bin_counts.get(key, 0) + 1

                  summary = {
                      "catalog_download_ok": True,
                      "catalog_sources_within_5deg": int(sum(1 for r in source_rows if r["within_5deg"])),
                      "catalog_sources_within_10deg": int(len(source_rows)),
                      "time_peak_column_found": bool(context.get("time_peak_column_found")),
                      "time_peak_candidates_within_10000d": int(len(timepeak_rows)),
                      "time_peak_lag_bin_counts": bin_counts,
                      "nearest_sources_sample": source_rows[:10],
                      "nearest_time_peak_candidates_sample": timepeak_rows[:10],
                      "claim_ceiling": CFG["claim_ceiling"],
                      "horizon_policy": CFG["horizon_policy"]
                  }

                  write_json("SUMMARY.json", summary)

                  if not context.get("time_peak_column_found"):
                      final("WIDE_10000D_CATALOG_CONTEXT_COMPLETED_NO_TIME_PEAK_COLUMN_NO_SCORE", "USE_PHOTON_WIDE_LAG_OR_EXTERNAL_TEV_NEUTRINO_ROUTE", {"summary": summary})
                  elif len(timepeak_rows) > 0:
                      final("WIDE_10000D_CATALOG_TIME_PEAK_CANDIDATES_FOUND_NO_SCORE", "ACIRM_R13M_E_TARGETED_PHOTON_OR_SOURCE_ASSOCIATION_FOR_CANDIDATE_LAGS", {"summary": summary})
                  else:
                      final("WIDE_10000D_CATALOG_CONTEXT_COMPLETED_NO_TIME_PEAK_CANDIDATES_NO_SCORE", "PROCEED_TO_WIDE_LAG_PHOTON_CHUNK_SCAN_OR_ALTERNATE_MESSENGERS", {"summary": summary})

                  try:
                      shutil.rmtree(DATA)
                  except Exception:
                      pass

          except Exception as e:
              (OUT / "EXCEPTION_TRACEBACK.txt").write_text(traceback.format_exc(), encoding="utf-8")
              final("TECHNICAL_STOP_EXCEPTION_DURING_R13M_D", "REPAIR_FROM_TRACEBACK", {"error": repr(e)[:500]})
          PY
          CODE=$?
          echo "controller_exit_code=$CODE" > "$OUT/STEP_STATUS.log"
          if [ ! -f "$OUT/FINAL_DECISION.json" ]; then
            echo '{"decision":"CONTROLLER_FAILED_BEFORE_FINAL_DECISION"}' > "$OUT/FINAL_DECISION.json"
          fi
          cd "$GITHUB_WORKSPACE"
          ZIP="$GITHUB_WORKSPACE/${STAGE}_RESULTS.zip"
          SHA="$ZIP.sha256.txt"
          rm -f "$ZIP" "$SHA"
          rm -rf "$GITHUB_WORKSPACE/${STAGE}_DATA"
          zip -r "$ZIP" "$(basename "$OUT")"
          sha256sum "$ZIP" > "$SHA"
          exit 0

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ACIRM_R13M_D_WIDE_10000D_FERMI_CATALOG_LAG_CONTEXT_NO_SCORE_RESULTS
          path: |
            ACIRM_R13M_D_WIDE_10000D_FERMI_CATALOG_LAG_CONTEXT_NO_SCORE_RESULTS.zip
            ACIRM_R13M_D_WIDE_10000D_FERMI_CATALOG_LAG_CONTEXT_NO_SCORE_RESULTS.zip.sha256.txt
          retention-days: 7
