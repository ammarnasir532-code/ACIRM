name: ACIRM R13M C direct audit

on:
  workflow_dispatch:

jobs:
  r13m-c:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - name: Run direct Fermi week raw audit
        shell: bash
        run: |
          set +e
          STAGE="ACIRM_R13M_C_DIRECT_FERMI_WEEK_RAW_AUDIT_NO_SCORE"
          OUT="$GITHUB_WORKSPACE/${STAGE}_OUTPUT"
          DATA="$GITHUB_WORKSPACE/${STAGE}_DATA"
          mkdir -p "$OUT" "$DATA"
          python3 -m pip install --user --no-cache-dir --upgrade numpy astropy > "$OUT/PIP_INSTALL.log" 2>&1
          python3 - <<'PY' > "$OUT/STDOUT.txt" 2> "$OUT/STDERR.txt"
          from pathlib import Path
          from urllib.request import Request, urlopen
          import csv, datetime, hashlib, json, math, os, re, shutil, subprocess, traceback
          import numpy as np
          from astropy.io import fits

          STAGE = "ACIRM_R13M_C_DIRECT_FERMI_WEEK_RAW_AUDIT_NO_SCORE"
          BASE = Path(os.environ.get("GITHUB_WORKSPACE", "/tmp/acirm"))
          OUT = BASE / (STAGE + "_OUTPUT")
          DATA = BASE / (STAGE + "_DATA")
          OUT.mkdir(parents=True, exist_ok=True)
          DATA.mkdir(parents=True, exist_ok=True)

          CFG = {
              "r9c_utc": "2022-05-18T20:40:57.672000+00:00",
              "ra": 299.590315,
              "dec": 35.201606,
              "roi_deg": 5.0,
              "off_radius_deg": 12.0,
              "n_off": 8,
              "zmax": 90.0,
              "fermi_epoch": "2001-01-01T00:00:00+00:00",
              "weekly_dir": "https://heasarc.gsfc.nasa.gov/FTP/fermi/data/lat/weekly/photon/",
              "weeks": [724, 725, 726, 727, 728, 729, 730, 731],
              "claim_ceiling": "raw direct-week Fermi photon count audit only; no likelihood, no exposure correction, no score, no evidence/proof/discovery claim"
          }

          WINDOWS = [
              ("P_0_1h", "post", 0, 3600, "real"),
              ("P_1_6h", "post", 3600, 21600, "real"),
              ("P_6_24h", "post", 21600, 86400, "real"),
              ("P_1_7d", "post", 86400, 604800, "real"),
              ("C_0_1h", "pre", -3600, 0, "real"),
              ("C_1_6h", "pre", -21600, -3600, "real"),
              ("C_6_24h", "pre", -86400, -21600, "real"),
              ("C_1_7d", "pre", -604800, -86400, "real"),
              ("S_plus7d", "shifted", 604800, 1123200, "shifted"),
              ("S_plus14d", "shifted", 1209600, 1814400, "shifted"),
              ("S_minus7d", "shifted", -1123200, -604800, "shifted"),
              ("S_minus14d", "shifted", -1814400, -1209600, "shifted")
          ]

          BANDS = [
              ("low_0p1_1GeV", 100.0, 1000.0),
              ("primary_1_1000GeV", 1000.0, 1000000.0)
          ]

          def log(x):
              print(str(x), flush=True)
              with (OUT / "PROGRESS.log").open("a", encoding="utf-8") as f:
                  f.write(str(x) + "\n")

          def write_json(name, obj):
              (OUT / name).write_text(json.dumps(obj, indent=2, ensure_ascii=False), encoding="utf-8")

          def write_csv(name, rows, cols):
              with (OUT / name).open("w", newline="", encoding="utf-8") as f:
                  w = csv.DictWriter(f, fieldnames=cols)
                  w.writeheader()
                  for r in rows:
                      w.writerow({c: r.get(c, "") for c in cols})

          def sha256(path):
              h = hashlib.sha256()
              with open(path, "rb") as f:
                  for b in iter(lambda: f.read(1024 * 1024), b""):
                      h.update(b)
              return h.hexdigest()

          def utc(s):
              return datetime.datetime.fromisoformat(s.replace("Z", "+00:00")).astimezone(datetime.UTC)

          def iso(t):
              return t.astimezone(datetime.UTC).isoformat().replace("+00:00", "Z")

          def met(t):
              return (t - utc(CFG["fermi_epoch"])).total_seconds()

          def metutc(x):
              return utc(CFG["fermi_epoch"]) + datetime.timedelta(seconds=float(x))

          def final(decision, next_stage, extra=None):
              d = {
                  "stage": STAGE,
                  "decision": decision,
                  "next_stage": next_stage,
                  "claim_ceiling": CFG["claim_ceiling"],
                  "timestamp_utc": datetime.datetime.now(datetime.UTC).isoformat()
              }
              if extra:
                  d.update(extra)
              write_json("FINAL_DECISION.json", d)
              log("FINAL_DECISION: " + decision)

          def run(cmd, timeout=120):
              try:
                  p = subprocess.run(cmd, stdout=subprocess.PIPE, stderr=subprocess.STDOUT, text=True, timeout=timeout)
                  return p.returncode, p.stdout
              except Exception as e:
                  return 999, repr(e)

          def http_text(url):
              req = Request(url, headers={"User-Agent": "ACIRM-R13M-C/1.0"})
              with urlopen(req, timeout=180) as r:
                  return r.read().decode("utf-8", errors="replace")

          def resolve_urls():
              try:
                  index = http_text(CFG["weekly_dir"])
              except Exception:
                  index = ""
              rows = []
              for wk in CFG["weeks"]:
                  m = re.search(rf"lat_photon_weekly_w{wk:03d}_p\d+_v\d+\.fits", index)
                  fname = m.group(0) if m else f"lat_photon_weekly_w{wk:03d}_p305_v001.fits"
                  rows.append({
                      "week": wk,
                      "file": fname,
                      "url": CFG["weekly_dir"] + fname,
                      "resolve": "index" if m else "default"
                  })
              return rows

          def download(row):
              dest = DATA / row["file"]
              tmp = dest.with_suffix(dest.suffix + ".part")
              if tmp.exists():
                  tmp.unlink()
              cmd = [
                  "bash",
                  "-lc",
                  "curl -L --fail --connect-timeout 30 --max-time 1800 --retry 3 --retry-delay 5 --retry-all-errors -o "
                  + repr(str(tmp)) + " " + repr(row["url"])
              ]
              code, out = run(cmd, timeout=1950)
              (OUT / ("download_w%03d.log" % row["week"])).write_text(out[-4000:], encoding="utf-8")
              ok = code == 0 and tmp.exists() and tmp.stat().st_size > 0
              if ok:
                  tmp.rename(dest)
              return {
                  "week": row["week"],
                  "file": row["file"],
                  "url": row["url"],
                  "download_ok": ok,
                  "size_bytes": dest.stat().st_size if ok else "",
                  "sha256": sha256(dest) if ok else "",
                  "exit_code": code,
                  "path": str(dest) if ok else ""
              }

          def build_windows():
              t0 = utc(CFG["r9c_utc"])
              rows = []
              for wid, direction, a, b, role in WINDOWS:
                  s = t0 + datetime.timedelta(seconds=a)
                  e = t0 + datetime.timedelta(seconds=b)
                  rows.append({
                      "window_id": wid,
                      "direction": direction,
                      "window_role": role,
                      "start_utc": iso(s),
                      "end_utc": iso(e),
                      "start_met": met(s),
                      "end_met": met(e)
                  })
              return rows

          def offset(ra, dec, dist, bearing):
              ra1, de1, d, br = map(math.radians, [ra, dec, dist, bearing])
              de2 = math.asin(math.sin(de1) * math.cos(d) + math.cos(de1) * math.sin(d) * math.cos(br))
              ra2 = ra1 + math.atan2(math.sin(br) * math.sin(d) * math.cos(de1), math.cos(d) - math.sin(de1) * math.sin(de2))
              return math.degrees(ra2) % 360.0, math.degrees(de2)

          def build_regions():
              rows = [{
                  "region_id": "ON",
                  "region_role": "on_source",
                  "ra": CFG["ra"],
                  "dec": CFG["dec"],
                  "roi": CFG["roi_deg"]
              }]
              for i in range(CFG["n_off"]):
                  ra, dec = offset(CFG["ra"], CFG["dec"], CFG["off_radius_deg"], i * 360.0 / CFG["n_off"])
                  rows.append({
                      "region_id": f"OFF_{i:02d}",
                      "region_role": "off_source",
                      "ra": ra,
                      "dec": dec,
                      "roi": CFG["roi_deg"]
                  })
              return rows

          def sep(ra, dec, ra0, dec0):
              r1, d1 = np.radians(np.asarray(ra, float)), np.radians(np.asarray(dec, float))
              r2, d2 = math.radians(ra0), math.radians(dec0)
              x = np.sin((d1 - d2) / 2) ** 2 + np.cos(d1) * math.cos(d2) * np.sin((r1 - r2) / 2) ** 2
              return np.degrees(2 * np.arcsin(np.sqrt(np.clip(x, 0, 1))))

          def find_hdu(hdul):
              for h in hdul:
                  if hasattr(h, "columns") and h.columns is not None:
                      cols = [c.upper() for c in h.columns.names]
                      if all(x in cols for x in ["TIME", "ENERGY", "RA", "DEC"]):
                          return h
              return None

          def count(path, week, wins, regs):
              rows, top, schema = [], [], []
              try:
                  with fits.open(path, memmap=True) as hdul:
                      h = find_hdu(hdul)
                      if h is None:
                          schema.append({"week": week, "status": "NO_EVENT_HDU"})
                          return rows, top, schema

                      d = h.data
                      cols = [c.upper() for c in h.columns.names]
                      t = np.asarray(d["TIME"], float)
                      en = np.asarray(d["ENERGY"], float)
                      ra = np.asarray(d["RA"], float)
                      de = np.asarray(d["DEC"], float)

                      if "ZENITH_ANGLE" in cols:
                          zen = np.asarray(d["ZENITH_ANGLE"], float)
                          zmask = zen <= CFG["zmax"]
                      else:
                          zmask = np.ones_like(t, dtype=bool)

                      good = np.isfinite(t) & np.isfinite(en) & np.isfinite(ra) & np.isfinite(de) & zmask
                      schema.append({"week": week, "status": "OK", "rows_total": int(len(t)), "rows_good": int(good.sum())})

                      for reg in regs:
                          sd = sep(ra, de, reg["ra"], reg["dec"])
                          rmask = good & (sd <= reg["roi"])
                          for w in wins:
                              tw = rmask & (t >= w["start_met"]) & (t < w["end_met"])
                              for band, emin, emax in BANDS:
                                  m = tw & (en >= emin) & (en < emax)
                                  n = int(m.sum())
                                  mx = ""
                                  utcmax = ""
                                  mind = ""
                                  if n:
                                      idx = np.where(m)[0]
                                      im = idx[np.argmax(en[idx])]
                                      mx = float(en[im])
                                      utcmax = iso(metutc(float(t[im])))
                                      mind = float(sd[idx].min())
                                      top.append({
                                          "week": week,
                                          "region_id": reg["region_id"],
                                          "window_id": w["window_id"],
                                          "band": band,
                                          "energy_mev": mx,
                                          "time_utc": utcmax,
                                          "sep_deg": float(sd[im])
                                      })
                                  rows.append({
                                      "week": week,
                                      "region_id": reg["region_id"],
                                      "region_role": reg["region_role"],
                                      "window_id": w["window_id"],
                                      "direction": w["direction"],
                                      "window_role": w["window_role"],
                                      "band": band,
                                      "raw_count": n,
                                      "max_energy_mev": mx,
                                      "max_time_utc": utcmax,
                                      "min_sep_deg": mind
                                  })
              except Exception as e:
                  schema.append({"week": week, "status": "EXCEPTION:" + repr(e)[:300]})
              return rows, top, schema

          def aggregate(rows):
              d = {}
              for r in rows:
                  k = (r["region_id"], r["region_role"], r["window_id"], r["direction"], r["window_role"], r["band"])
                  if k not in d:
                      d[k] = {
                          "region_id": r["region_id"],
                          "region_role": r["region_role"],
                          "window_id": r["window_id"],
                          "direction": r["direction"],
                          "window_role": r["window_role"],
                          "band": r["band"],
                          "raw_count_total": 0,
                          "weeks": set()
                      }
                  d[k]["raw_count_total"] += int(r["raw_count"])
                  d[k]["weeks"].add(str(r["week"]))
              out = []
              for v in d.values():
                  v["weeks"] = ",".join(sorted(v["weeks"], key=lambda x: int(x)))
                  out.append(v)
              return out

          def comparisons(agg):
              primary = "primary_1_1000GeV"
              rows = [x for x in agg if x["band"] == primary]
              by = {(x["window_id"], x["region_id"]): int(x["raw_count_total"]) for x in rows}

              onoff = []
              for wid in sorted(set(x["window_id"] for x in rows)):
                  on = by.get((wid, "ON"), 0)
                  offs = [by.get((wid, f"OFF_{i:02d}"), 0) for i in range(CFG["n_off"])]
                  mean = float(np.mean(offs)) if offs else 0.0
                  onoff.append({
                      "window_id": wid,
                      "on_count": on,
                      "off_mean": mean,
                      "on_minus_off_mean": on - mean,
                      "on_over_off_mean": on / mean if mean > 0 else ""
                  })

              pairs = []
              for lab, p, c in [
                  ("0_1h", "P_0_1h", "C_0_1h"),
                  ("1_6h", "P_1_6h", "C_1_6h"),
                  ("6_24h", "P_6_24h", "C_6_24h"),
                  ("1_7d", "P_1_7d", "C_1_7d")
              ]:
                  pc, cc = by.get((p, "ON"), 0), by.get((c, "ON"), 0)
                  pairs.append({
                      "lag": lab,
                      "post_count": pc,
                      "pre_count": cc,
                      "post_minus_pre": pc - cc,
                      "post_over_pre": pc / cc if cc > 0 else ""
                  })

              shift = [by.get((x, "ON"), 0) for x in ["S_plus7d", "S_plus14d", "S_minus7d", "S_minus14d"]]
              sm = float(np.mean(shift)) if shift else 0.0
              p7 = by.get(("P_1_7d", "ON"), 0)
              pairs.append({
                  "lag": "1_7d_vs_shifted_mean",
                  "post_count": p7,
                  "pre_count": sm,
                  "post_minus_pre": p7 - sm,
                  "post_over_pre": p7 / sm if sm > 0 else ""
              })
              return onoff, pairs

          try:
              write_json("LOCKED_CONTEXT.json", {"stage": STAGE, **CFG})
              wins, regs = build_windows(), build_regions()
              urls = resolve_urls()

              write_csv("WINDOWS.csv", wins, ["window_id", "direction", "window_role", "start_utc", "end_utc", "start_met", "end_met"])
              write_csv("REGIONS.csv", regs, ["region_id", "region_role", "ra", "dec", "roi"])
              write_csv("DIRECT_WEEK_URLS.csv", urls, ["week", "file", "url", "resolve"])

              downloads, counts, tops, schemas = [], [], [], []
              for u in urls:
                  log("Downloading week %03d" % u["week"])
                  dr = download(u)
                  downloads.append(dr)
                  if dr["download_ok"]:
                      log("Counting week %03d" % u["week"])
                      c, t, s = count(Path(dr["path"]), u["week"], wins, regs)
                      counts += c
                      tops += t
                      schemas += s

              agg = aggregate(counts)
              onoff, pairs = comparisons(agg)

              write_csv("DOWNLOADS.csv", downloads, ["week", "file", "url", "download_ok", "size_bytes", "sha256", "exit_code", "path"])
              write_csv("SCHEMA.csv", schemas, ["week", "status", "rows_total", "rows_good"])
              write_csv("RAW_COUNTS.csv", counts, ["week", "region_id", "region_role", "window_id", "direction", "window_role", "band", "raw_count", "max_energy_mev", "max_time_utc", "min_sep_deg"])
              write_csv("AGG_COUNTS.csv", agg, ["region_id", "region_role", "window_id", "direction", "window_role", "band", "raw_count_total", "weeks"])
              write_csv("TOP_EVENTS_NOT_SCORE.csv", tops, ["week", "region_id", "window_id", "band", "energy_mev", "time_utc", "sep_deg"])
              write_csv("ON_OFF_PRIMARY.csv", onoff, ["window_id", "on_count", "off_mean", "on_minus_off_mean", "on_over_off_mean"])
              write_csv("POST_PRE_SHIFTED_PRIMARY.csv", pairs, ["lag", "post_count", "pre_count", "post_minus_pre", "post_over_pre"])

              on_real = sum(
                  int(x["raw_count_total"]) for x in agg
                  if x["region_id"] == "ON" and x["window_role"] == "real" and x["band"] == "primary_1_1000GeV"
              )
              high = max(
                  [float(x["energy_mev"]) for x in tops if x["region_id"] == "ON" and x["band"] == "primary_1_1000GeV"] or [0.0]
              )

              summary = {
                  "downloaded_week_files": sum(1 for x in downloads if x["download_ok"]),
                  "raw_rows": len(counts),
                  "aggregated_rows": len(agg),
                  "on_source_real_primary_count": on_real,
                  "highest_on_source_primary_energy_mev": high,
                  "claim_ceiling": CFG["claim_ceiling"]
              }
              write_json("SUMMARY.json", summary)

              if summary["downloaded_week_files"] == 0:
                  final("TECHNICAL_STOP_NO_DIRECT_WEEK_FILES_DOWNLOADED_NO_SCORE", "CHECK_URLS_OR_USE_LAT_DATA_SERVER", {"summary": summary})
              elif on_real > 0:
                  final("RAW_DIRECT_WEEK_ON_OFF_SHIFTED_AUDIT_COMPLETED_HIGH_ENERGY_PHOTONS_PRESENT_NO_SCORE", "ACIRM_R13M_D_ADJUDICATE_RAW_CONTROL_AUDIT_NO_SCORE", {"summary": summary})
              else:
                  final("RAW_DIRECT_WEEK_AUDIT_COMPLETED_NO_ONSOURCE_HIGH_ENERGY_PHOTONS_IN_SELECTED_REAL_WINDOWS_NO_SCORE", "EXPAND_WIDE_LAG_OR_ALTERNATE_MESSENGER", {"summary": summary})

              try:
                  shutil.rmtree(DATA)
              except Exception:
                  pass

          except Exception as e:
              (OUT / "EXCEPTION_TRACEBACK.txt").write_text(traceback.format_exc(), encoding="utf-8")
              final("TECHNICAL_STOP_EXCEPTION", "REPAIR_FROM_TRACEBACK", {"error": repr(e)[:500]})
          PY
          CODE=$?
          echo "controller_exit_code=$CODE" > "$OUT/STEP_STATUS.log"
          if [ ! -f "$OUT/FINAL_DECISION.json" ]; then
            echo '{"decision":"CONTROLLER_FAILED_BEFORE_FINAL_DECISION"}' > "$OUT/FINAL_DECISION.json"
          fi
          cd "$GITHUB_WORKSPACE"
          ZIP="$GITHUB_WORKSPACE/${STAGE}_RESULTS.zip"
          SHA="$ZIP.sha256.txt"
          rm -f "$ZIP" "$SHA"
          rm -rf "$GITHUB_WORKSPACE/${STAGE}_DATA"
          zip -r "$ZIP" "$(basename "$OUT")"
          sha256sum "$ZIP" > "$SHA"
          exit 0

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ACIRM_R13M_C_DIRECT_FERMI_WEEK_RAW_AUDIT_NO_SCORE_RESULTS
          path: |
            ACIRM_R13M_C_DIRECT_FERMI_WEEK_RAW_AUDIT_NO_SCORE_RESULTS.zip
            ACIRM_R13M_C_DIRECT_FERMI_WEEK_RAW_AUDIT_NO_SCORE_RESULTS.zip.sha256.txt
          retention-days: 7
