name: ACIRM R13M K no gate sky controls

on:
  workflow_dispatch:

jobs:
  r13m-k:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Run no gate sky control for 300 1000d
        shell: bash
        run: |
          set +e
          STAGE="ACIRM_R13M_K_NO_GATE_SKY_CONTROL_300_1000D_NO_SCORE"
          OUT="$GITHUB_WORKSPACE/${STAGE}_OUTPUT"
          DATA="$GITHUB_WORKSPACE/${STAGE}_DATA"
          mkdir -p "$OUT" "$DATA"
          python3 -m pip install --user --no-cache-dir --upgrade numpy astropy > "$OUT/PIP_INSTALL.log" 2>&1
          python3 - <<'PY' > "$OUT/STDOUT.txt" 2> "$OUT/STDERR.txt"
          from pathlib import Path
          from urllib.request import Request, urlopen
          import csv, datetime, hashlib, json, math, os, re, shutil, subprocess, traceback
          import numpy as np
          from astropy.io import fits

          STAGE = "ACIRM_R13M_K_NO_GATE_SKY_CONTROL_300_1000D_NO_SCORE"
          BASE = Path(os.environ.get("GITHUB_WORKSPACE", "/tmp/acirm_r13m_k"))
          OUT = BASE / (STAGE + "_OUTPUT")
          DATA = BASE / (STAGE + "_DATA")
          OUT.mkdir(parents=True, exist_ok=True)
          DATA.mkdir(parents=True, exist_ok=True)

          CFG = {
              "r9c_utc": "2022-05-18T20:40:57.672000+00:00",
              "cygx1_ra_deg": 299.590315,
              "cygx1_dec_deg": 35.201606,
              "roi_deg": 5.0,
              "zmax": 90.0,
              "weekly_dir": "https://heasarc.gsfc.nasa.gov/FTP/fermi/data/lat/weekly/photon/",
              "claim_ceiling": "raw no-gate sky-control diagnostic only; no likelihood, no exposure correction, no score, no evidence/proof/discovery claim",
              "horizon_policy": "+/-10000 days is an operational search/audit horizon only, not a theoretical ceiling or falsification boundary.",
              "theory_policy": "R9C is the locked gate. This stage tests whether the 300-1000d late-lag raw excess near Cyg X-1 is unusual against no-gate sky control regions. It does not test particle production or prove causal propagation."
          }

          TARGETS = [
              {"lag_bin":"300_1000d", "sample_point":"start", "direction":"post", "target_day":307, "week":772},
              {"lag_bin":"300_1000d", "sample_point":"mid",   "direction":"post", "target_day":650, "week":821},
              {"lag_bin":"300_1000d", "sample_point":"end",   "direction":"post", "target_day":993, "week":870},
              {"lag_bin":"300_1000d", "sample_point":"start", "direction":"pre",  "target_day":-307, "week":684},
              {"lag_bin":"300_1000d", "sample_point":"mid",   "direction":"pre",  "target_day":-650, "week":635},
              {"lag_bin":"300_1000d", "sample_point":"end",   "direction":"pre",  "target_day":-993, "week":586}
          ]

          BANDS = [
              ("low_0p1_1GeV", 100.0, 1000.0),
              ("primary_1_1000GeV", 1000.0, 1000000.0),
              ("high_10_1000GeV", 10000.0, 1000000.0),
              ("vhigh_100_1000GeV", 100000.0, 1000000.0)
          ]

          def log(msg):
              print(str(msg), flush=True)
              with (OUT / "PROGRESS.log").open("a", encoding="utf-8") as f:
                  f.write(str(msg) + "\n")

          def write_json(name, obj):
              (OUT / name).write_text(json.dumps(obj, indent=2, ensure_ascii=False), encoding="utf-8")

          def write_csv(name, rows, cols):
              with (OUT / name).open("w", newline="", encoding="utf-8") as f:
                  w = csv.DictWriter(f, fieldnames=cols)
                  w.writeheader()
                  for r in rows:
                      w.writerow({c: r.get(c, "") for c in cols})

          def sha256(path):
              h = hashlib.sha256()
              with open(path, "rb") as f:
                  for b in iter(lambda: f.read(1024 * 1024), b""):
                      h.update(b)
              return h.hexdigest()

          def final(decision, next_stage, extra=None):
              obj = {
                  "stage": STAGE,
                  "decision": decision,
                  "next_stage": next_stage,
                  "claim_ceiling": CFG["claim_ceiling"],
                  "horizon_policy": CFG["horizon_policy"],
                  "theory_policy": CFG["theory_policy"],
                  "timestamp_utc": datetime.datetime.now(datetime.UTC).isoformat()
              }
              if extra:
                  obj.update(extra)
              write_json("FINAL_DECISION.json", obj)
              log("FINAL_DECISION: " + decision)

          def run(cmd, timeout=120):
              try:
                  p = subprocess.run(cmd, stdout=subprocess.PIPE, stderr=subprocess.STDOUT, text=True, timeout=timeout)
                  return p.returncode, p.stdout
              except Exception as e:
                  return 999, repr(e)

          def http_text(url, timeout=180):
              req = Request(url, headers={"User-Agent": "ACIRM-R13M-K/1.0"})
              with urlopen(req, timeout=timeout) as r:
                  return r.read().decode("utf-8", errors="replace")

          def parse_index():
              try:
                  html = http_text(CFG["weekly_dir"], timeout=180)
              except Exception as e:
                  log("WARNING index fetch failed: " + repr(e))
                  return {}
              out = {}
              for m in re.finditer(r"lat_photon_weekly_w(\d{3,4})_p\d+_v\d+\.fits", html):
                  out[int(m.group(1))] = m.group(0)
              return out

          def resolve_url(wk, index):
              fname = index.get(int(wk), f"lat_photon_weekly_w{int(wk):03d}_p305_v001.fits")
              return CFG["weekly_dir"] + fname, fname, "index" if int(wk) in index else "default"

          def download(row):
              dest = DATA / row["file"]
              tmp = dest.with_suffix(dest.suffix + ".part")
              if tmp.exists():
                  try:
                      tmp.unlink()
                  except Exception:
                      pass
              cmd = [
                  "bash", "-lc",
                  "curl -L --fail --connect-timeout 30 --max-time 1800 --retry 3 --retry-delay 5 --retry-all-errors -o "
                  + repr(str(tmp)) + " " + repr(row["url"])
              ]
              code, out = run(cmd, timeout=1950)
              (OUT / ("download_w%03d.log" % int(row["week"]))).write_text(out[-4000:], encoding="utf-8")
              ok = code == 0 and tmp.exists() and tmp.stat().st_size > 0
              if ok:
                  tmp.rename(dest)
              return {
                  "week": row["week"], "file": row["file"], "url": row["url"],
                  "download_ok": ok, "size_bytes": dest.stat().st_size if ok else "",
                  "sha256": sha256(dest) if ok else "", "exit_code": code,
                  "path": str(dest) if ok else ""
              }

          def wrap_ra(x):
              return float(x) % 360.0

          def build_regions():
              rows = [{"region_id":"R9C_CYGX1", "region_role":"r9c_gate_target", "ra":CFG["cygx1_ra_deg"], "dec":CFG["cygx1_dec_deg"], "roi":CFG["roi_deg"], "note":"locked R9C Cyg X-1 direction"}]
              ra0 = CFG["cygx1_ra_deg"]
              dec0 = CFG["cygx1_dec_deg"]
              offsets = [30, 60, 90, 120, 150, 180, 210, 240, 270, 300]
              for j, off in enumerate(offsets):
                  rows.append({"region_id":f"NOGATE_RA{off:03d}", "region_role":"no_gate_shifted_sky_control", "ra":wrap_ra(ra0 + off), "dec":dec0, "roi":CFG["roi_deg"], "note":f"same Dec as Cyg X-1, RA shifted by {off} deg"})
              rows.append({"region_id":"NOGATE_NORTH", "region_role":"no_gate_shifted_sky_control", "ra":ra0, "dec":min(84.0, dec0 + 35.0), "roi":CFG["roi_deg"], "note":"north shifted Dec control"})
              rows.append({"region_id":"NOGATE_SOUTH", "region_role":"no_gate_shifted_sky_control", "ra":ra0, "dec":max(-84.0, dec0 - 35.0), "roi":CFG["roi_deg"], "note":"south shifted Dec control"})
              return rows

          def sep(ra, dec, ra0, dec0):
              r1, d1 = np.radians(np.asarray(ra, float)), np.radians(np.asarray(dec, float))
              r2, d2 = math.radians(float(ra0)), math.radians(float(dec0))
              x = np.sin((d1 - d2) / 2.0) ** 2 + np.cos(d1) * math.cos(d2) * np.sin((r1 - r2) / 2.0) ** 2
              return np.degrees(2 * np.arcsin(np.sqrt(np.clip(x, 0, 1))))

          def find_hdu(hdul):
              for h in hdul:
                  if hasattr(h, "columns") and h.columns is not None:
                      try:
                          cols = [c.upper() for c in h.columns.names]
                      except Exception:
                          cols = []
                      if all(x in cols for x in ["TIME", "ENERGY", "RA", "DEC"]):
                          return h
              return None

          def met_to_utc(met):
              epoch = datetime.datetime.fromisoformat("2001-01-01T00:00:00+00:00").astimezone(datetime.UTC)
              return epoch + datetime.timedelta(seconds=float(met))

          def iso(t):
              return t.astimezone(datetime.UTC).isoformat().replace("+00:00", "Z")

          def count_file(path, target, regs):
              rows, tops, schema = [], [], []
              week = int(target["week"])
              try:
                  with fits.open(path, memmap=True) as hdul:
                      h = find_hdu(hdul)
                      if h is None:
                          schema.append({"week": week, "status":"NO_EVENT_HDU"})
                          return rows, tops, schema
                      d = h.data
                      cols = [c.upper() for c in h.columns.names]
                      t = np.asarray(d["TIME"], float)
                      en = np.asarray(d["ENERGY"], float)
                      ra = np.asarray(d["RA"], float)
                      de = np.asarray(d["DEC"], float)
                      if "ZENITH_ANGLE" in cols:
                          zen = np.asarray(d["ZENITH_ANGLE"], float)
                          zmask = zen <= CFG["zmax"]
                      else:
                          zen = np.zeros_like(t) + np.nan
                          zmask = np.ones_like(t, dtype=bool)
                      good = np.isfinite(t) & np.isfinite(en) & np.isfinite(ra) & np.isfinite(de) & zmask
                      schema.append({"week": week, "status":"OK", "rows_total": int(len(t)), "rows_good": int(good.sum())})
                      for reg in regs:
                          sd = sep(ra, de, reg["ra"], reg["dec"])
                          rmask = good & (sd <= reg["roi"])
                          for band, emin, emax in BANDS:
                              m = rmask & (en >= emin) & (en < emax)
                              n = int(m.sum())
                              mx = ""; tu = ""; ms = ""
                              if n:
                                  idx = np.where(m)[0]
                                  im = idx[np.argmax(en[idx])]
                                  mx = float(en[im])
                                  tu = iso(met_to_utc(float(t[im])))
                                  ms = float(sd[idx].min())
                                  tops.append({
                                      "week": week, "sample_point": target["sample_point"], "direction": target["direction"],
                                      "region_id": reg["region_id"], "region_role": reg["region_role"], "band": band,
                                      "energy_mev": mx, "time_utc": tu, "sep_deg": float(sd[im])
                                  })
                              rows.append({
                                  "week": week, "sample_point": target["sample_point"], "direction": target["direction"],
                                  "target_day": target["target_day"], "region_id": reg["region_id"], "region_role": reg["region_role"],
                                  "band": band, "raw_count": n, "max_energy_mev": mx, "max_time_utc": tu, "min_sep_deg": ms,
                                  "claim": "RAW_NO_GATE_SKY_CONTROL_COUNT_ONLY_NO_EXPOSURE_NO_LIKELIHOOD_NO_SCORE"
                              })
              except Exception as e:
                  schema.append({"week": week, "status":"EXCEPTION:" + repr(e)[:300]})
              return rows, tops, schema

          def aggregate(rows):
              d = {}
              for r in rows:
                  k = (r["sample_point"], r["direction"], r["region_id"], r["region_role"], r["band"])
                  if k not in d:
                      d[k] = {"sample_point":r["sample_point"], "direction":r["direction"], "region_id":r["region_id"], "region_role":r["region_role"], "band":r["band"], "raw_count_total":0, "weeks":set()}
                  d[k]["raw_count_total"] += int(r["raw_count"])
                  d[k]["weeks"].add(str(r["week"]))
              out = []
              for v in d.values():
                  v["weeks"] = ",".join(sorted(v["weeks"], key=lambda x:int(x)))
                  out.append(v)
              return out

          def compare_regions(agg):
              primary = "primary_1_1000GeV"
              rows = [x for x in agg if x["band"] == primary]
              regions = sorted(set((x["region_id"], x["region_role"]) for x in rows))
              by = {(x["region_id"], x["sample_point"], x["direction"]): int(x["raw_count_total"]) for x in rows}
              region_rows = []
              for rid, role in regions:
                  post_sum = sum(by.get((rid, sp, "post"), 0) for sp in ["start", "mid", "end"])
                  pre_sum = sum(by.get((rid, sp, "pre"), 0) for sp in ["start", "mid", "end"])
                  region_rows.append({
                      "region_id": rid, "region_role": role,
                      "post_on_count_sum": post_sum, "pre_on_count_sum": pre_sum,
                      "post_minus_pre_sum": post_sum - pre_sum,
                      "post_over_pre_sum": post_sum / pre_sum if pre_sum > 0 else ""
                  })
              target = [r for r in region_rows if r["region_id"] == "R9C_CYGX1"]
              controls = [r for r in region_rows if r["region_role"] == "no_gate_shifted_sky_control"]
              target_excess = int(target[0]["post_minus_pre_sum"]) if target else 0
              control_excess = [int(r["post_minus_pre_sum"]) for r in controls]
              rank_ge = sum(1 for x in control_excess if x >= target_excess)
              max_control = max(control_excess) if control_excess else None
              mean_control = float(np.mean(control_excess)) if control_excess else None
              median_control = float(np.median(control_excess)) if control_excess else None
              summary = {
                  "target_region": "R9C_CYGX1",
                  "target_post_minus_pre_primary": target_excess,
                  "no_gate_control_n": len(control_excess),
                  "no_gate_control_mean_excess": mean_control,
                  "no_gate_control_median_excess": median_control,
                  "no_gate_control_max_excess": max_control,
                  "controls_with_excess_ge_target": rank_ge,
                  "target_exceeds_all_no_gate_controls": bool(control_excess and target_excess > max_control),
                  "target_minus_control_mean": target_excess - mean_control if mean_control is not None else "",
                  "interpretation": "raw sky-control diagnostic only; not exposure corrected and not a score"
              }
              return region_rows, summary

          try:
              write_json("LOCKED_CONTEXT.json", {"stage":STAGE, **CFG, "targets":TARGETS})
              log("R13M_K started: no-gate shifted-sky controls for 300-1000d candidate; no score.")
              index = parse_index()
              regs = build_regions()
              urls = []
              for t in TARGETS:
                  url, fname, method = resolve_url(t["week"], index)
                  urls.append({**t, "file":fname, "url":url, "resolve":method})
              write_csv("TARGET_WEEK_PLAN.csv", TARGETS, ["lag_bin","sample_point","direction","target_day","week"])
              write_csv("DIRECT_WEEK_URLS.csv", urls, ["lag_bin","sample_point","direction","target_day","week","file","url","resolve"])
              write_csv("SKY_REGIONS.csv", regs, ["region_id","region_role","ra","dec","roi","note"])
              downloads = []; counts = []; tops = []; schemas = []
              for u in urls:
                  log("Downloading week %03d %s %s" % (u["week"], u["sample_point"], u["direction"]))
                  dr = download(u)
                  downloads.append(dr)
                  if dr["download_ok"]:
                      log("Counting week %03d" % u["week"])
                      c, top, sc = count_file(Path(dr["path"]), u, regs)
                      counts += c; tops += top; schemas += sc
              agg = aggregate(counts)
              region_summary, sky_summary = compare_regions(agg)
              write_csv("DOWNLOADS.csv", downloads, ["week","file","url","download_ok","size_bytes","sha256","exit_code","path"])
              write_csv("SCHEMA.csv", schemas, ["week","status","rows_total","rows_good"])
              write_csv("RAW_COUNTS.csv", counts, ["week","sample_point","direction","target_day","region_id","region_role","band","raw_count","max_energy_mev","max_time_utc","min_sep_deg","claim"])
              write_csv("TOP_EVENTS_NOT_SCORE.csv", tops, ["week","sample_point","direction","region_id","region_role","band","energy_mev","time_utc","sep_deg"])
              write_csv("AGG_COUNTS.csv", agg, ["sample_point","direction","region_id","region_role","band","raw_count_total","weeks"])
              write_csv("NO_GATE_SKY_REGION_PRIMARY_SUMMARY.csv", region_summary, ["region_id","region_role","post_on_count_sum","pre_on_count_sum","post_minus_pre_sum","post_over_pre_sum"])
              write_json("NO_GATE_SKY_CONTROL_SUMMARY.json", sky_summary)
              high = max([float(x["energy_mev"]) for x in tops if x["region_id"]=="R9C_CYGX1" and x["band"]=="primary_1_1000GeV"] or [0.0])
              final_summary = {
                  "downloaded_week_files": sum(1 for x in downloads if x["download_ok"]),
                  "raw_rows": len(counts),
                  "aggregated_rows": len(agg),
                  "highest_target_primary_energy_mev": high,
                  "sky_control_summary": sky_summary,
                  "claim_ceiling": CFG["claim_ceiling"],
                  "horizon_policy": CFG["horizon_policy"]
              }
              write_json("SUMMARY.json", final_summary)
              if final_summary["downloaded_week_files"] == 0:
                  final("TECHNICAL_STOP_NO_WEEK_FILES_DOWNLOADED_NO_SCORE", "RETRY_OR_USE_EXISTING_WEEK_FILES", {"summary": final_summary})
              elif sky_summary.get("target_exceeds_all_no_gate_controls"):
                  final("RAW_300_1000D_CANDIDATE_EXCEEDS_NO_GATE_SKY_CONTROLS_NO_SCORE", "ACIRM_R13M_L_DECIDE_FULL_EXPOSURE_OR_NO_GATE_COHORT_REPLICATION", {"summary": final_summary})
              else:
                  final("RAW_300_1000D_CANDIDATE_NOT_UNIQUE_VS_NO_GATE_SKY_CONTROLS_NO_SCORE", "ACIRM_R13M_L_ADJUDICATE_OR_REPAIR_WITH_EXPOSURE_AWARE_CONTROLS", {"summary": final_summary})
              try:
                  shutil.rmtree(DATA)
              except Exception:
                  pass
          except Exception as e:
              (OUT / "EXCEPTION_TRACEBACK.txt").write_text(traceback.format_exc(), encoding="utf-8")
              final("TECHNICAL_STOP_EXCEPTION_DURING_R13M_K", "REPAIR_FROM_TRACEBACK", {"error":repr(e)[:500]})
          PY
          CODE=$?
          echo "controller_exit_code=$CODE" > "$OUT/STEP_STATUS.log"
          if [ ! -f "$OUT/FINAL_DECISION.json" ]; then
            echo '{"decision":"CONTROLLER_FAILED_BEFORE_FINAL_DECISION"}' > "$OUT/FINAL_DECISION.json"
          fi
          cd "$GITHUB_WORKSPACE"
          ZIP="$GITHUB_WORKSPACE/${STAGE}_RESULTS.zip"
          SHA="$ZIP.sha256.txt"
          rm -f "$ZIP" "$SHA"
          rm -rf "$GITHUB_WORKSPACE/${STAGE}_DATA"
          zip -r "$ZIP" "$(basename "$OUT")"
          sha256sum "$ZIP" > "$SHA"
          exit 0

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ACIRM_R13M_K_NO_GATE_SKY_CONTROL_300_1000D_NO_SCORE_RESULTS
          path: |
            ACIRM_R13M_K_NO_GATE_SKY_CONTROL_300_1000D_NO_SCORE_RESULTS.zip
            ACIRM_R13M_K_NO_GATE_SKY_CONTROL_300_1000D_NO_SCORE_RESULTS.zip.sha256.txt
          retention-days: 7
