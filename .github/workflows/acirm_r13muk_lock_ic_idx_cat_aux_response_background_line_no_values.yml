name: ACIRM R13MUK lock IC IDX CAT AUX response background line no values

on:
  workflow_dispatch:

jobs:
  lock-routes-method:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lock no-values scope
        shell: bash
        run: |
          set -euo pipefail
          STAGE="ACIRM_R13MUK_GITHUB_ACTIONS_LOCK_IC_IDX_CAT_AUX_RESPONSE_BACKGROUND_LINE_NO_VALUES"
          OUT="$GITHUB_WORKSPACE/${STAGE}_OUTPUT"
          mkdir -p "$OUT"
          cat > "$OUT/R13MUK_ROUTE_LOCK.json" <<'JSON'
          {
            "stage": "ACIRM_R13MUK_GITHUB_ACTIONS_LOCK_IC_IDX_CAT_AUX_RESPONSE_BACKGROUND_LINE_NO_VALUES",
            "opens_science_values": false,
            "downloads_science_products": false,
            "downloads_fits": false,
            "reads_fits_tables": false,
            "purpose": "Lock official OSA route roots and pre-value background/511-keV line-window protocol without opening values",
            "forbidden": [
              "SPI spectra",
              "SPI images",
              "511 keV flux/count/intensity values",
              "FITS download",
              "FITS science product opening",
              "FITS table reading",
              "science-window value extraction",
              "particle-production claim"
            ],
            "claim_ceiling": "route and method lock only; no SPI/511 values"
          }
          JSON

      - name: System info
        shell: bash
        run: |
          set -euo pipefail
          STAGE="ACIRM_R13MUK_GITHUB_ACTIONS_LOCK_IC_IDX_CAT_AUX_RESPONSE_BACKGROUND_LINE_NO_VALUES"
          OUT="$GITHUB_WORKSPACE/${STAGE}_OUTPUT"
          {
            echo "date_utc=$(date -u)"
            echo "runner_os=$RUNNER_OS"
            echo "runner_arch=$RUNNER_ARCH"
            echo "kernel=$(uname -a)"
            python3 --version || true
            df -h
          } > "$OUT/R13MUK_SYSTEM_INFO.txt"

      - name: Build route and method lock ledgers
        shell: bash
        run: |
          set -euo pipefail
          STAGE="ACIRM_R13MUK_GITHUB_ACTIONS_LOCK_IC_IDX_CAT_AUX_RESPONSE_BACKGROUND_LINE_NO_VALUES"
          OUT="$GITHUB_WORKSPACE/${STAGE}_OUTPUT"
          python3 - <<'PY'
          from pathlib import Path
          import csv
          import json
          import os

          out = Path(os.environ["GITHUB_WORKSPACE"]) / "ACIRM_R13MUK_GITHUB_ACTIONS_LOCK_IC_IDX_CAT_AUX_RESPONSE_BACKGROUND_LINE_NO_VALUES_OUTPUT"
          out.mkdir(parents=True, exist_ok=True)

          routes = [
              ["ROOT", "official_integral_data_root", "https://heasarc.gsfc.nasa.gov/FTP/integral/data/"],
              ["IC", "instrument_characteristics_tree", "https://heasarc.gsfc.nasa.gov/FTP/integral/data/ic/"],
              ["IDX", "index_tree", "https://heasarc.gsfc.nasa.gov/FTP/integral/data/idx/"],
              ["CAT", "catalog_tree", "https://heasarc.gsfc.nasa.gov/FTP/integral/data/cat/"],
              ["AUX", "auxiliary_tree", "https://heasarc.gsfc.nasa.gov/FTP/integral/data/aux/"],
              ["SCW", "locked_scw_tree_context", "https://heasarc.gsfc.nasa.gov/FTP/integral/data/scw/"],
              ["SCW-2504", "locked_day_manifest_revision_context", "https://heasarc.gsfc.nasa.gov/FTP/integral/data/scw/2504/"]
          ]
          with (out / "R13MUK_OFFICIAL_ROUTE_ROOTS_TO_LOCK.csv").open("w", newline="", encoding="utf-8") as f:
              w = csv.writer(f)
              w.writerow(["route_id", "component", "url", "allowed_now", "forbidden_now"])
              for rid, comp, url in routes:
                  w.writerow([rid, comp, url, "small_html_index_or_head_only", "no_fits_no_science_values"])

          method_rows = [
              ["LINE-511", "line_window", 508.0, 514.0, "keV", "pre-value engineering lock centered on 511 keV; not a detection value"],
              ["SIDE-LOW", "lower_continuum_sideband", 490.0, 500.0, "keV", "predeclared sideband; no counts opened"],
              ["SIDE-HIGH", "upper_continuum_sideband", 522.0, 532.0, "keV", "predeclared sideband; no counts opened"]
          ]
          with (out / "R13MUK_511KEV_LINE_AND_SIDEBAND_PREVALUE_LOCK.csv").open("w", newline="", encoding="utf-8") as f:
              w = csv.writer(f)
              w.writerow(["window_id", "role", "emin_keV", "emax_keV", "unit", "notes"])
              w.writerows(method_rows)

          background = {
              "stage": "R13MUK",
              "background_method_status": "PREVALUE_PROTOCOL_LOCK_ONLY_NOT_FIT",
              "locked_rules": [
                  "No background fitting in this stage.",
                  "No SPI counts or flux values in this stage.",
                  "Future value stage must use predeclared on-window and predeclared sidebands.",
                  "Future value stage must include off-time or off-region controls before any claim.",
                  "Strict +/-1h R9C product claim remains forbidden from R13MUI because pm1h_rows=0.",
                  "UTC-day SCW manifest remains context-only until values are explicitly authorized."
              ],
              "science_values_authorized": false
          }
          (out / "R13MUK_BACKGROUND_METHOD_PREVALUE_LOCK.json").write_text(json.dumps(background, indent=2), encoding="utf-8")
          PY

      - name: Reachability and response metadata discovery no values
        shell: bash
        run: |
          set -euo pipefail
          STAGE="ACIRM_R13MUK_GITHUB_ACTIONS_LOCK_IC_IDX_CAT_AUX_RESPONSE_BACKGROUND_LINE_NO_VALUES"
          OUT="$GITHUB_WORKSPACE/${STAGE}_OUTPUT"
          python3 - <<'PY'
          from pathlib import Path
          from urllib.parse import urljoin
          import csv
          import json
          import os
          import re
          import urllib.request

          out = Path(os.environ["GITHUB_WORKSPACE"]) / "ACIRM_R13MUK_GITHUB_ACTIONS_LOCK_IC_IDX_CAT_AUX_RESPONSE_BACKGROUND_LINE_NO_VALUES_OUTPUT"
          routes_path = out / "R13MUK_OFFICIAL_ROUTE_ROOTS_TO_LOCK.csv"

          def small_get(url, timeout=25, max_bytes=400000):
              req = urllib.request.Request(url, headers={
                  "User-Agent": "ACIRM-R13MUK-route-method-lock-no-values",
                  "Accept": "text/html,text/plain,*/*"
              })
              with urllib.request.urlopen(req, timeout=timeout) as r:
                  data = r.read(max_bytes + 1)
                  if len(data) > max_bytes:
                      data = data[:max_bytes]
                  text = data.decode("utf-8", errors="replace")
                  return {
                      "ok": True,
                      "status": getattr(r, "status", ""),
                      "final_url": r.geturl(),
                      "content_type": r.headers.get("Content-Type", ""),
                      "chars": len(text),
                      "text": text,
                      "error": ""
                  }

          def hrefs_from_html(text):
              hrefs = re.findall(r"href=[\"']([^\"']+)[\"']", text, flags=re.I)
              clean = []
              for h in hrefs:
                  if not h or h.startswith("?") or h.startswith("#"):
                      continue
                  if h not in clean:
                      clean.append(h)
              return clean

          roots = list(csv.DictReader(routes_path.open(encoding="utf-8")))
          route_rows = []
          href_rows = []

          for r in roots:
              url = r["url"]
              try:
                  res = small_get(url)
                  low = res["text"].lower()
                  hrefs = hrefs_from_html(res["text"])
                  route_rows.append({
                      "route_id": r["route_id"],
                      "component": r["component"],
                      "url": url,
                      "tested": True,
                      "ok": True,
                      "status": res["status"],
                      "content_type": res["content_type"],
                      "chars_limited": res["chars"],
                      "href_count_limited": len(hrefs[:400]),
                      "contains_index_terms": "index of" in low or "parent directory" in low or "href" in low,
                      "contains_fits_name": ".fits" in low or ".fit" in low or ".fits.gz" in low,
                      "contains_response_token": any(x in low for x in ["response", "resp", "rmf", "irf"]),
                      "error": ""
                  })
                  for h in hrefs[:400]:
                      lname = h.lower()
                      href_rows.append({
                          "source_route_id": r["route_id"],
                          "href": h,
                          "absolute_url": urljoin(url, h),
                          "looks_directory": h.endswith("/"),
                          "mentions_spi": "spi" in lname,
                          "mentions_response": "response" in lname,
                          "mentions_resp": "resp" in lname,
                          "mentions_rmf": "rmf" in lname,
                          "mentions_irf": "irf" in lname,
                          "mentions_fits_name": ".fits" in lname or ".fit" in lname or ".fits.gz" in lname
                      })
              except Exception as e:
                  route_rows.append({
                      "route_id": r["route_id"],
                      "component": r["component"],
                      "url": url,
                      "tested": True,
                      "ok": False,
                      "status": "",
                      "content_type": "",
                      "chars_limited": 0,
                      "href_count_limited": 0,
                      "contains_index_terms": False,
                      "contains_fits_name": False,
                      "contains_response_token": False,
                      "error": repr(e)[:500]
                  })

          with (out / "R13MUK_ROUTE_ROOT_REACHABILITY_METADATA_ONLY.csv").open("w", newline="", encoding="utf-8") as f:
              cols = ["route_id", "component", "url", "tested", "ok", "status", "content_type", "chars_limited", "href_count_limited", "contains_index_terms", "contains_fits_name", "contains_response_token", "error"]
              w = csv.DictWriter(f, fieldnames=cols)
              w.writeheader()
              w.writerows(route_rows)

          with (out / "R13MUK_ROUTE_HREF_DISCOVERY_METADATA_ONLY.csv").open("w", newline="", encoding="utf-8") as f:
              cols = ["source_route_id", "href", "absolute_url", "looks_directory", "mentions_spi", "mentions_response", "mentions_resp", "mentions_rmf", "mentions_irf", "mentions_fits_name"]
              w = csv.DictWriter(f, fieldnames=cols)
              w.writeheader()
              w.writerows(href_rows)

          response_candidates = [
              h for h in href_rows
              if h["source_route_id"] == "IC" and (
                  h["mentions_spi"] or h["mentions_response"] or h["mentions_resp"] or h["mentions_rmf"] or h["mentions_irf"]
              )
          ]
          with (out / "R13MUK_RESPONSE_CANDIDATES_FROM_IC_INDEX_METADATA_ONLY.csv").open("w", newline="", encoding="utf-8") as f:
              cols = ["source_route_id", "href", "absolute_url", "looks_directory", "mentions_spi", "mentions_response", "mentions_resp", "mentions_rmf", "mentions_irf", "mentions_fits_name"]
              w = csv.DictWriter(f, fieldnames=cols)
              w.writeheader()
              w.writerows(response_candidates)

          summary = {
              "route_rows": len(route_rows),
              "route_ok_count": sum(1 for r in route_rows if r["ok"]),
              "href_rows": len(href_rows),
              "response_candidate_rows_from_ic_index": len(response_candidates),
              "downloaded_fits": False,
              "opened_fits": False,
              "read_science_values": False
          }
          (out / "R13MUK_ROUTE_DISCOVERY_SUMMARY.json").write_text(json.dumps(summary, indent=2), encoding="utf-8")
          PY

      - name: Classify route and method lock no values
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import csv
          import json
          import os

          out = Path(os.environ["GITHUB_WORKSPACE"]) / "ACIRM_R13MUK_GITHUB_ACTIONS_LOCK_IC_IDX_CAT_AUX_RESPONSE_BACKGROUND_LINE_NO_VALUES_OUTPUT"
          route_path = out / "R13MUK_ROUTE_ROOT_REACHABILITY_METADATA_ONLY.csv"
          response_path = out / "R13MUK_RESPONSE_CANDIDATES_FROM_IC_INDEX_METADATA_ONLY.csv"
          line_path = out / "R13MUK_511KEV_LINE_AND_SIDEBAND_PREVALUE_LOCK.csv"

          routes = list(csv.DictReader(route_path.open(encoding="utf-8"))) if route_path.exists() else []
          responses = list(csv.DictReader(response_path.open(encoding="utf-8"))) if response_path.exists() else []
          line_rows = list(csv.DictReader(line_path.open(encoding="utf-8"))) if line_path.exists() else []

          required = ["ROOT", "IC", "IDX", "CAT", "AUX", "SCW", "SCW-2504"]
          ok_routes = [r["route_id"] for r in routes if str(r.get("ok")).lower() == "true"]
          missing = [r for r in required if r not in ok_routes]

          no_values_ok = True
          response_candidates_found = len(responses) > 0
          line_windows_locked = len(line_rows) == 3

          if len(missing) == 0 and response_candidates_found and line_windows_locked and no_values_ok:
              lock_decision = "ROUTE_ROOTS_AND_RESPONSE_CANDIDATES_AND_LINE_WINDOWS_LOCKED_VALUES_STILL_BLOCKED"
              next_stage = "R13MUL_OFFTIME_CONTROL_AND_VALUE_STAGE_ENTRY_CRITERIA_LOCK_NO_VALUES"
          elif len(missing) == 0 and line_windows_locked and no_values_ok:
              lock_decision = "ROUTE_ROOTS_AND_LINE_WINDOWS_LOCKED_RESPONSE_EXACT_VERSION_STILL_WEAK_VALUES_BLOCKED"
              next_stage = "R13MUL_REPAIR_EXACT_SPI_RESPONSE_DISCOVERY_OR_LOCK_VALUE_ENTRY_NO_VALUES"
          else:
              lock_decision = "ROUTE_OR_METHOD_LOCK_REPAIR_REQUIRED_NO_VALUES"
              next_stage = "R13MUL_REPAIR_ROUTE_OR_METHOD_LOCK_NO_VALUES"

          decision = {
              "stage": "ACIRM_R13MUK_GITHUB_ACTIONS_LOCK_IC_IDX_CAT_AUX_RESPONSE_BACKGROUND_LINE_NO_VALUES",
              "lock_decision": lock_decision,
              "next_stage": next_stage,
              "ok_routes": ok_routes,
              "missing_required_routes": missing,
              "response_candidate_rows_from_ic_index": len(responses),
              "line_windows_locked": line_windows_locked,
              "line_window_keV": "508-514",
              "sidebands_keV": ["490-500", "522-532"],
              "background_method_status": "prevalue_protocol_lock_only_not_fit",
              "downloaded_fits": False,
              "opened_fits": False,
              "read_science_values": False,
              "science_values_authorized": False,
              "new_values_opened": False,
              "hard_blockers_before_values": [
                  "exact_SPI_response_IRF_RMF_file_version_may_still_need_deep_lock",
                  "off_time_and_off_region_controls_not_locked",
                  "expert_protocol_review_not_completed",
                  "no_counts_flux_spectrum_values_authorized"
              ],
              "claim_ceiling": "route/method lock only; no SPI/511 values"
          }
          (out / "R13MUK_ROUTE_METHOD_LOCK_DECISION.json").write_text(json.dumps(decision, indent=2), encoding="utf-8")
          print(json.dumps(decision, indent=2))
          PY

      - name: Package results
        shell: bash
        run: |
          set -euo pipefail
          STAGE="ACIRM_R13MUK_GITHUB_ACTIONS_LOCK_IC_IDX_CAT_AUX_RESPONSE_BACKGROUND_LINE_NO_VALUES"
          OUT="$GITHUB_WORKSPACE/${STAGE}_OUTPUT"
          ZIP="$GITHUB_WORKSPACE/${STAGE}_RESULTS.zip"
          SHA="$ZIP.sha256.txt"

          cat > "$OUT/R13MUK_GO_NO_GO.csv" <<'CSV'
          question,decision,reason
          Open SPI/511 science values now?,NO,This stage locks routes and method only.
          Download FITS now?,NO,FITS downloads remain forbidden.
          Are line and sideband windows prelocked?,SEE_DECISION,Read R13MUK_ROUTE_METHOD_LOCK_DECISION.json.
          Is background fitted?,NO,Background method is protocol-locked only, not fit.
          Can this prove 511 keV or particle production?,NO,No values opened.
          CSV

          cd "$GITHUB_WORKSPACE"
          rm -f "$ZIP" "$SHA"
          zip -r "$ZIP" "$(basename "$OUT")"
          sha256sum "$ZIP" > "$SHA"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ACIRM_R13MUK_GITHUB_ACTIONS_LOCK_IC_IDX_CAT_AUX_RESPONSE_BACKGROUND_LINE_NO_VALUES_RESULTS
          path: |
            ACIRM_R13MUK_GITHUB_ACTIONS_LOCK_IC_IDX_CAT_AUX_RESPONSE_BACKGROUND_LINE_NO_VALUES_RESULTS.zip
            ACIRM_R13MUK_GITHUB_ACTIONS_LOCK_IC_IDX_CAT_AUX_RESPONSE_BACKGROUND_LINE_NO_VALUES_RESULTS.zip.sha256.txt
          retention-days: 7
