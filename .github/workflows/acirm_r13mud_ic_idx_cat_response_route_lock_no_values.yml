name: ACIRM R13MUD OSA IC IDX CAT response route lock no values

on:
  workflow_dispatch:

jobs:
  route-lock:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lock no-values scope
        shell: bash
        run: |
          set -euo pipefail
          STAGE="ACIRM_R13MUD_GITHUB_ACTIONS_IC_IDX_CAT_RESPONSE_ROUTE_LOCK_NO_VALUES"
          OUT="$GITHUB_WORKSPACE/${STAGE}_OUTPUT"
          mkdir -p "$OUT"
          cat > "$OUT/R13MUD_ROUTE_LOCK.json" <<'JSON'
          {
            "stage": "ACIRM_R13MUD_GITHUB_ACTIONS_IC_IDX_CAT_RESPONSE_ROUTE_LOCK_NO_VALUES",
            "opens_science_values": false,
            "downloads_science_products": false,
            "downloads_fits": false,
            "reads_fits_tables": false,
            "purpose": "Inspect OSA container path metadata for IC/IDX/CAT/response route candidates only",
            "forbidden": [
              "SPI spectra",
              "SPI images",
              "511 keV flux/count/intensity values",
              "FITS science product opening",
              "FITS table reading",
              "science-window value extraction",
              "particle-production claim"
            ],
            "claim_ceiling": "OSA route metadata only"
          }
          JSON

      - name: System info
        shell: bash
        run: |
          set -euo pipefail
          STAGE="ACIRM_R13MUD_GITHUB_ACTIONS_IC_IDX_CAT_RESPONSE_ROUTE_LOCK_NO_VALUES"
          OUT="$GITHUB_WORKSPACE/${STAGE}_OUTPUT"
          {
            echo "date_utc=$(date -u)"
            echo "runner_os=$RUNNER_OS"
            echo "runner_arch=$RUNNER_ARCH"
            echo "kernel=$(uname -a)"
            docker --version || true
            df -h
          } > "$OUT/R13MUD_SYSTEM_INFO.txt"

      - name: Free disk space safely
        shell: bash
        run: |
          set -euo pipefail
          STAGE="ACIRM_R13MUD_GITHUB_ACTIONS_IC_IDX_CAT_RESPONSE_ROUTE_LOCK_NO_VALUES"
          OUT="$GITHUB_WORKSPACE/${STAGE}_OUTPUT"
          {
            echo "Before cleanup:"
            df -h
          } > "$OUT/R13MUD_DISK_CLEANUP_LOG.txt"

          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /usr/local/.ghcup || true
          docker system prune -af || true

          {
            echo "After cleanup:"
            df -h
          } >> "$OUT/R13MUD_DISK_CLEANUP_LOG.txt"

      - name: Pull official OSA Docker image
        shell: bash
        timeout-minutes: 90
        run: |
          set -euo pipefail
          STAGE="ACIRM_R13MUD_GITHUB_ACTIONS_IC_IDX_CAT_RESPONSE_ROUTE_LOCK_NO_VALUES"
          OUT="$GITHUB_WORKSPACE/${STAGE}_OUTPUT"
          OSA_IMAGE="integralsw/osa:11.2-2-g667521a3-20220403-190332-refcat-43.0-OSA11.0-66-g149047e"
          echo "$OSA_IMAGE" > "$OUT/R13MUD_OSA_IMAGE_USED.txt"
          docker pull "$OSA_IMAGE" 2>&1 | tee "$OUT/R13MUD_DOCKER_PULL_OSA.log"

      - name: Inspect OSA route metadata only
        shell: bash
        run: |
          set -euo pipefail
          STAGE="ACIRM_R13MUD_GITHUB_ACTIONS_IC_IDX_CAT_RESPONSE_ROUTE_LOCK_NO_VALUES"
          OUT="$GITHUB_WORKSPACE/${STAGE}_OUTPUT"
          OSA_IMAGE="$(cat "$OUT/R13MUD_OSA_IMAGE_USED.txt")"

          docker run --rm "$OSA_IMAGE" /bin/bash -lc '
          set +e
          echo ACIRM_R13MUD_INSPECT_START
          echo "NO_FITS_OPENING_NO_SCIENCE_VALUES"
          whoami
          pwd
          uname -a
          echo "ENVIRONMENT_BEGIN"
          env | sort | egrep "OSA|ISDC|REP|HEADAS|COMMONLOG|CURRENT|DAL|SPI|IC|IDX|CAT|AUX|SCW|RESP|IRF|RMF" || true
          echo "ENVIRONMENT_END"

          echo "COMMANDS_BEGIN"
          which spi_science_analysis || true
          which og_create || true
          which dal_list || true
          which dal_verify || true
          which idx_find || true
          which cat_extract || true
          echo "COMMANDS_END"

          echo "TOP_LEVEL_DIRS_BEGIN"
          find / -maxdepth 2 -type d 2>/dev/null | sort | head -500
          echo "TOP_LEVEL_DIRS_END"

          echo "ROUTE_DIR_CANDIDATES_BEGIN"
          find / -maxdepth 6 -type d \( \
            -iname "ic" -o -iname "idx" -o -iname "cat" -o -iname "aux" -o -iname "scw" -o \
            -iname "*ic*" -o -iname "*idx*" -o -iname "*cat*" -o -iname "*resp*" -o \
            -iname "*response*" -o -iname "*rmf*" -o -iname "*irf*" -o -iname "*spi*" \
          \) 2>/dev/null | sort | head -1000
          echo "ROUTE_DIR_CANDIDATES_END"

          echo "ROUTE_FILE_CANDIDATES_BEGIN"
          find / -maxdepth 7 -type f \( \
            -iname "*spi*" -o -iname "*response*" -o -iname "*resp*" -o \
            -iname "*rmf*" -o -iname "*irf*" -o -iname "*idx*" -o \
            -iname "*cat*" -o -iname "*ic*" \
          \) 2>/dev/null | sort | head -2000
          echo "ROUTE_FILE_CANDIDATES_END"

          echo "NO_VALUES_CONFIRMATION"
          echo "No FITS files were opened. No spectra/images/flux/counts were requested."
          echo ACIRM_R13MUD_INSPECT_END
          ' > "$OUT/R13MUD_OSA_ROUTE_METADATA_INSPECT.txt" 2>&1 || true

      - name: Classify route metadata no values
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import json
          import os
          import re

          root = Path(os.environ["GITHUB_WORKSPACE"])
          out = root / "ACIRM_R13MUD_GITHUB_ACTIONS_IC_IDX_CAT_RESPONSE_ROUTE_LOCK_NO_VALUES_OUTPUT"
          txt_path = out / "R13MUD_OSA_ROUTE_METADATA_INSPECT.txt"
          txt = txt_path.read_text(errors="replace") if txt_path.exists() else ""
          low = txt.lower()

          has_start_end = "acirm_r13mud_inspect_start" in low and "acirm_r13mud_inspect_end" in low
          has_spi_cmd = "spi_science_analysis" in low
          has_dal_cmd = "dal_list" in low
          has_ic_token = bool(re.search(r"(^|[/_ -])ic([/_ -]|$)", low)) or "/ic" in low or "ic_tree" in low
          has_idx_token = "idx" in low
          has_cat_token = "cat" in low
          has_aux_token = "aux" in low
          has_scw_token = "scw" in low
          has_response_token = any(x in low for x in ["response", "resp", "rmf", "irf"])
          has_spi_token = "spi" in low
          no_values_confirmed = "no fits files were opened" in low and "no spectra/images/flux/counts" in low

          if has_start_end and has_spi_cmd and has_dal_cmd and (has_ic_token or has_idx_token or has_cat_token or has_response_token):
              route_readiness = "OSA_CONTAINER_ROUTE_METADATA_VISIBLE_VALUES_STILL_BLOCKED"
              next_stage = "R13MUE_FORMAL_OSA_DATA_REQUIREMENT_LEDGER_NO_VALUES"
          elif has_start_end and has_spi_cmd and has_dal_cmd:
              route_readiness = "OSA_COMMANDS_VISIBLE_BUT_DATA_ROUTE_METADATA_WEAK_VALUES_BLOCKED"
              next_stage = "R13MUE_REPAIR_ROUTE_METADATA_SEARCH_NO_VALUES"
          else:
              route_readiness = "OSA_ROUTE_METADATA_NOT_CONFIRMED_VALUES_NO_GO"
              next_stage = "R13MUE_REPAIR_GITHUB_ACTIONS_ROUTE_INSPECT_NO_VALUES"

          decision = {
              "stage": "ACIRM_R13MUD_GITHUB_ACTIONS_IC_IDX_CAT_RESPONSE_ROUTE_LOCK_NO_VALUES",
              "route_readiness": route_readiness,
              "next_stage": next_stage,
              "has_start_end": has_start_end,
              "has_spi_science_analysis_text": has_spi_cmd,
              "has_dal_list_text": has_dal_cmd,
              "has_ic_token": has_ic_token,
              "has_idx_token": has_idx_token,
              "has_cat_token": has_cat_token,
              "has_aux_token": has_aux_token,
              "has_scw_token": has_scw_token,
              "has_response_token": has_response_token,
              "has_spi_token": has_spi_token,
              "no_values_confirmed": no_values_confirmed,
              "science_values_authorized": False,
              "new_values_opened": False,
              "claim_ceiling": "OSA route metadata only; no SPI/511 values"
          }
          (out / "R13MUD_ROUTE_METADATA_DECISION.json").write_text(json.dumps(decision, indent=2), encoding="utf-8")
          print(json.dumps(decision, indent=2))
          PY

      - name: Package results
        shell: bash
        run: |
          set -euo pipefail
          STAGE="ACIRM_R13MUD_GITHUB_ACTIONS_IC_IDX_CAT_RESPONSE_ROUTE_LOCK_NO_VALUES"
          OUT="$GITHUB_WORKSPACE/${STAGE}_OUTPUT"
          ZIP="$GITHUB_WORKSPACE/${STAGE}_RESULTS.zip"
          SHA="$ZIP.sha256.txt"

          cat > "$OUT/R13MUD_GO_NO_GO.csv" <<'CSV'
          question,decision,reason
          Open SPI/511 science values now?,NO,This stage is route metadata only.
          Are IC/IDX/CAT/response candidates visible?,SEE_DECISION,Read R13MUD_ROUTE_METADATA_DECISION.json.
          Did this open FITS or science products?,NO,No values opened.
          Can this prove 511 keV or particle production?,NO,No values opened and no product chain.
          CSV

          cd "$GITHUB_WORKSPACE"
          rm -f "$ZIP" "$SHA"
          zip -r "$ZIP" "$(basename "$OUT")"
          sha256sum "$ZIP" > "$SHA"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ACIRM_R13MUD_GITHUB_ACTIONS_IC_IDX_CAT_RESPONSE_ROUTE_LOCK_NO_VALUES_RESULTS
          path: |
            ACIRM_R13MUD_GITHUB_ACTIONS_IC_IDX_CAT_RESPONSE_ROUTE_LOCK_NO_VALUES_RESULTS.zip
            ACIRM_R13MUD_GITHUB_ACTIONS_IC_IDX_CAT_RESPONSE_ROUTE_LOCK_NO_VALUES_RESULTS.zip.sha256.txt
          retention-days: 7
