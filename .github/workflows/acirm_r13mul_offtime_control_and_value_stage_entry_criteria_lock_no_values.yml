name: ACIRM R13MUL offtime control and value stage entry criteria lock no values

on:
  workflow_dispatch:

jobs:
  lock-entry-criteria:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Lock no-values scope and inherited route status
        shell: bash
        run: |
          set -euo pipefail
          STAGE="ACIRM_R13MUL_GITHUB_ACTIONS_OFFTIME_CONTROL_AND_VALUE_STAGE_ENTRY_CRITERIA_LOCK_NO_VALUES"
          OUT="$GITHUB_WORKSPACE/${STAGE}_OUTPUT"
          mkdir -p "$OUT"
          cat > "$OUT/R13MUL_ROUTE_LOCK.json" <<'JSON'
          {
            "stage": "ACIRM_R13MUL_GITHUB_ACTIONS_OFFTIME_CONTROL_AND_VALUE_STAGE_ENTRY_CRITERIA_LOCK_NO_VALUES",
            "inherits_from": [
              "R13MUI target interval and day-scale SCW manifest lock",
              "R13MUJ-R1 all 21 SCW paths verified metadata-only",
              "R13MUK-R1 route roots, response candidates, and 511 line/sideband pre-value lock"
            ],
            "opens_science_values": false,
            "downloads_science_products": false,
            "downloads_fits": false,
            "reads_fits_tables": false,
            "purpose": "Lock off-time/off-region controls and value-stage entry criteria before any SPI/511 values",
            "forbidden": [
              "SPI spectra",
              "SPI images",
              "511 keV flux/count/intensity values",
              "FITS download",
              "FITS science product opening",
              "FITS table reading",
              "science-window value extraction",
              "background fitting",
              "particle-production claim"
            ],
            "claim_ceiling": "control and value-entry criteria lock only; no SPI/511 values"
          }
          JSON

      - name: Build off-time control and entry criteria ledgers
        shell: bash
        run: |
          set -euo pipefail
          STAGE="ACIRM_R13MUL_GITHUB_ACTIONS_OFFTIME_CONTROL_AND_VALUE_STAGE_ENTRY_CRITERIA_LOCK_NO_VALUES"
          OUT="$GITHUB_WORKSPACE/${STAGE}_OUTPUT"
          python3 - <<'PY'
          from pathlib import Path
          import csv
          import json
          import os

          out = Path(os.environ["GITHUB_WORKSPACE"]) / "ACIRM_R13MUL_GITHUB_ACTIONS_OFFTIME_CONTROL_AND_VALUE_STAGE_ENTRY_CRITERIA_LOCK_NO_VALUES_OUTPUT"
          out.mkdir(parents=True, exist_ok=True)

          target = {
              "r9c_anchor_utc": "2022-05-18T20:42:06.772Z",
              "strict_pm1h_product_claim": "FORBIDDEN",
              "strict_pm1h_reason": "R13MUI carried pm1h_rows=0",
              "primary_context_interval": {
                  "id": "UTC_DAY_CONTEXT",
                  "start_utc": "2022-05-18T00:00:00.000Z",
                  "stop_utc": "2022-05-19T00:00:00.000Z",
                  "locked_scw_rows": 21,
                  "claim_ceiling": "day-scale context only until values are authorized"
              },
              "line_window_keV": [508.0, 514.0],
              "sidebands_keV": [[490.0, 500.0], [522.0, 532.0]],
              "science_values_authorized": False
          }
          (out / "R13MUL_INHERITED_TARGET_AND_LINE_CONTEXT.json").write_text(json.dumps(target, indent=2), encoding="utf-8")

          control_rows = [
              {
                  "control_id": "OFFTIME_MINUS_1D_UTC_DAY",
                  "control_type": "off_time_day",
                  "start_utc": "2022-05-17T00:00:00.000Z",
                  "stop_utc": "2022-05-18T00:00:00.000Z",
                  "role": "nearest previous UTC-day off-time control",
                  "required_before_values": True,
                  "status": "LOCKED_AS_CONTROL_CANDIDATE_METADATA_ONLY",
                  "notes": "Must be queried/verified by metadata only before any science values."
              },
              {
                  "control_id": "OFFTIME_PLUS_1D_UTC_DAY",
                  "control_type": "off_time_day",
                  "start_utc": "2022-05-19T00:00:00.000Z",
                  "stop_utc": "2022-05-20T00:00:00.000Z",
                  "role": "nearest following UTC-day off-time control",
                  "required_before_values": True,
                  "status": "LOCKED_AS_CONTROL_CANDIDATE_METADATA_ONLY",
                  "notes": "Must be queried/verified by metadata only before any science values."
              },
              {
                  "control_id": "OFFTIME_MINUS_7D_WINDOW",
                  "control_type": "off_time_week_context",
                  "start_utc": "2022-05-11T20:42:06.772Z",
                  "stop_utc": "2022-05-12T20:42:06.772Z",
                  "role": "wider previous context control",
                  "required_before_values": True,
                  "status": "LOCKED_AS_SECONDARY_CONTROL_CANDIDATE_METADATA_ONLY",
                  "notes": "Secondary only; does not rescue a failed local/day comparison."
              },
              {
                  "control_id": "OFFTIME_PLUS_7D_WINDOW",
                  "control_type": "off_time_week_context",
                  "start_utc": "2022-05-25T20:42:06.772Z",
                  "stop_utc": "2022-05-26T20:42:06.772Z",
                  "role": "wider following context control",
                  "required_before_values": True,
                  "status": "LOCKED_AS_SECONDARY_CONTROL_CANDIDATE_METADATA_ONLY",
                  "notes": "Secondary only; does not rescue a failed local/day comparison."
              },
              {
                  "control_id": "OFFREGION_ANTI_SOURCE_OR_BACKGROUND_FIELD",
                  "control_type": "off_region",
                  "start_utc": "same_as_target_or_control_after_metadata_lock",
                  "stop_utc": "same_as_target_or_control_after_metadata_lock",
                  "role": "spatial/background control if official SPI method permits",
                  "required_before_values": True,
                  "status": "REQUIRED_BUT_NOT_YET_GEOMETRY_LOCKED",
                  "notes": "Needs expert/official SPI protocol or OSA-supported off-region/background model before values."
              }
          ]
          with (out / "R13MUL_OFFTIME_AND_OFFREGION_CONTROL_LOCK.csv").open("w", newline="", encoding="utf-8") as f:
              cols = ["control_id", "control_type", "start_utc", "stop_utc", "role", "required_before_values", "status", "notes"]
              w = csv.DictWriter(f, fieldnames=cols)
              w.writeheader()
              w.writerows(control_rows)

          entry_rows = [
              ["ENTRY-001", "All 21 target day SCW directory paths verified metadata-only", "PASS_INHERITED_R13MUJ_R1", True],
              ["ENTRY-002", "ROOT/IC/IDX/CAT/AUX/SCW/SCW-2504 route roots reachable", "PASS_INHERITED_R13MUK_R1", True],
              ["ENTRY-003", "Response candidate visible from IC metadata", "PASS_INHERITED_R13MUK_R1_WEAK_EXACT_VERSION_NOT_FINAL", True],
              ["ENTRY-004", "511 line window and sidebands prelocked", "PASS_INHERITED_R13MUK_R1", True],
              ["ENTRY-005", "Background method protocol exists but no fitting performed", "PASS_PROTOCOL_ONLY_VALUES_BLOCKED", True],
              ["ENTRY-006", "Off-time control intervals prelocked", "PASS_THIS_STAGE_METADATA_ONLY", True],
              ["ENTRY-007", "Off-region/background-field control geometry locked", "BLOCKED", False],
              ["ENTRY-008", "Exact expert/official OSA/SPI cookbook path for spectrum extraction reviewed", "BLOCKED", False],
              ["ENTRY-009", "FITS-header-only or product-download authorization explicitly granted", "BLOCKED", False],
              ["ENTRY-010", "Claim firewall accepted before values", "PASS_THIS_STAGE", True]
          ]
          with (out / "R13MUL_VALUE_STAGE_ENTRY_CRITERIA.csv").open("w", newline="", encoding="utf-8") as f:
              w = csv.writer(f)
              w.writerow(["criterion_id", "criterion", "status", "passes_for_value_stage"])
              w.writerows(entry_rows)

          claim_firewall = {
              "allowed_after_this_stage": [
                  "Route and method readiness is improved.",
                  "Target day and off-time control design are locked metadata-only.",
                  "A future value stage may be designed only after blocked criteria are repaired."
              ],
              "forbidden_after_this_stage": [
                  "511 keV detection",
                  "511 keV excess",
                  "flux/count/intensity value",
                  "particle production",
                  "proof",
                  "discovery",
                  "evidence"
              ],
              "strict_time_local_claim": "FORBIDDEN",
              "day_scale_context_claim": "METADATA_CONTEXT_ONLY",
              "science_values_authorized": False
          }
          (out / "R13MUL_CLAIM_FIREWALL.json").write_text(json.dumps(claim_firewall, indent=2), encoding="utf-8")
          PY

      - name: Classify entry criteria no values
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import csv
          import json
          import os

          out = Path(os.environ["GITHUB_WORKSPACE"]) / "ACIRM_R13MUL_GITHUB_ACTIONS_OFFTIME_CONTROL_AND_VALUE_STAGE_ENTRY_CRITERIA_LOCK_NO_VALUES_OUTPUT"
          entry_path = out / "R13MUL_VALUE_STAGE_ENTRY_CRITERIA.csv"
          control_path = out / "R13MUL_OFFTIME_AND_OFFREGION_CONTROL_LOCK.csv"

          entry_rows = list(csv.DictReader(entry_path.open(encoding="utf-8"))) if entry_path.exists() else []
          control_rows = list(csv.DictReader(control_path.open(encoding="utf-8"))) if control_path.exists() else []

          pass_rows = [r for r in entry_rows if str(r.get("passes_for_value_stage")).lower() == "true"]
          block_rows = [r for r in entry_rows if str(r.get("passes_for_value_stage")).lower() != "true"]

          off_time_locked = sum(1 for r in control_rows if r["control_type"].startswith("off_time"))
          off_region_locked = any(
              r["control_type"] == "off_region" and r["status"] == "LOCKED"
              for r in control_rows
          )

          if len(block_rows) == 0:
              entry_decision = "VALUE_STAGE_ENTRY_CRITERIA_FULLY_PASSED_VALUES_CAN_BE_DESIGNED_NOT_OPENED"
              next_stage = "R13MUM_DESIGN_FIRST_VALUE_STAGE_WITH_EXPLICIT_AUTHORIZATION"
          elif off_time_locked >= 4 and not off_region_locked:
              entry_decision = "OFFTIME_CONTROLS_LOCKED_OFFREGION_EXPERT_PROTOCOL_STILL_BLOCKS_VALUES"
              next_stage = "R13MUM_EXPERT_PROTOCOL_OR_OFFREGION_BACKGROUND_MODEL_LOCK_NO_VALUES"
          else:
              entry_decision = "ENTRY_CRITERIA_LOCK_INCOMPLETE_REPAIR_REQUIRED_NO_VALUES"
              next_stage = "R13MUM_REPAIR_OFFTIME_OR_ENTRY_CRITERIA_NO_VALUES"

          decision = {
              "stage": "ACIRM_R13MUL_GITHUB_ACTIONS_OFFTIME_CONTROL_AND_VALUE_STAGE_ENTRY_CRITERIA_LOCK_NO_VALUES",
              "entry_decision": entry_decision,
              "next_stage": next_stage,
              "n_entry_criteria": len(entry_rows),
              "n_passed_criteria": len(pass_rows),
              "n_blocked_criteria": len(block_rows),
              "blocked_criteria": [r["criterion_id"] + ": " + r["criterion"] for r in block_rows],
              "off_time_control_candidates_locked": off_time_locked,
              "off_region_control_geometry_locked": off_region_locked,
              "downloaded_fits": False,
              "opened_fits": False,
              "read_science_values": False,
              "science_values_authorized": False,
              "new_values_opened": False,
              "claim_ceiling": "off-time/off-region control and value-entry criteria lock only; no SPI/511 values"
          }
          (out / "R13MUL_ENTRY_CRITERIA_DECISION.json").write_text(json.dumps(decision, indent=2), encoding="utf-8")
          print(json.dumps(decision, indent=2))
          PY

      - name: Package results
        shell: bash
        run: |
          set -euo pipefail
          STAGE="ACIRM_R13MUL_GITHUB_ACTIONS_OFFTIME_CONTROL_AND_VALUE_STAGE_ENTRY_CRITERIA_LOCK_NO_VALUES"
          OUT="$GITHUB_WORKSPACE/${STAGE}_OUTPUT"
          ZIP="$GITHUB_WORKSPACE/${STAGE}_RESULTS.zip"
          SHA="$ZIP.sha256.txt"

          cat > "$OUT/R13MUL_GO_NO_GO.csv" <<'CSV'
          question,decision,reason
          Open SPI/511 science values now?,NO,This stage locks controls and entry criteria only.
          Download FITS now?,NO,FITS downloads remain forbidden.
          Are off-time controls locked?,SEE_DECISION,Read R13MUL_ENTRY_CRITERIA_DECISION.json.
          Is off-region/background geometry locked?,SEE_DECISION,Read R13MUL_ENTRY_CRITERIA_DECISION.json.
          Can this prove 511 keV or particle production?,NO,No values opened.
          CSV

          cd "$GITHUB_WORKSPACE"
          rm -f "$ZIP" "$SHA"
          zip -r "$ZIP" "$(basename "$OUT")"
          sha256sum "$ZIP" > "$SHA"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ACIRM_R13MUL_GITHUB_ACTIONS_OFFTIME_CONTROL_AND_VALUE_STAGE_ENTRY_CRITERIA_LOCK_NO_VALUES_RESULTS
          path: |
            ACIRM_R13MUL_GITHUB_ACTIONS_OFFTIME_CONTROL_AND_VALUE_STAGE_ENTRY_CRITERIA_LOCK_NO_VALUES_RESULTS.zip
            ACIRM_R13MUL_GITHUB_ACTIONS_OFFTIME_CONTROL_AND_VALUE_STAGE_ENTRY_CRITERIA_LOCK_NO_VALUES_RESULTS.zip.sha256.txt
          retention-days: 7
