name: ACIRM R13MPW R1 one cell official OSA generate and readout

on:
  workflow_dispatch:

jobs:
  osa-generate-readout:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - name: R13MPW R1 official OSA generate and guarded readout attempt
        shell: bash
        run: |
          set +e
          STAGE="ACIRM_R13MPW_R1_ONE_CELL_OFFICIAL_OSA_GENERATE_AND_READOUT"
          OUT="$GITHUB_WORKSPACE/${STAGE}_OUTPUT"
          mkdir -p "$OUT"

          cat > "$OUT/R13MPW_R1_FIREWALL.json" <<'JSON'
          {
            "stage": "ACIRM_R13MPW_R1_ONE_CELL_OFFICIAL_OSA_GENERATE_AND_READOUT",
            "inherits_from": "R13MPV-R2 opened 80 FITS products but did not find safe energy mapping; R13MPW fixes OSA marker bug and now also reads generated required products if produced.",
            "purpose": "One cell: fix OSA toolpath markers, build locked SCW data workspace, attempt official OSA obsgroup/product generation, search for energy_boundaries and evts_det_spec, and if both exist compute guarded 511/sideband readout in the same run.",
            "locked_line_window_keV": [508.0, 514.0],
            "locked_lower_sideband_keV": [490.0, 500.0],
            "locked_upper_sideband_keV": [522.0, 532.0],
            "minimum_detection_candidate_ratio": 1.2,
            "artifact_policy": "Do not include downloaded data or OSA work products in artifact; keep only reports, logs, manifests, CSV and JSON.",
            "claim_ceiling": "guarded diagnostic candidate at most; no proof/discovery/evidence claim"
          }
          JSON

          python3 -m pip install --user --no-cache-dir --upgrade numpy astropy > "$OUT/R13MPW_R1_DEPENDENCY_INSTALL.log" 2>&1

          cat > "$OUT/controller.py" <<'PYCODE'
          from pathlib import Path
          from urllib.request import Request, urlopen, urlretrieve
          from urllib.parse import urljoin
          import csv, hashlib, json, math, os, re, shutil, subprocess, sys, time, site

          STAGE = "ACIRM_R13MPW_R1_ONE_CELL_OFFICIAL_OSA_GENERATE_AND_READOUT"
          out = Path(os.environ.get("GITHUB_WORKSPACE", ".")) / (STAGE + "_OUTPUT")
          out.mkdir(parents=True, exist_ok=True)
          site.addsitedir(site.getusersitepackages())

          MIN_RATIO = 1.2
          TARGET_SCW_IDS = [
              "250400090010", "250400020010", "250400080010", "250400030010",
              "250400070021", "250400040010", "250400060010", "250400050010"
          ]
          HEASARC_BASE = "https://heasarc.gsfc.nasa.gov/FTP/integral/data/scw/2504"
          OSA_IMAGE = "integralsw/osa:latest"

          def write_json(name, obj):
              (out / name).write_text(json.dumps(obj, indent=2, ensure_ascii=False), encoding="utf-8")

          def write_csv(name, rows, columns):
              with (out / name).open("w", newline="", encoding="utf-8") as f:
                  w = csv.DictWriter(f, fieldnames=columns)
                  w.writeheader()
                  for r in rows:
                      w.writerow({c: r.get(c, "") for c in columns})

          def sha256_file(path):
              h = hashlib.sha256()
              with open(path, "rb") as f:
                  for b in iter(lambda: f.read(1024*1024), b""):
                      h.update(b)
              return h.hexdigest()

          def run_cmd(cmd, log_name, timeout=900, cwd=None):
              t0 = time.time()
              log_path = out / log_name
              try:
                  p = subprocess.run(cmd, stdout=subprocess.PIPE, stderr=subprocess.STDOUT, text=True, timeout=timeout, cwd=cwd)
                  log_path.write_text(p.stdout, encoding="utf-8", errors="replace")
                  return {"exit_code": p.returncode, "seconds": round(time.time()-t0, 2), "tail": p.stdout[-4000:]}
              except subprocess.TimeoutExpired as e:
                  txt = (e.stdout or "") + "\nTIMEOUT\n"
                  log_path.write_text(txt, encoding="utf-8", errors="replace")
                  return {"exit_code": 124, "seconds": round(time.time()-t0, 2), "tail": txt[-4000:]}

          def final_stop(decision, next_stage, **kwargs):
              obj = {"stage": STAGE, "decision": decision, "next_stage": next_stage,
                     "claim_ceiling": "guarded diagnostic candidate at most; no proof/discovery/evidence claim"}
              obj.update(kwargs)
              write_json("R13MPW_R1_FINAL_DECISION.json", obj)
              print(json.dumps(obj, indent=2, ensure_ascii=False))
              return obj

          def url_head(url, timeout=30):
              try:
                  req = Request(url, method="HEAD", headers={"User-Agent": "ACIRM-R13MPW-R1-OSA"})
                  with urlopen(req, timeout=timeout) as r:
                      length = r.headers.get("Content-Length", "")
                      return {"ok": True, "status": getattr(r,"status", ""), "content_type": r.headers.get("Content-Type", ""), "content_length": int(length) if str(length).isdigit() else None, "final_url": r.geturl(), "error": ""}
              except Exception as e:
                  return {"ok": False, "status": "", "content_type": "", "content_length": None, "final_url": "", "error": repr(e)[:500]}

          def fetch_index(url, timeout=30, max_bytes=1500000):
              try:
                  req = Request(url, headers={"User-Agent": "ACIRM-R13MPW-R1-OSA", "Accept": "text/html,text/plain,*/*"})
                  with urlopen(req, timeout=timeout) as r:
                      data = r.read(max_bytes)
                      return True, r.geturl(), data.decode("utf-8", errors="replace"), ""
              except Exception as e:
                  return False, "", "", repr(e)[:500]

          def extract_hrefs(html):
              rows=[]
              for m in re.finditer(r"<a\s+[^>]*href=[\"']([^\"']+)[\"'][^>]*>(.*?)</a>", html, flags=re.I|re.S):
                  href=m.group(1).strip()
                  label=re.sub(r"<[^>]+>", "", m.group(2))
                  label=re.sub(r"\s+", " ", label).strip()
                  rows.append((href,label))
              if not rows:
                  for m in re.finditer(r"href=[\"']([^\"']+)[\"']", html, flags=re.I):
                      rows.append((m.group(1).strip(), ""))
              return rows

          def candidate_score(name):
              s=name.lower(); score=0
              if "energy_bound" in s or "energ" in s: score += 100
              if "evts_det_spec" in s or "det_spec" in s: score += 100
              if "spectrum" in s or "spectra" in s or "spec" in s: score += 40
              if "spi" in s: score += 20
              if s.endswith(".fits") or s.endswith(".fits.gz"): score += 10
              return score

          write_json("R13MPW_R1_LOCKED_CONTEXT.json", {
              "target_scw_ids": TARGET_SCW_IDS,
              "heasarc_base": HEASARC_BASE,
              "osa_image": OSA_IMAGE,
              "locked_windows_keV": {"line":[508.0,514.0], "lower":[490.0,500.0], "upper":[522.0,532.0]},
              "minimum_detection_candidate_ratio": MIN_RATIO,
              "no_window_retuning": True
          })

          run_errors=[]
          try:
              import numpy as np
              from astropy.io import fits
              import astropy
              dep={"numpy_version":np.__version__, "astropy_version":astropy.__version__, "ok":True}
          except Exception as e:
              dep={"ok":False,"error":repr(e)}
              run_errors.append("dependency_import_error: "+repr(e))
              final_stop("FINAL_TECHNICAL_BLOCK_DEPENDENCY_IMPORT_FAILED", "STOP", dependency_status=dep, run_errors=run_errors)
              sys.exit(0)
          write_json("R13MPW_R1_DEPENDENCY_STATUS.json", dep)

          run_cmd(["docker", "pull", OSA_IMAGE], "R13MPW_R1_DOCKER_PULL.log", timeout=1200)

          # Correct OSA marker check: printf markers instead of unquoted shell pipes.
          osa_check = out / "osa_fixed_toolpath_check.sh"
          osa_check.write_text("""#!/usr/bin/env bash
          set +e
          export PATH=/opt/osa/bin:$PATH
          LIBGUI=$(find /opt /usr -name libGui.so 2>/dev/null | head -1)
          if [ -n "$LIBGUI" ]; then export LD_LIBRARY_PATH=$(dirname "$LIBGUI"):/opt/osa/lib:/opt/osa/lib64:$LD_LIBRARY_PATH; else export LD_LIBRARY_PATH=/opt/osa/lib:/opt/osa/lib64:$LD_LIBRARY_PATH; fi
          mkdir -p /tmp/pfiles
          export PFILES=/tmp/pfiles
          echo OSA_CONTAINER_RUNTIME_OK
          printf 'PATH=%s\n' "$PATH"
          printf 'LD_LIBRARY_PATH=%s\n' "$LD_LIBRARY_PATH"
          for t in spi_science_analysis og_create dal_list spiros idx_find; do
            if command -v "$t" >/dev/null 2>&1; then printf 'TOOL_FOUND|%s|%s\n' "$t" "$(command -v "$t")";
            elif [ -x "/opt/osa/bin/$t" ]; then printf 'TOOL_FOUND_ABSPATH|%s|/opt/osa/bin/%s\n' "$t" "$t";
            else printf 'TOOL_MISSING|%s|\n' "$t"; fi
          done
          echo HELP_OG_CREATE_BEGIN
          timeout 25 /opt/osa/bin/og_create -h 2>&1 | head -120 || true
          echo HELP_OG_CREATE_END
          echo HELP_SPI_SCIENCE_BEGIN
          timeout 25 /opt/osa/bin/spi_science_analysis -h 2>&1 | head -120 || true
          echo HELP_SPI_SCIENCE_END
          """, encoding="utf-8")
          os.chmod(osa_check, 0o755)
          run_cmd(["docker","run","--rm","-v",f"{out}:/out","--entrypoint","/bin/bash",OSA_IMAGE,"/out/osa_fixed_toolpath_check.sh"], "R13MPW_R1_OSA_FIXED_TOOLPATH_AND_HELP.log", timeout=300)
          tool_log=(out/"R13MPW_R1_OSA_FIXED_TOOLPATH_AND_HELP.log").read_text(encoding="utf-8", errors="replace") if (out/"R13MPW_R1_OSA_FIXED_TOOLPATH_AND_HELP.log").exists() else ""
          osa_tools={
              "container_runtime_ok":"OSA_CONTAINER_RUNTIME_OK" in tool_log,
              "spi_science_analysis_found":("TOOL_FOUND|spi_science_analysis|" in tool_log or "TOOL_FOUND_ABSPATH|spi_science_analysis|" in tool_log),
              "og_create_found":("TOOL_FOUND|og_create|" in tool_log or "TOOL_FOUND_ABSPATH|og_create|" in tool_log),
              "dal_list_found":("TOOL_FOUND|dal_list|" in tool_log or "TOOL_FOUND_ABSPATH|dal_list|" in tool_log),
              "spiros_found":("TOOL_FOUND|spiros|" in tool_log or "TOOL_FOUND_ABSPATH|spiros|" in tool_log),
              "idx_find_found":("TOOL_FOUND|idx_find|" in tool_log or "TOOL_FOUND_ABSPATH|idx_find|" in tool_log)
          }
          write_json("R13MPW_R1_OSA_FIXED_TOOL_STATUS.json", osa_tools)

          # Build locked public data workspace from HEASARC SCW directories.
          data_dir = out / "locked_public_scw_data"
          data_dir.mkdir(exist_ok=True)
          discovery_rows=[]; candidates=[]
          explicit_names=["swg.fits", "swg.fits.gz", "spi_spectra.fits.gz", "spi_spectra.fits", "spi_gti.fits.gz", "spi_hk.fits.gz", "spi_oper.fits.gz", "spi_science_hk.fits.gz", "spi_science_param.fits.gz", "spi_acs.fits.gz", "spi_block.fits.gz", "energy_boundaries.fits", "evts_det_spec.fits"]
          for scw in TARGET_SCW_IDS:
              scw_dir_url=f"{HEASARC_BASE}/{scw}.001/"
              ok, final_url, html, err = fetch_index(scw_dir_url)
              hrefs = extract_hrefs(html) if ok else []
              discovery_rows.append({"scw_id":scw, "url":scw_dir_url, "index_ok":ok, "href_count":len(hrefs), "error":err})
              scw_local = data_dir / f"{scw}.001"
              scw_local.mkdir(exist_ok=True)
              if ok:
                  for href,label in hrefs:
                      fname=Path(href).name
                      if fname and (fname.endswith(".fits") or fname.endswith(".fits.gz")):
                          if fname.startswith("spi_") or fname in ["swg.fits", "swg.fits.gz"]:
                              candidates.append({"source":"index", "scw_id":scw, "filename":fname, "url":urljoin(final_url or scw_dir_url, href), "score":candidate_score(fname)})
              for fname in explicit_names:
                  candidates.append({"source":"explicit", "scw_id":scw, "filename":fname, "url":scw_dir_url+fname, "score":candidate_score(fname)})
          write_csv("R13MPW_R1_SCW_INDEX_DISCOVERY.csv", discovery_rows, ["scw_id","url","index_ok","href_count","error"])
          seen=set(); uniq=[]
          for c in sorted(candidates, key=lambda r:(r["scw_id"], -r["score"], r["filename"])):
              key=(c["scw_id"], c["url"])
              if key not in seen:
                  seen.add(key); uniq.append(c)
          probes=[]; downloads=[]
          for c in uniq:
              h=url_head(c["url"])
              row=dict(c); row.update({"head_ok":h["ok"], "status":h["status"], "content_length":h["content_length"], "content_type":h["content_type"], "error":h["error"]})
              probes.append(row)
              if not h["ok"] or (h["content_length"] is not None and h["content_length"] > 400*1024*1024):
                  continue
              local = data_dir / f"{c['scw_id']}.001" / c["filename"]
              try:
                  urlretrieve(c["url"], local)
                  downloads.append({"scw_id":c["scw_id"], "filename":c["filename"], "url":c["url"], "ok":True, "local_path":str(local), "size_bytes":local.stat().st_size, "sha256":sha256_file(local), "error":""})
              except Exception as e:
                  downloads.append({"scw_id":c["scw_id"], "filename":c["filename"], "url":c["url"], "ok":False, "local_path":str(local), "size_bytes":"", "sha256":"", "error":repr(e)[:500]})
          write_csv("R13MPW_R1_PUBLIC_PRODUCT_PROBES.csv", probes, ["source","scw_id","filename","url","score","head_ok","status","content_type","content_length","error"])
          write_csv("R13MPW_R1_PUBLIC_PRODUCT_DOWNLOADS.csv", downloads, ["scw_id","filename","url","ok","local_path","size_bytes","sha256","error"])

          # Minimal official OSA attempt. Best-effort: public HEASARC SCW dirs may not be a full ISDC repo.
          work = out / "osa_work"
          work.mkdir(exist_ok=True)
          (work / "locked_scw_list.txt").write_text("\n".join(TARGET_SCW_IDS)+"\n", encoding="utf-8")
          osa_run = out / "osa_generation_attempt.sh"
          osa_run.write_text("""#!/usr/bin/env bash
          set +e
          export PATH=/opt/osa/bin:$PATH
          LIBGUI=$(find /opt /usr -name libGui.so 2>/dev/null | head -1)
          if [ -n "$LIBGUI" ]; then export LD_LIBRARY_PATH=$(dirname "$LIBGUI"):/opt/osa/lib:/opt/osa/lib64:$LD_LIBRARY_PATH; else export LD_LIBRARY_PATH=/opt/osa/lib:/opt/osa/lib64:$LD_LIBRARY_PATH; fi
          export PFILES=/work/pfiles
          mkdir -p /work/pfiles /work/obs /work/logs
          echo OSA_GENERATION_ATTEMPT_START
          printf 'REP_BASE=%s\n' "$REP_BASE"
          printf 'PWD=%s\n' "$PWD"
          printf 'TRY_OG_CREATE_HELP\n'
          /opt/osa/bin/og_create -h 2>&1 | head -120 || true
          printf 'TRY_SPI_SCIENCE_HELP\n'
          /opt/osa/bin/spi_science_analysis -h 2>&1 | head -120 || true
          printf 'TRY_CANDIDATE_OG_CREATE_1\n'
          timeout 120 /opt/osa/bin/og_create idxSwg=/work/locked_scw_list.txt ogid=ACIRM_R13MPW_R1 baseDir=/work/obs instrument=SPI > /work/logs/og_create_try1.log 2>&1
          printf 'OG_CREATE_TRY1_EXIT=%s\n' "$?"
          cat /work/logs/og_create_try1.log | tail -160 || true
          printf 'TRY_CANDIDATE_SPI_SCIENCE_ANALYSIS_HELPONLY\n'
          timeout 120 /opt/osa/bin/spi_science_analysis -h > /work/logs/spi_science_help.log 2>&1
          printf 'SPI_SCIENCE_HELP_EXIT=%s\n' "$?"
          find /work -maxdepth 9 -type f | sed 's#^#WORK_FILE|#' | head -800
          echo OSA_GENERATION_ATTEMPT_END
          """, encoding="utf-8")
          os.chmod(osa_run, 0o755)
          run_cmd(["docker","run","--rm", "-v", f"{out}:/out", "-v", f"{work}:/work", "-v", f"{data_dir}:/data", "--entrypoint", "/bin/bash", "-e", "REP_BASE=/data", OSA_IMAGE, "/out/osa_generation_attempt.sh"], "R13MPW_R1_OSA_OBSGROUP_GENERATION_ATTEMPT.log", timeout=600)

          # Search generated/downloaded tree for required products.
          found=[]
          for root in [out, work, data_dir]:
              for p in root.rglob("*"):
                  if not p.is_file():
                      continue
                  low=p.name.lower()
                  if "energy_bound" in low or "evts_det_spec" in low:
                      found.append({"path":str(p), "name":p.name, "size_bytes":p.stat().st_size, "sha256":sha256_file(p) if p.stat().st_size < 100*1024*1024 else "SKIPPED_LARGE"})
          write_csv("R13MPW_R1_REQUIRED_PRODUCT_SEARCH.csv", found, ["path","name","size_bytes","sha256"])

          def parse_energy_boundaries(path):
              candidates=[]
              try:
                  with fits.open(path, memmap=False) as hdul:
                      for hdu_i,hdu in enumerate(hdul):
                          data=getattr(hdu,"data",None)
                          cols=[]
                          if hasattr(hdu,"columns") and hdu.columns is not None:
                              try: cols=list(hdu.columns.names)
                              except Exception: cols=[]
                          if data is None:
                              continue
                          cu={str(c).upper():c for c in cols}
                          lo=hi=None
                          for k in ["E_MIN","E_LO","ENERG_LO","ENERGY_LO","CHANNEL_E_MIN","EMIN","E_LOW","EBOUND_LO"]:
                              if k in cu: lo=cu[k]; break
                          for k in ["E_MAX","E_HI","ENERG_HI","ENERGY_HI","CHANNEL_E_MAX","EMAX","E_HIGH","EBOUND_HI"]:
                              if k in cu: hi=cu[k]; break
                          if lo and hi:
                              emin=np.asarray(data[lo],dtype=float).ravel(); emax=np.asarray(data[hi],dtype=float).ravel()
                              if len(emin)==len(emax) and len(emin)>0 and np.nanmin(emin)<=508.0 and np.nanmax(emax)>=514.0:
                                  candidates.append({"path":path,"hdu_index":hdu_i,"lo_col":lo,"hi_col":hi,"emin":emin,"emax":emax})
              except Exception as e:
                  run_errors.append("energy_parse_error: "+repr(e)[:500])
              return candidates

          def collect_arrays(path):
              arrays=[]
              try:
                  with fits.open(path, memmap=False) as hdul:
                      for hdu_i,hdu in enumerate(hdul):
                          data=getattr(hdu,"data",None)
                          cols=[]
                          if hasattr(hdu,"columns") and hdu.columns is not None:
                              try: cols=list(hdu.columns.names)
                              except Exception: cols=[]
                          if data is None:
                              continue
                          if cols:
                              for col in cols:
                                  try:
                                      arr=np.asarray(data[col], dtype=float)
                                      if arr.size>0:
                                          arrays.append({"path":path,"hdu_index":hdu_i,"array_name":col,"array":arr})
                                  except Exception:
                                      pass
                          else:
                              try:
                                  arr=np.asarray(data, dtype=float)
                                  if arr.size>0:
                                      arrays.append({"path":path,"hdu_index":hdu_i,"array_name":"IMAGE_OR_PRIMARY_ARRAY","array":arr})
                              except Exception:
                                  pass
              except Exception as e:
                  run_errors.append("array_collect_error: "+repr(e)[:500])
              return arrays

          energy_files=[f for f in found if "energy_bound" in f["name"].lower()]
          spec_files=[f for f in found if "evts_det_spec" in f["name"].lower()]
          readout_rows=[]; safe_energy_mapping_found=False; detection_candidate=False
          energy_profile=[]
          if energy_files and spec_files:
              energy_candidates=[]
              for ef in energy_files:
                  energy_candidates += parse_energy_boundaries(ef["path"])
              selected_energy=None
              for ec in energy_candidates:
                  emin,emax=ec["emin"],ec["emax"]
                  line_idx=np.where((emax>508.0)&(emin<514.0))[0]
                  lower_idx=np.where((emax>490.0)&(emin<500.0))[0]
                  upper_idx=np.where((emax>522.0)&(emin<532.0))[0]
                  if len(line_idx)>0 and len(lower_idx)>0 and len(upper_idx)>0:
                      selected_energy=ec; break
              if selected_energy is not None:
                  safe_energy_mapping_found=True
                  emin,emax=selected_energy["emin"],selected_energy["emax"]
                  line_idx=np.where((emax>508.0)&(emin<514.0))[0]
                  lower_idx=np.where((emax>490.0)&(emin<500.0))[0]
                  upper_idx=np.where((emax>522.0)&(emin<532.0))[0]
                  line_set,lower_set,upper_set=set(map(int,line_idx)),set(map(int,lower_idx)),set(map(int,upper_idx))
                  for i in range(len(emin)):
                      if i<10 or (emax[i]>480 and emin[i]<540):
                          energy_profile.append({"bin_index":i,"emin_keV":float(emin[i]),"emax_keV":float(emax[i]),"overlap_line":i in line_set,"overlap_lower":i in lower_set,"overlap_upper":i in upper_set})
                  for sf in spec_files:
                      for a in collect_arrays(sf["path"]):
                          arr=a["array"]
                          axes=[ax for ax,dim in enumerate(arr.shape) if dim==len(emin)]
                          if not axes:
                              continue
                          energy_axis=axes[-1]
                          try:
                              line_val=float(np.nansum(np.take(arr,line_idx,axis=energy_axis)))
                              lower_val=float(np.nansum(np.take(arr,lower_idx,axis=energy_axis)))
                              upper_val=float(np.nansum(np.take(arr,upper_idx,axis=energy_axis)))
                              side_mean=0.5*(lower_val+upper_val)
                              ratio=line_val/side_mean if side_mean not in [0,None] and not math.isnan(side_mean) else None
                              readout_rows.append({"energy_file":Path(selected_energy["path"]).name,"spec_file":Path(sf["path"]).name,"hdu_index":a["hdu_index"],"array_name":a["array_name"],"array_shape":str(arr.shape),"energy_axis":energy_axis,"line_508_514_value":line_val,"lower_490_500_value":lower_val,"upper_522_532_value":upper_val,"sideband_mean":side_mean,"line_to_sideband_mean_ratio":ratio,"target_scoped":"LOCKED_OSA_WORKSPACE","claim":"NO_CLAIM_GUARDED_READOUT_ONLY"})
                          except Exception as e:
                              run_errors.append("readout_error: "+repr(e)[:500])
          write_csv("R13MPW_R1_ENERGY_BOUNDARY_PROFILE_AROUND_511.csv", energy_profile, ["bin_index","emin_keV","emax_keV","overlap_line","overlap_lower","overlap_upper"])
          if not readout_rows:
              readout_out=[{"energy_file":"","spec_file":"","hdu_index":"","array_name":"","array_shape":"","energy_axis":"","line_508_514_value":"","lower_490_500_value":"","upper_522_532_value":"","sideband_mean":"","line_to_sideband_mean_ratio":"","target_scoped":"","claim":"NO_SAFE_READOUT_EXTRACTED"}]
          else:
              readout_out=readout_rows
          write_csv("R13MPW_R1_GUARDED_511_READOUT_VALUES.csv", readout_out, ["energy_file","spec_file","hdu_index","array_name","array_shape","energy_axis","line_508_514_value","lower_490_500_value","upper_522_532_value","sideband_mean","line_to_sideband_mean_ratio","target_scoped","claim"])

          if readout_rows:
              line_sum=sum(float(r["line_508_514_value"]) for r in readout_rows if r["line_508_514_value"] is not None)
              lower_sum=sum(float(r["lower_490_500_value"]) for r in readout_rows if r["lower_490_500_value"] is not None)
              upper_sum=sum(float(r["upper_522_532_value"]) for r in readout_rows if r["upper_522_532_value"] is not None)
              side_mean=0.5*(lower_sum+upper_sum)
              ratio=line_sum/side_mean if side_mean not in [0,None] and not math.isnan(side_mean) else None
          else:
              line_sum=lower_sum=upper_sum=side_mean=ratio=None
          detection_candidate=bool(readout_rows and safe_energy_mapping_found and ratio is not None and ratio>=MIN_RATIO)
          numeric_summary={"required_products_found": bool(energy_files and spec_files), "energy_files_found":len(energy_files), "evts_det_spec_files_found":len(spec_files), "safe_energy_mapping_found":safe_energy_mapping_found, "readout_rows":len(readout_rows), "line_sum":line_sum, "lower_sum":lower_sum, "upper_sum":upper_sum, "sideband_mean":side_mean, "line_to_sideband_ratio":ratio, "minimum_detection_candidate_ratio":MIN_RATIO, "detection_candidate":detection_candidate}
          write_json("R13MPW_R1_GUARDED_NUMERIC_SUMMARY.json", numeric_summary)

          if detection_candidate:
              decision="GUARDED_511_TARGET_FILTERED_DETECTION_CANDIDATE"
              next_stage="EXTERNAL_REPLICATION_AND_OFFTIME_NULLS_REQUIRED_BEFORE_EVIDENCE_CLAIM"
          elif safe_energy_mapping_found and readout_rows:
              decision="NO_GUARDED_511_DETECTION_UNDER_LOCKED_OSA_GENERATED_PRODUCTS"
              next_stage="STOP_OR_EXTERNAL_REPLICATION_WITH_SAME_LOCKED_RULES"
          elif energy_files and spec_files:
              decision="OFFICIAL_OSA_REQUIRED_PRODUCTS_FOUND_BUT_SAFE_READOUT_FAILED"
              next_stage="STOP_OR_MANUAL_REVIEW_GENERATED_PRODUCT_SCHEMA"
          elif osa_tools.get("spi_science_analysis_found") and osa_tools.get("og_create_found"):
              decision="OFFICIAL_OSA_TOOLS_FOUND_BUT_REQUIRED_PRODUCTS_NOT_GENERATED_FROM_PUBLIC_SCW_PRODUCTS"
              next_stage="STOP_OR_RUN_FULL_ISDC_OSA_REPOSITORY_WITH_AUX_IC_DATA"
          else:
              decision="OFFICIAL_OSA_TOOLPATH_OR_ENVIRONMENT_BLOCKED_REQUIRED_PRODUCTS_NOT_GENERATED"
              next_stage="STOP_OR_EXTERNAL_FULL_OSA_INSTALL_REQUIRED"

          final_stop(decision, next_stage,
                     osa_tools=osa_tools,
                     target_scw_ids=TARGET_SCW_IDS,
                     public_products_downloaded=sum(1 for d in downloads if d.get("ok")),
                     required_products_found=bool(energy_files and spec_files),
                     required_product_search_rows=len(found),
                     generated_required_products=found,
                     safe_energy_mapping_found=safe_energy_mapping_found,
                     diagnostic_value_rows=len(readout_rows),
                     numeric_summary=numeric_summary,
                     detection_candidate=detection_candidate,
                     run_errors_count=len(run_errors), run_errors=run_errors)
          PYCODE

          python3 "$OUT/controller.py" > "$OUT/R13MPW_R1_CONTROLLER_STDOUT.txt" 2> "$OUT/R13MPW_R1_CONTROLLER_STDERR.txt"
          CODE=$?
          echo "controller_exit_code=$CODE" > "$OUT/R13MPW_R1_STEP_STATUS.log"

          if [ ! -f "$OUT/R13MPW_R1_FINAL_DECISION.json" ]; then
            cat > "$OUT/R13MPW_R1_FINAL_DECISION.json" <<'JSON'
          {"stage":"ACIRM_R13MPW_R1_ONE_CELL_OFFICIAL_OSA_GENERATE_AND_READOUT","decision":"CONTROLLER_FAILED_BEFORE_FINAL_DECISION","next_stage":"STOP_REPAIR_FROM_STDOUT_STDERR","claim_ceiling":"no reliable final result"}
          JSON
          fi

          cat > "$OUT/R13MPW_R1_GO_NO_GO.csv" <<'CSV'
          question,decision,reason
          Does R13MPW-R1 fix the OSA marker bug?,YES,Uses printf markers instead of unquoted shell pipes.
          Does R13MPW-R1 attempt official OSA product generation?,YES,It tries og_create/spi route inside OSA Docker.
          Does R13MPW-R1 read generated required products if present?,YES,It reads energy_boundaries and evts_det_spec in the same cell if both exist.
          Does R13MPW-R1 include downloaded data in artifact?,NO,Data/work directories are removed before packaging.
          Can R13MPW-R1 claim detection without generated energy_boundaries and evts_det_spec?,NO,Those products are mandatory.
          Can R13MPW-R1 claim proof/discovery/evidence?,NO,At most guarded diagnostic candidate after readout and replication/nulls.
          CSV

          cd "$GITHUB_WORKSPACE"
          ZIP="$GITHUB_WORKSPACE/${STAGE}_RESULTS.zip"
          SHA="$ZIP.sha256.txt"
          rm -f "$ZIP" "$SHA"
          rm -rf "$OUT/locked_public_scw_data" "$OUT/osa_work"
          zip -r "$ZIP" "$(basename "$OUT")"
          sha256sum "$ZIP" > "$SHA"
          exit 0

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ACIRM_R13MPW_R1_ONE_CELL_OFFICIAL_OSA_GENERATE_AND_READOUT_RESULTS
          path: |
            ACIRM_R13MPW_R1_ONE_CELL_OFFICIAL_OSA_GENERATE_AND_READOUT_RESULTS.zip
            ACIRM_R13MPW_R1_ONE_CELL_OFFICIAL_OSA_GENERATE_AND_READOUT_RESULTS.zip.sha256.txt
          retention-days: 7
