name: ACIRM R13M E 353GeV source context

on:
  workflow_dispatch:

jobs:
  r13m-e:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Run 353 GeV source association context
        shell: bash
        run: |
          set +e
          STAGE="ACIRM_R13M_E_353GEV_SOURCE_ASSOCIATION_CONTEXT_NO_SCORE"
          OUT="$GITHUB_WORKSPACE/${STAGE}_OUTPUT"
          DATA="$GITHUB_WORKSPACE/${STAGE}_DATA"
          mkdir -p "$OUT" "$DATA"
          python3 -m pip install --user --no-cache-dir --upgrade numpy astropy > "$OUT/PIP_INSTALL.log" 2>&1
          python3 - <<'PY' > "$OUT/STDOUT.txt" 2> "$OUT/STDERR.txt"
          from pathlib import Path
          from urllib.request import Request, urlopen
          import csv, datetime, hashlib, json, math, os, re, shutil, subprocess, traceback
          import numpy as np
          from astropy.io import fits

          STAGE = "ACIRM_R13M_E_353GEV_SOURCE_ASSOCIATION_CONTEXT_NO_SCORE"
          BASE = Path(os.environ.get("GITHUB_WORKSPACE", "/tmp/acirm_r13m_e"))
          OUT = BASE / (STAGE + "_OUTPUT")
          DATA = BASE / (STAGE + "_DATA")
          OUT.mkdir(parents=True, exist_ok=True)
          DATA.mkdir(parents=True, exist_ok=True)

          CFG = {
              "r9c_utc": "2022-05-18T20:40:57.672000+00:00",
              "target_event_utc": "2022-05-21T23:06:11.708269+00:00",
              "target_energy_mev_expected": 353854.9375,
              "target_week": 729,
              "target_window": "P_1_7d",
              "source": "Cyg X-1",
              "cygx1_ra_deg": 299.590315,
              "cygx1_dec_deg": 35.201606,
              "roi_deg": 5.0,
              "fermi_epoch": "2001-01-01T00:00:00+00:00",
              "weekly_dir": "https://heasarc.gsfc.nasa.gov/FTP/fermi/data/lat/weekly/photon/",
              "catalog_url": "https://fermi.gsfc.nasa.gov/ssc/data/access/lat/14yr_catalog/gll_psc_v35.fit",
              "psf_reference_deg_gt10gev_general": 0.15,
              "near_field_deg": 5.0,
              "catalog_search_deg": 5.0,
              "claim_ceiling": "source association context only; no likelihood, no exposure correction, no score, no evidence/proof/discovery claim",
              "theory_policy": "R9C is the locked gate. A delayed high-energy photon need not come from inside the black hole or exactly from Cyg X-1. If far from Cyg X-1 under LAT angular scale, classify as near-field/ambient high-energy driver candidate, not co-source proof."
          }

          def log(msg):
              print(str(msg), flush=True)
              with (OUT / "PROGRESS.log").open("a", encoding="utf-8") as f:
                  f.write(str(msg) + "\n")

          def write_json(name, obj):
              (OUT / name).write_text(json.dumps(obj, indent=2, ensure_ascii=False), encoding="utf-8")

          def write_csv(name, rows, cols):
              with (OUT / name).open("w", newline="", encoding="utf-8") as f:
                  w = csv.DictWriter(f, fieldnames=cols)
                  w.writeheader()
                  for r in rows:
                      w.writerow({c: r.get(c, "") for c in cols})

          def sha256(path):
              h = hashlib.sha256()
              with open(path, "rb") as f:
                  for b in iter(lambda: f.read(1024 * 1024), b""):
                      h.update(b)
              return h.hexdigest()

          def utc(s):
              return datetime.datetime.fromisoformat(str(s).replace("Z", "+00:00")).astimezone(datetime.UTC)

          def iso(t):
              return t.astimezone(datetime.UTC).isoformat().replace("+00:00", "Z")

          def met(t):
              return (t - utc(CFG["fermi_epoch"])).total_seconds()

          def metutc(x):
              return utc(CFG["fermi_epoch"]) + datetime.timedelta(seconds=float(x))

          def final(decision, next_stage, extra=None):
              obj = {
                  "stage": STAGE,
                  "decision": decision,
                  "next_stage": next_stage,
                  "claim_ceiling": CFG["claim_ceiling"],
                  "theory_policy": CFG["theory_policy"],
                  "timestamp_utc": datetime.datetime.now(datetime.UTC).isoformat()
              }
              if extra:
                  obj.update(extra)
              write_json("FINAL_DECISION.json", obj)
              log("FINAL_DECISION: " + decision)

          def run(cmd, timeout=300):
              try:
                  p = subprocess.run(cmd, stdout=subprocess.PIPE, stderr=subprocess.STDOUT, text=True, timeout=timeout)
                  return p.returncode, p.stdout
              except Exception as e:
                  return 999, repr(e)

          def http_text(url, timeout=180):
              req = Request(url, headers={"User-Agent": "ACIRM-R13M-E/1.0"})
              with urlopen(req, timeout=timeout) as r:
                  return r.read().decode("utf-8", errors="replace")

          def download(url, dest, label, max_time=1200):
              tmp = dest.with_suffix(dest.suffix + ".part")
              if tmp.exists():
                  try:
                      tmp.unlink()
                  except Exception:
                      pass
              row = {
                  "label": label,
                  "url": url,
                  "path": str(dest),
                  "download_ok": False,
                  "size_bytes": "",
                  "sha256": "",
                  "method": "",
                  "exit_code": "",
                  "error": ""
              }
              cmd = ["bash", "-lc", "curl -L --fail --connect-timeout 30 --max-time %d --retry 3 --retry-delay 5 --retry-all-errors -o " % max_time + repr(str(tmp)) + " " + repr(url)]
              code, out = run(cmd, timeout=max_time + 120)
              (OUT / (label + "_curl.log")).write_text(out[-5000:], encoding="utf-8")
              if code == 0 and tmp.exists() and tmp.stat().st_size > 0:
                  tmp.rename(dest)
                  row.update({"download_ok": True, "size_bytes": dest.stat().st_size, "sha256": sha256(dest), "method": "curl", "exit_code": code})
                  return row
              if tmp.exists():
                  try:
                      tmp.unlink()
                  except Exception:
                      pass
              try:
                  req = Request(url, headers={"User-Agent": "ACIRM-R13M-E/1.0"})
                  with urlopen(req, timeout=max_time) as r, open(tmp, "wb") as f:
                      shutil.copyfileobj(r, f, length=1024 * 1024)
                  if tmp.exists() and tmp.stat().st_size > 0:
                      tmp.rename(dest)
                      row.update({"download_ok": True, "size_bytes": dest.stat().st_size, "sha256": sha256(dest), "method": "urllib", "exit_code": 0})
                      return row
              except Exception as e:
                  row["error"] = repr(e)[:500]
              row.update({"method": "curl_urllib", "exit_code": "FAILED"})
              return row

          def resolve_week_url(week):
              try:
                  index = http_text(CFG["weekly_dir"], timeout=180)
              except Exception:
                  index = ""
              m = re.search(rf"lat_photon_weekly_w{int(week):03d}_p\d+_v\d+\.fits", index)
              fname = m.group(0) if m else f"lat_photon_weekly_w{int(week):03d}_p305_v001.fits"
              return CFG["weekly_dir"] + fname, fname, "index" if m else "default"

          def sep_deg(ra1, dec1, ra2, dec2):
              r1 = math.radians(float(ra1))
              d1 = math.radians(float(dec1))
              r2 = math.radians(float(ra2))
              d2 = math.radians(float(dec2))
              s = math.sin((d1 - d2) / 2.0) ** 2 + math.cos(d1) * math.cos(d2) * math.sin((r1 - r2) / 2.0) ** 2
              return math.degrees(2.0 * math.asin(min(1.0, math.sqrt(max(0.0, s)))))

          def sep_vec(ra, dec, ra0, dec0):
              ra = np.asarray(ra, float)
              dec = np.asarray(dec, float)
              r1 = np.radians(ra)
              d1 = np.radians(dec)
              r2 = math.radians(float(ra0))
              d2 = math.radians(float(dec0))
              s = np.sin((d1 - d2) / 2.0) ** 2 + np.cos(d1) * math.cos(d2) * np.sin((r1 - r2) / 2.0) ** 2
              return np.degrees(2 * np.arcsin(np.sqrt(np.clip(s, 0, 1))))

          def find_event_hdu(hdul):
              for h in hdul:
                  if hasattr(h, "columns") and h.columns is not None:
                      try:
                          cols = [c.upper() for c in h.columns.names]
                      except Exception:
                          cols = []
                      if all(x in cols for x in ["TIME", "ENERGY", "RA", "DEC"]):
                          return h
              return None

          def extract_target_event(photon_path):
              target_met = met(utc(CFG["target_event_utc"]))
              rows = []
              best = None
              with fits.open(photon_path, memmap=True) as hdul:
                  h = find_event_hdu(hdul)
                  if h is None:
                      return None, [{"status": "NO_EVENT_HDU_WITH_TIME_ENERGY_RA_DEC"}]
                  d = h.data
                  cols = [c.upper() for c in h.columns.names]
                  time = np.asarray(d["TIME"], float)
                  energy = np.asarray(d["ENERGY"], float)
                  ra = np.asarray(d["RA"], float)
                  dec = np.asarray(d["DEC"], float)
                  if "ZENITH_ANGLE" in cols:
                      zen = np.asarray(d["ZENITH_ANGLE"], float)
                  else:
                      zen = np.zeros_like(time) + np.nan
                  dt = np.abs(time - target_met)
                  de = np.abs(energy - float(CFG["target_energy_mev_expected"]))
                  mask = (dt <= 5.0) & (de <= 5.0)
                  idxs = np.where(mask)[0]
                  if len(idxs) == 0:
                      near = np.argsort(dt)[:20]
                      for i in near:
                          rows.append({
                              "candidate_type": "nearest_time_fallback",
                              "time_met": float(time[i]),
                              "time_utc": iso(metutc(float(time[i]))),
                              "delta_time_s": float(time[i] - target_met),
                              "energy_mev": float(energy[i]),
                              "delta_energy_mev": float(energy[i] - CFG["target_energy_mev_expected"]),
                              "ra_deg": float(ra[i]),
                              "dec_deg": float(dec[i]),
                              "sep_from_cygx1_deg": sep_deg(ra[i], dec[i], CFG["cygx1_ra_deg"], CFG["cygx1_dec_deg"]),
                              "zenith_angle_deg": float(zen[i]) if np.isfinite(zen[i]) else ""
                          })
                      return None, rows
                  for i in idxs:
                      row = {
                          "candidate_type": "exact_time_energy_match",
                          "time_met": float(time[i]),
                          "time_utc": iso(metutc(float(time[i]))),
                          "delta_time_s": float(time[i] - target_met),
                          "energy_mev": float(energy[i]),
                          "delta_energy_mev": float(energy[i] - CFG["target_energy_mev_expected"]),
                          "ra_deg": float(ra[i]),
                          "dec_deg": float(dec[i]),
                          "sep_from_cygx1_deg": sep_deg(ra[i], dec[i], CFG["cygx1_ra_deg"], CFG["cygx1_dec_deg"]),
                          "zenith_angle_deg": float(zen[i]) if np.isfinite(zen[i]) else ""
                      }
                      rows.append(row)
                  best = sorted(rows, key=lambda r: abs(r["delta_time_s"]) + abs(r["delta_energy_mev"]))[0]
              return best, rows

          def bstr(x):
              try:
                  if hasattr(x, "item"):
                      x = x.item()
              except Exception:
                  pass
              if isinstance(x, bytes):
                  return x.decode("utf-8", errors="ignore").strip()
              if x is None:
                  return ""
              return str(x).strip()

          def ffloat(x, default=""):
              try:
                  v = float(x)
                  if np.isfinite(v):
                      return v
              except Exception:
                  pass
              return default

          def pick(cols, names):
              lut = {str(c).upper(): c for c in cols}
              for n in names:
                  if n.upper() in lut:
                      return lut[n.upper()]
              return None

          def rowval(row, col, default=""):
              if col is None:
                  return default
              try:
                  return row[col]
              except Exception:
                  return default

          def parse_catalog(catalog_path, event):
              rows_event = []
              rows_cyg = []
              context = {}
              with fits.open(catalog_path, memmap=False) as hdul:
                  table = None
                  for h in hdul:
                      if hasattr(h, "columns") and h.columns is not None:
                          cols = list(h.columns.names)
                          if pick(cols, ["RAJ2000", "RA"]) and pick(cols, ["DEJ2000", "DEC"]):
                              table = h
                              break
                  if table is None:
                      raise RuntimeError("No 4FGL table with RA/DEC columns")
                  cols = list(table.columns.names)
                  data = table.data
                  c_ra = pick(cols, ["RAJ2000", "RA"])
                  c_dec = pick(cols, ["DEJ2000", "DEC"])
                  c_name = pick(cols, ["Source_Name", "SourceName", "NAME"])
                  c_assoc1 = pick(cols, ["ASSOC1", "ASSOC"])
                  c_assoc2 = pick(cols, ["ASSOC2"])
                  c_class = pick(cols, ["CLASS1", "CLASS"])
                  c_sig = pick(cols, ["Signif_Avg", "Detection_Significance"])
                  c_var = pick(cols, ["Variability_Index"])
                  c_tev = pick(cols, ["TeVCat_Flag", "TEVCAT_FLAG"])
                  c_flags = pick(cols, ["Flags", "FLAGS"])
                  c_flux = pick(cols, ["Flux_1_100_GeV", "Flux1000"])
                  context = {
                      "catalog_rows": int(len(data)),
                      "columns_available": cols,
                      "event_ra_deg": event["ra_deg"],
                      "event_dec_deg": event["dec_deg"]
                  }
                  for i, r in enumerate(data):
                      try:
                          ra = float(rowval(r, c_ra))
                          dec = float(rowval(r, c_dec))
                          se = sep_deg(event["ra_deg"], event["dec_deg"], ra, dec)
                          sc = sep_deg(CFG["cygx1_ra_deg"], CFG["cygx1_dec_deg"], ra, dec)
                          out = {
                              "row_index": i,
                              "source_name": bstr(rowval(r, c_name)),
                              "assoc1": bstr(rowval(r, c_assoc1)),
                              "assoc2": bstr(rowval(r, c_assoc2)),
                              "class": bstr(rowval(r, c_class)),
                              "ra_deg": ra,
                              "dec_deg": dec,
                              "sep_from_353gev_event_deg": se,
                              "sep_from_cygx1_deg": sc,
                              "significance": ffloat(rowval(r, c_sig)),
                              "variability_index": ffloat(rowval(r, c_var)),
                              "tevcat_flag": bstr(rowval(r, c_tev)),
                              "flags": rowval(r, c_flags, ""),
                              "flux_1_100_gev": ffloat(rowval(r, c_flux)),
                              "claim": "CATALOG_ASSOCIATION_CONTEXT_ONLY_NO_SCORE"
                          }
                          if se <= CFG["catalog_search_deg"]:
                              rows_event.append(out)
                          if sc <= CFG["catalog_search_deg"]:
                              rows_cyg.append(out)
                      except Exception:
                          pass
              rows_event = sorted(rows_event, key=lambda x: x["sep_from_353gev_event_deg"])
              rows_cyg = sorted(rows_cyg, key=lambda x: x["sep_from_cygx1_deg"])
              return context, rows_event, rows_cyg

          def classify(event, nearest_event_sources):
              sep_cyg = float(event["sep_from_cygx1_deg"])
              psf_ref = float(CFG["psf_reference_deg_gt10gev_general"])
              nearest = nearest_event_sources[0] if nearest_event_sources else None
              nearest_sep = nearest["sep_from_353gev_event_deg"] if nearest else ""
              nearest_name = nearest["source_name"] if nearest else ""
              if sep_cyg <= psf_ref:
                  assoc_class = "CO_SOURCE_COMPATIBLE_WITH_CYGX1_BY_SIMPLE_ANGULAR_PSF_CONTEXT"
              elif sep_cyg <= CFG["near_field_deg"]:
                  assoc_class = "NEAR_FIELD_OR_AMBIENT_DRIVER_CANDIDATE_NOT_DIRECT_CYGX1_ASSOCIATION"
              else:
                  assoc_class = "OUTSIDE_NEAR_FIELD_CONTEXT_NOT_DIRECT_CYGX1_ASSOCIATION"
              if nearest and nearest["sep_from_353gev_event_deg"] < sep_cyg:
                  nearest_note = "nearest_catalog_source_is_closer_than_CygX1"
              elif nearest:
                  nearest_note = "CygX1_is_as_close_or_closer_than_nearest_catalog_source"
              else:
                  nearest_note = "no_catalog_source_within_search_radius"
              return {
                  "event_energy_mev": event["energy_mev"],
                  "event_time_utc": event["time_utc"],
                  "event_ra_deg": event["ra_deg"],
                  "event_dec_deg": event["dec_deg"],
                  "event_sep_from_cygx1_deg": sep_cyg,
                  "general_lat_gt10gev_psf_reference_deg": psf_ref,
                  "simple_psf_ratio_sep_over_ref": sep_cyg / psf_ref if psf_ref > 0 else "",
                  "association_class": assoc_class,
                  "nearest_catalog_source_to_event": nearest_name,
                  "nearest_catalog_source_sep_deg": nearest_sep,
                  "nearest_catalog_note": nearest_note,
                  "interpretation": "This is source-context only. It cannot prove or disprove ACIRM. If far from Cyg X-1 by simple PSF scale, keep it only as delayed high-energy near-field/ambient driver candidate."
              }

          write_json("LOCKED_CONTEXT.json", {"stage": STAGE, **CFG})
          log("R13M_E started: 353 GeV event source association context. No score.")

          try:
              week_url, week_file, week_method = resolve_week_url(CFG["target_week"])
              week_dest = DATA / week_file
              cat_dest = DATA / "gll_psc_v35.fit"

              d_week = download(week_url, week_dest, "week_%03d" % CFG["target_week"], max_time=1800)
              d_cat = download(CFG["catalog_url"], cat_dest, "4fgl_catalog", max_time=900)
              write_csv("DOWNLOADS.csv", [d_week, d_cat], ["label", "url", "path", "download_ok", "size_bytes", "sha256", "method", "exit_code", "error"])

              if not d_week["download_ok"]:
                  final("TECHNICAL_STOP_WEEK_729_DOWNLOAD_FAILED_NO_SCORE", "RETRY_OR_USE_R13M_C_EVENT_TABLE_IF_AVAILABLE", {"download": d_week})
              elif not d_cat["download_ok"]:
                  final("TECHNICAL_STOP_4FGL_CATALOG_DOWNLOAD_FAILED_NO_SCORE", "RETRY_CATALOG_DOWNLOAD_OR_USE_LOCAL_CATALOG", {"download": d_cat})
              else:
                  event, event_rows = extract_target_event(week_dest)
                  event_cols = ["candidate_type", "time_met", "time_utc", "delta_time_s", "energy_mev", "delta_energy_mev", "ra_deg", "dec_deg", "sep_from_cygx1_deg", "zenith_angle_deg"]
                  write_csv("TARGET_EVENT_EXTRACTION.csv", event_rows, event_cols)

                  if event is None:
                      final("TECHNICAL_STOP_TARGET_353GEV_EVENT_NOT_REFOUND_IN_WEEK729_NO_SCORE", "REPAIR_EVENT_MATCHING_OR_USE_R13M_C_TOP_EVENT_TABLE", {"event_rows_sample": event_rows[:10]})
                  else:
                      context, src_event, src_cyg = parse_catalog(cat_dest, event)
                      src_cols = [
                          "row_index", "source_name", "assoc1", "assoc2", "class",
                          "ra_deg", "dec_deg", "sep_from_353gev_event_deg",
                          "sep_from_cygx1_deg", "significance", "variability_index",
                          "tevcat_flag", "flags", "flux_1_100_gev", "claim"
                      ]
                      write_json("CATALOG_CONTEXT.json", context)
                      write_csv("CATALOG_SOURCES_NEAR_353GEV_EVENT_WITHIN_5DEG.csv", src_event, src_cols)
                      write_csv("CATALOG_SOURCES_NEAR_CYGX1_WITHIN_5DEG.csv", src_cyg, src_cols)

                      summary = classify(event, src_event)
                      summary.update({
                          "target_event_refound": True,
                          "sources_within_5deg_of_event": len(src_event),
                          "sources_within_5deg_of_cygx1": len(src_cyg),
                          "nearest_sources_to_event_sample": src_event[:10],
                          "nearest_sources_to_cygx1_sample": src_cyg[:10],
                          "claim_ceiling": CFG["claim_ceiling"],
                          "theory_policy": CFG["theory_policy"]
                      })
                      write_json("SOURCE_ASSOCIATION_SUMMARY.json", summary)

                      if summary["association_class"] == "CO_SOURCE_COMPATIBLE_WITH_CYGX1_BY_SIMPLE_ANGULAR_PSF_CONTEXT":
                          decision = "GEV353_EVENT_SIMPLE_PSF_CONTEXT_CO_SOURCE_COMPATIBLE_NO_SCORE"
                          next_stage = "ACIRM_R13M_F_TARGETED_EXPOSURE_OR_LIKELIHOOD_CONTEXT_FOR_353GEV_EVENT"
                      elif "NEAR_FIELD" in summary["association_class"]:
                          decision = "GEV353_EVENT_CLASSIFIED_NEAR_FIELD_OR_AMBIENT_DRIVER_CANDIDATE_NOT_DIRECT_CYGX1_NO_SCORE"
                          next_stage = "ACIRM_R13M_F_WIDE_LAG_PHOTON_CHUNK_SCAN_7D_TO_3000D_NO_SCORE"
                      else:
                          decision = "GEV353_EVENT_NOT_DIRECTLY_ASSOCIATED_WITH_CYGX1_BY_SIMPLE_CONTEXT_NO_SCORE"
                          next_stage = "ACIRM_R13M_F_WIDE_LAG_PHOTON_CHUNK_SCAN_7D_TO_3000D_NO_SCORE"

                      final(decision, next_stage, {"summary": summary})

                  try:
                      shutil.rmtree(DATA)
                  except Exception:
                      pass

          except Exception as e:
              (OUT / "EXCEPTION_TRACEBACK.txt").write_text(traceback.format_exc(), encoding="utf-8")
              final("TECHNICAL_STOP_EXCEPTION_DURING_R13M_E", "REPAIR_FROM_TRACEBACK", {"error": repr(e)[:500]})
          PY
          CODE=$?
          echo "controller_exit_code=$CODE" > "$OUT/STEP_STATUS.log"
          if [ ! -f "$OUT/FINAL_DECISION.json" ]; then
            echo '{"decision":"CONTROLLER_FAILED_BEFORE_FINAL_DECISION"}' > "$OUT/FINAL_DECISION.json"
          fi
          cd "$GITHUB_WORKSPACE"
          ZIP="$GITHUB_WORKSPACE/${STAGE}_RESULTS.zip"
          SHA="$ZIP.sha256.txt"
          rm -f "$ZIP" "$SHA"
          rm -rf "$GITHUB_WORKSPACE/${STAGE}_DATA"
          zip -r "$ZIP" "$(basename "$OUT")"
          sha256sum "$ZIP" > "$SHA"
          exit 0

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ACIRM_R13M_E_353GEV_SOURCE_ASSOCIATION_CONTEXT_NO_SCORE_RESULTS
          path: |
            ACIRM_R13M_E_353GEV_SOURCE_ASSOCIATION_CONTEXT_NO_SCORE_RESULTS.zip
            ACIRM_R13M_E_353GEV_SOURCE_ASSOCIATION_CONTEXT_NO_SCORE_RESULTS.zip.sha256.txt
          retention-days: 7
