name: ACIRM R13MUJ verify official SCW paths for locked day manifest no values

on:
  workflow_dispatch:

jobs:
  verify-scw-paths:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lock no-values scope
        shell: bash
        run: |
          set -euo pipefail
          STAGE="ACIRM_R13MUJ_GITHUB_ACTIONS_VERIFY_OFFICIAL_SCW_PATHS_FOR_LOCKED_DAY_MANIFEST_NO_VALUES"
          OUT="$GITHUB_WORKSPACE/${STAGE}_OUTPUT"
          mkdir -p "$OUT"
          cat > "$OUT/R13MUJ_ROUTE_LOCK.json" <<'JSON'
          {
            "stage": "ACIRM_R13MUJ_GITHUB_ACTIONS_VERIFY_OFFICIAL_SCW_PATHS_FOR_LOCKED_DAY_MANIFEST_NO_VALUES",
            "opens_science_values": false,
            "downloads_science_products": false,
            "downloads_fits": false,
            "reads_fits_tables": false,
            "purpose": "Verify official SCW directory paths for the R13MUI locked 21-row day-scale manifest only",
            "forbidden": [
              "SPI spectra",
              "SPI images",
              "511 keV flux/count/intensity values",
              "FITS download",
              "FITS science product opening",
              "FITS table reading",
              "science-window value extraction",
              "particle-production claim"
            ],
            "claim_ceiling": "SCW path verification metadata only"
          }
          JSON

      - name: Write locked R13MUI day-scale manifest
        shell: bash
        run: |
          set -euo pipefail
          STAGE="ACIRM_R13MUJ_GITHUB_ACTIONS_VERIFY_OFFICIAL_SCW_PATHS_FOR_LOCKED_DAY_MANIFEST_NO_VALUES"
          OUT="$GITHUB_WORKSPACE/${STAGE}_OUTPUT"
          cat > "$OUT/R13MUJ_INPUT_LOCKED_DAY_SCALE_SCW_MANIFEST_21_ROWS.csv" <<'CSV'
scw_id_str,scw_ver_str,rev_dir_candidate,official_scw_dir_candidate_url,scw_type,good_spi,start_date,end_date
250400110021,1,2504,https://heasarc.gsfc.nasa.gov/FTP/integral/data/scw/2504/250400110021.001/,slew,133,59717.7615575592,59717.763096912
250400120010,1,2504,https://heasarc.gsfc.nasa.gov/FTP/integral/data/scw/2504/250400120010.001/,pointing,0,59717.763096912,59717.7631895046
250400090021,1,2504,https://heasarc.gsfc.nasa.gov/FTP/integral/data/scw/2504/250400090021.001/,slew,132,59717.681337604,59717.6828653827
250400090010,1,2504,https://heasarc.gsfc.nasa.gov/FTP/integral/data/scw/2504/250400090010.001/,pointing,3278,59717.6427611922,59717.681337604
250400080021,1,2504,https://heasarc.gsfc.nasa.gov/FTP/integral/data/scw/2504/250400080021.001/,slew,133,59717.6412218394,59717.6427611922
250400020010,1,2504,https://heasarc.gsfc.nasa.gov/FTP/integral/data/scw/2504/250400020010.001/,pointing,3472,59717.2947285785,59717.335712399
250400010021,1,2504,https://heasarc.gsfc.nasa.gov/FTP/integral/data/scw/2504/250400010021.001/,slew,115,59717.2933975592,59717.2947285785
250400010010,1,2504,https://heasarc.gsfc.nasa.gov/FTP/integral/data/scw/2504/250400010010.001/,pointing,770,59717.2794160694,59717.2933975592
250400080010,1,2504,https://heasarc.gsfc.nasa.gov/FTP/integral/data/scw/2504/250400080010.001/,pointing,3248,59717.602691724,59717.6412218394
250400020021,1,2504,https://heasarc.gsfc.nasa.gov/FTP/integral/data/scw/2504/250400020021.001/,slew,133,59717.335712399,59717.3372517518
250400030010,1,2504,https://heasarc.gsfc.nasa.gov/FTP/integral/data/scw/2504/250400030010.001/,pointing,3299,59717.3372517518,59717.3758281635
250400070021,1,2504,https://heasarc.gsfc.nasa.gov/FTP/integral/data/scw/2504/250400070021.001/,slew,7159,59717.5195782487,59717.602691724
250400070010,1,2504,https://heasarc.gsfc.nasa.gov/FTP/integral/data/scw/2504/250400070010.001/,pointing,0,59717.5192888967,59717.5195782487
250400030021,1,2504,https://heasarc.gsfc.nasa.gov/FTP/integral/data/scw/2504/250400030021.001/,slew,136,59717.3758281635,59717.3774022386
