name: ACIRM R13MPR MPE rebinned SPI energy boundary route

on:
  workflow_dispatch:

jobs:
  mpe-rebinned-route:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - name: Prepare R13MPR firewall
        shell: bash
        run: |
          set +e
          STAGE="ACIRM_R13MPR_MPE_REBINNED_SPI_ENERGY_BOUNDARY_ROUTE"
          OUT="$GITHUB_WORKSPACE/${STAGE}_OUTPUT"
          mkdir -p "$OUT"
          cat > "$OUT/R13MPR_FIREWALL.json" <<'JSON'
          {
            "stage": "ACIRM_R13MPR_MPE_REBINNED_SPI_ENERGY_BOUNDARY_ROUTE",
            "inherits_from": "R13MPQ confirmed spi_spectra E_RANGE is not direct keV mapping",
            "purpose": "Use MPE rebinned SPI tarballs containing energy_boundaries.fits and evts_det_spec.fits, if available, to avoid unsafe channel-to-keV inference.",
            "locked_revolution": "2504",
            "preferred_energy_set": "18-2000keV_.5keV",
            "locked_line_window_keV": [508.0, 514.0],
            "locked_lower_sideband_keV": [490.0, 500.0],
            "locked_upper_sideband_keV": [522.0, 532.0],
            "target_scw_filter_required_for_target_claim": true,
            "forbidden_claims_even_if_values_nonzero": [
              "proof",
              "discovery",
              "evidence",
              "confirmed 511 keV detection",
              "particle production",
              "ACIRM established"
            ],
            "claim_ceiling": "route/readout feasibility only; revolution-level diagnostic if target-SCW filter is unavailable"
          }
          JSON
          echo "prepare_step_completed_utc=$(date -u)" > "$OUT/R13MPR_STEP_STATUS.log"
          exit 0

      - name: Install Python dependencies
        shell: bash
        run: |
          set +e
          STAGE="ACIRM_R13MPR_MPE_REBINNED_SPI_ENERGY_BOUNDARY_ROUTE"
          OUT="$GITHUB_WORKSPACE/${STAGE}_OUTPUT"
          mkdir -p "$OUT"
          {
            echo "install_start_utc=$(date -u)"
            python3 --version
            python3 -m pip --version
            python3 -m pip install --upgrade pip
            python3 -m pip install --no-cache-dir astropy numpy
            python3 -c "import json, astropy, numpy; print(json.dumps({'astropy_import_ok': True, 'astropy_version': astropy.__version__, 'numpy_import_ok': True, 'numpy_version': numpy.__version__}, indent=2))"
            echo "install_end_utc=$(date -u)"
          } > "$OUT/R13MPR_DEPENDENCY_INSTALL_LOG.txt" 2>&1
          CODE=$?
          echo "dependency_step_exit_code=$CODE" >> "$OUT/R13MPR_DEPENDENCY_INSTALL_LOG.txt"
          echo "dependency_step_exit_code=$CODE" >> "$OUT/R13MPR_STEP_STATUS.log"
          exit 0

      - name: Run MPE rebinned route
        shell: bash
        run: |
          set +e
          STAGE="ACIRM_R13MPR_MPE_REBINNED_SPI_ENERGY_BOUNDARY_ROUTE"
          OUT="$GITHUB_WORKSPACE/${STAGE}_OUTPUT"
          mkdir -p "$OUT"

          cat > "$OUT/r13mpr_runner.py" <<'PYCODE'
          from pathlib import Path
          from urllib.request import Request, urlopen, urlretrieve
          import csv
          import json
          import math
          import os
          import sys
          import tarfile
          import tempfile
          import traceback

          STAGE = "ACIRM_R13MPR_MPE_REBINNED_SPI_ENERGY_BOUNDARY_ROUTE"
          out = Path(os.environ.get("GITHUB_WORKSPACE", ".")) / (STAGE + "_OUTPUT")
          out.mkdir(parents=True, exist_ok=True)

          def write_json(name, obj):
              (out / name).write_text(json.dumps(obj, indent=2, ensure_ascii=False), encoding="utf-8")

          def write_csv(name, rows, columns):
              with (out / name).open("w", newline="", encoding="utf-8") as f:
                  w = csv.DictWriter(f, fieldnames=columns)
                  w.writeheader()
                  for row in rows:
                      w.writerow({c: row.get(c, "") for c in columns})

          def append_status(text):
              with (out / "R13MPR_STEP_STATUS.log").open("a", encoding="utf-8") as f:
                  f.write(text + "\n")

          def final_stop(decision, next_stage, **kwargs):
              final = {
                  "stage": STAGE,
                  "decision": decision,
                  "next_stage": next_stage,
                  "claim_ceiling": "route/readout feasibility only; no detection/evidence/proof/discovery claim"
              }
              final.update(kwargs)
              write_json("R13MPR_FINAL_DECISION.json", final)
              print(json.dumps(final, indent=2))
              return final

          run_errors = []
          append_status("runner_started")

          locked_context = {
              "rev": "2504",
              "line_window_keV": [508.0, 514.0],
              "lower_sideband_keV": [490.0, 500.0],
              "upper_sideband_keV": [522.0, 532.0],
              "target_scw_ids": [
                  "250400110021", "250400120010", "250400090021", "250400090010",
                  "250400080021", "250400020010", "250400010021", "250400010010",
                  "250400080010", "250400020021", "250400030010", "250400070021",
                  "250400070010", "250400030021", "250400060021", "250400040010",
                  "250400060010", "250400040021", "250400050021", "250400000031",
                  "250400050010"
              ],
              "target_filter_required_for_target_claim": True,
              "no_claim": True
          }
          write_json("R13MPR_LOCKED_CONTEXT.json", locked_context)

          try:
              import numpy as np
              from astropy.io import fits
              import astropy
              dependency = {
                  "numpy_import_ok": True,
                  "numpy_version": np.__version__,
                  "astropy_import_ok": True,
                  "astropy_version": astropy.__version__
              }
          except Exception as e:
              run_errors.append("dependency_import_error: " + repr(e))
              run_errors.append(traceback.format_exc()[:2000])
              write_json("R13MPR_DEPENDENCY_STATUS.json", {"numpy_import_ok": False, "astropy_import_ok": False})
              final_stop(
                  "DEPENDENCY_IMPORT_FAILED",
                  "R13MPS_REPAIR_DEPENDENCY_OR_USE_OSA_CONTAINER",
                  selected_tarball_url="",
                  downloaded_tarball=False,
                  extracted_required_files=False,
                  target_scw_filter_safe=False,
                  diagnostic_value_rows=0,
                  read_science_values=False,
                  run_errors_count=len(run_errors),
                  run_errors=run_errors
              )
              sys.exit(0)
          write_json("R13MPR_DEPENDENCY_STATUS.json", dependency)

          tarball_candidates = [
              {
                  "energy_set": "18-2000keV_.5keV",
                  "url": "https://www-cms.mpe.mpg.de/gamma/instruments/integral/spi_public_service/data/18-2000keV_.5keV/2504_18-2000keV_.5keV.tgz",
                  "priority": 1
              },
              {
                  "energy_set": "18-2000keV_.5keV",
                  "url": "http://www.mpe.mpg.de/gamma/instruments/integral/spi_public_service/data/18-2000keV_.5keV/2504_18-2000keV_.5keV.tgz",
                  "priority": 2
              },
              {
                  "energy_set": "18-8000keV_1keV",
                  "url": "https://www-cms.mpe.mpg.de/gamma/instruments/integral/spi_public_service/data/18-8000keV_1keV/2504_18-8000keV_1keV.tgz",
                  "priority": 3
              },
              {
                  "energy_set": "18-8000keV_1keV",
                  "url": "http://www.mpe.mpg.de/gamma/instruments/integral/spi_public_service/data/18-8000keV_1keV/2504_18-8000keV_1keV.tgz",
                  "priority": 4
              }
          ]
          write_csv("R13MPR_TARBALL_CANDIDATES.csv", tarball_candidates, ["energy_set", "url", "priority"])

          def head_info(url):
              try:
                  req = Request(url, method="HEAD", headers={"User-Agent": "ACIRM-R13MPR-mpe-route"})
                  with urlopen(req, timeout=45) as r:
                      length = r.headers.get("Content-Length", "")
                      ctype = r.headers.get("Content-Type", "")
                      status = getattr(r, "status", "")
                      return True, status, ctype, int(length) if str(length).isdigit() else None, ""
              except Exception as e:
                  return False, "", "", None, repr(e)[:500]

          probe_rows = []
          selected = None
          max_bytes = 1500 * 1024 * 1024
          for cand in tarball_candidates:
              ok, status, ctype, clen, err = head_info(cand["url"])
              row = dict(cand)
              row.update({
                  "head_ok": ok,
                  "head_status": status,
                  "content_type": ctype,
                  "content_length_bytes": clen,
                  "allowed_by_size_gate": bool(ok and (clen is None or clen <= max_bytes)),
                  "error": err
              })
              probe_rows.append(row)
              if selected is None and row["allowed_by_size_gate"]:
                  selected = row
          write_csv(
              "R13MPR_TARBALL_HEAD_PROBE.csv",
              probe_rows,
              ["energy_set", "url", "priority", "head_ok", "head_status", "content_type", "content_length_bytes", "allowed_by_size_gate", "error"]
          )

          if selected is None:
              final_stop(
                  "NO_MPE_REBINNED_TARBALL_REACHABLE_OR_SIZE_ALLOWED",
                  "R13MPS_REPAIR_MPE_URL_OR_USE_OFFICIAL_OSA_CONTAINER",
                  selected_tarball_url="",
                  downloaded_tarball=False,
                  extracted_required_files=False,
                  target_scw_filter_safe=False,
                  diagnostic_value_rows=0,
                  read_science_values=False,
                  run_errors_count=len(run_errors),
                  run_errors=run_errors
              )
              sys.exit(0)

          selected_url = selected["url"]
          selected_energy_set = selected["energy_set"]
          append_status("selected_tarball=" + selected_url)

          extract_dir = out / "mpe_rebinned_extract"
          extract_dir.mkdir(exist_ok=True)
          tar_path = out / "selected_mpe_rebinned_2504.tgz"
          extracted_files = []

          try:
              urlretrieve(selected_url, tar_path)
              downloaded_tarball = True
          except Exception as e:
              run_errors.append("tarball_download_error: " + repr(e))
              final_stop(
                  "MPE_REBINNED_TARBALL_DOWNLOAD_FAILED",
                  "R13MPS_REPAIR_NETWORK_OR_MANUAL_DOWNLOAD",
                  selected_tarball_url=selected_url,
                  downloaded_tarball=False,
                  extracted_required_files=False,
                  target_scw_filter_safe=False,
                  diagnostic_value_rows=0,
                  read_science_values=False,
                  run_errors_count=len(run_errors),
                  run_errors=run_errors
              )
              sys.exit(0)

          wanted = {
              "energy_boundaries.fits",
              "evts_det_spec.fits",
              "pointing.fits",
              "gti.fits",
              "dead_time.fits"
          }

          tar_listing_rows = []
          try:
              with tarfile.open(tar_path, "r:gz") as tf:
                  for member in tf.getmembers():
                      base = Path(member.name).name
                      tar_listing_rows.append({
                          "name": member.name,
                          "base": base,
                          "size": member.size,
                          "selected_for_extract": base in wanted
                      })
                      if member.isfile() and base in wanted:
                          member.name = base
                          tf.extract(member, extract_dir)
                          extracted_files.append(base)
          except Exception as e:
              run_errors.append("tar_extract_error: " + repr(e))
              run_errors.append(traceback.format_exc()[:2000])

          write_csv("R13MPR_TARBALL_LISTING_SELECTED.csv", tar_listing_rows, ["name", "base", "size", "selected_for_extract"])
          try:
              tar_path.unlink()
          except Exception:
              pass

          required_ok = ("energy_boundaries.fits" in extracted_files) and ("evts_det_spec.fits" in extracted_files)
          if not required_ok:
              final_stop(
                  "REQUIRED_REBINNED_FILES_MISSING",
                  "R13MPS_REPAIR_MPE_TARBALL_SELECTION_OR_OSA_CONTAINER",
                  selected_tarball_url=selected_url,
                  selected_energy_set=selected_energy_set,
                  downloaded_tarball=downloaded_tarball,
                  extracted_files=sorted(extracted_files),
                  extracted_required_files=False,
                  target_scw_filter_safe=False,
                  diagnostic_value_rows=0,
                  read_science_values=False,
                  run_errors_count=len(run_errors),
                  run_errors=run_errors
              )
              sys.exit(0)

          def fits_profile(path, label):
              rows = []
              try:
                  with fits.open(path, memmap=False) as hdul:
                      for i, hdu in enumerate(hdul):
                          cols = []
                          if hasattr(hdu, "columns") and hdu.columns is not None:
                              try:
                                  cols = list(hdu.columns.names)
                              except Exception:
                                  cols = []
                          shape = ""
                          nrows = ""
                          try:
                              data = hdu.data
                              if data is not None:
                                  shape = str(np.asarray(data).shape)
                                  nrows = len(data)
                          except Exception:
                              pass
                          selected_header = {}
                          for key in hdu.header.keys():
                              ku = str(key).upper()
                              if ku.startswith("T") or "ENER" in ku or "CHAN" in ku or "NAXIS" in ku or "EXT" in ku or "SCW" in ku or "PNT" in ku:
                                  try:
                                      selected_header[str(key)] = str(hdu.header[key])
                                  except Exception:
                                      pass
                          rows.append({
                              "file": label,
                              "hdu_index": i,
                              "hdu_name": getattr(hdu, "name", ""),
                              "hdu_class": hdu.__class__.__name__,
                              "columns_json": json.dumps(cols),
                              "n_columns": len(cols),
                              "shape": shape,
                              "n_rows": nrows,
                              "selected_header_json": json.dumps(selected_header)[:5000]
                          })
              except Exception as e:
                  run_errors.append("fits_profile_error_" + label + ": " + repr(e))
              return rows

          profile_rows = []
          for fn in extracted_files:
              profile_rows.extend(fits_profile(extract_dir / fn, fn))
          write_csv(
              "R13MPR_EXTRACTED_FITS_PROFILE.csv",
              profile_rows,
              ["file", "hdu_index", "hdu_name", "hdu_class", "columns_json", "n_columns", "shape", "n_rows", "selected_header_json"]
          )

          def get_energy_boundaries(path):
              candidates = []
              with fits.open(path, memmap=False) as hdul:
                  for hdu_index, hdu in enumerate(hdul):
                      data = getattr(hdu, "data", None)
                      cols = []
                      if hasattr(hdu, "columns") and hdu.columns is not None:
                          try:
                              cols = list(hdu.columns.names)
                          except Exception:
                              cols = []
                      if data is None:
                          continue
                      col_upper = {str(c).upper(): c for c in cols}
                      lo_col = None
                      hi_col = None
                      for k in ["E_MIN", "E_LO", "ENERG_LO", "ENERGY_LO", "CHANNEL_E_MIN", "EMIN", "E_LOW"]:
                          if k in col_upper:
                              lo_col = col_upper[k]
                              break
                      for k in ["E_MAX", "E_HI", "ENERG_HI", "ENERGY_HI", "CHANNEL_E_MAX", "EMAX", "E_HIGH"]:
                          if k in col_upper:
                              hi_col = col_upper[k]
                              break
                      if lo_col and hi_col:
                          emin = np.asarray(data[lo_col], dtype=float).ravel()
                          emax = np.asarray(data[hi_col], dtype=float).ravel()
                          if len(emin) == len(emax) and len(emin) > 0:
                              candidates.append((hdu_index, getattr(hdu, "name", ""), lo_col, hi_col, emin, emax, "table_columns"))
                      else:
                          arr = np.asarray(data)
                          if arr.ndim == 2 and 2 in arr.shape:
                              if arr.shape[1] == 2:
                                  emin = arr[:, 0].astype(float)
                                  emax = arr[:, 1].astype(float)
                              else:
                                  emin = arr[0, :].astype(float)
                                  emax = arr[1, :].astype(float)
                              if len(emin) == len(emax) and len(emin) > 0:
                                  candidates.append((hdu_index, getattr(hdu, "name", ""), "ARRAY_COL0", "ARRAY_COL1", emin, emax, "image_or_array"))
              for item in candidates:
                  _, _, _, _, emin, emax, _ = item
                  if np.nanmin(emin) <= 508.0 and np.nanmax(emax) >= 514.0 and np.nanmax(emax) <= 10000 and np.nanmin(emin) >= -5:
                      return item
              return None

          eb_path = extract_dir / "energy_boundaries.fits"
          ev_path = extract_dir / "evts_det_spec.fits"
          pointing_path = extract_dir / "pointing.fits"

          energy_item = None
          try:
              energy_item = get_energy_boundaries(eb_path)
          except Exception as e:
              run_errors.append("energy_boundary_parse_error: " + repr(e))
              run_errors.append(traceback.format_exc()[:2000])

          if energy_item is None:
              final_stop(
                  "ENERGY_BOUNDARIES_NOT_PARSEABLE_OR_DO_NOT_COVER_511",
                  "R13MPS_OFFICIAL_OSA_CONTAINER_REQUIRED",
                  selected_tarball_url=selected_url,
                  selected_energy_set=selected_energy_set,
                  downloaded_tarball=True,
                  extracted_required_files=True,
                  target_scw_filter_safe=False,
                  diagnostic_value_rows=0,
                  read_science_values=False,
                  run_errors_count=len(run_errors),
                  run_errors=run_errors
              )
              sys.exit(0)

          eb_hdu, eb_name, eb_lo_col, eb_hi_col, emin, emax, eb_method = energy_item
          energy_rows = []
          for i in range(len(emin)):
              if i < 20 or (emax[i] > 480 and emin[i] < 540):
                  energy_rows.append({
                      "bin_index": i,
                      "emin_keV": float(emin[i]),
                      "emax_keV": float(emax[i]),
                      "overlap_line": bool(emax[i] > 508.0 and emin[i] < 514.0),
                      "overlap_lower": bool(emax[i] > 490.0 and emin[i] < 500.0),
                      "overlap_upper": bool(emax[i] > 522.0 and emin[i] < 532.0)
                  })
          write_csv("R13MPR_ENERGY_BOUNDARY_PROFILE_AROUND_511.csv", energy_rows, ["bin_index", "emin_keV", "emax_keV", "overlap_line", "overlap_lower", "overlap_upper"])

          line_idx = np.where((emax > 508.0) & (emin < 514.0))[0]
          lower_idx = np.where((emax > 490.0) & (emin < 500.0))[0]
          upper_idx = np.where((emax > 522.0) & (emin < 532.0))[0]

          boundary_summary = {
              "method": eb_method,
              "hdu_index": eb_hdu,
              "hdu_name": eb_name,
              "low_column": eb_lo_col,
              "high_column": eb_hi_col,
              "n_bins": int(len(emin)),
              "emin_min": float(np.nanmin(emin)),
              "emax_max": float(np.nanmax(emax)),
              "line_bin_count": int(len(line_idx)),
              "lower_bin_count": int(len(lower_idx)),
              "upper_bin_count": int(len(upper_idx)),
              "line_bin_minmax": [int(line_idx[0]), int(line_idx[-1])] if len(line_idx) else [],
              "lower_bin_minmax": [int(lower_idx[0]), int(lower_idx[-1])] if len(lower_idx) else [],
              "upper_bin_minmax": [int(upper_idx[0]), int(upper_idx[-1])] if len(upper_idx) else []
          }
          write_json("R13MPR_ENERGY_BOUNDARY_SUMMARY.json", boundary_summary)

          if len(line_idx) == 0 or len(lower_idx) == 0 or len(upper_idx) == 0:
              final_stop(
                  "LOCKED_WINDOWS_NOT_COVERED_BY_ENERGY_BOUNDARIES",
                  "R13MPS_REPAIR_ENERGY_SET_OR_OSA_CONTAINER",
                  selected_tarball_url=selected_url,
                  selected_energy_set=selected_energy_set,
                  downloaded_tarball=True,
                  extracted_required_files=True,
                  target_scw_filter_safe=False,
                  diagnostic_value_rows=0,
                  read_science_values=False,
                  energy_boundary_summary=boundary_summary,
                  run_errors_count=len(run_errors),
                  run_errors=run_errors
              )
              sys.exit(0)

          target_scws = set(locked_context["target_scw_ids"])
          target_filter_safe = False
          target_row_mask = None
          pointing_rows = []
          if pointing_path.exists():
              try:
                  with fits.open(pointing_path, memmap=False) as hdul:
                      for hdu_index, hdu in enumerate(hdul):
                          data = getattr(hdu, "data", None)
                          cols = []
                          if hasattr(hdu, "columns") and hdu.columns is not None:
                              try:
                                  cols = list(hdu.columns.names)
                              except Exception:
                                  cols = []
                          if data is None or not cols:
                              continue
                          for col in cols:
                              col_upper = str(col).upper()
                              if "SCW" in col_upper or "SCI" in col_upper or "POINT" in col_upper or "PNT" in col_upper:
                                  sample = []
                                  try:
                                      arr = data[col]
                                      for j in range(min(10, len(arr))):
                                          sample.append(str(arr[j]))
                                  except Exception:
                                      pass
                                  pointing_rows.append({
                                      "hdu_index": hdu_index,
                                      "hdu_name": getattr(hdu, "name", ""),
                                      "column": col,
                                      "sample_json": json.dumps(sample)[:1000]
                                  })
                                  try:
                                      vals = [str(x).strip() for x in data[col]]
                                      mask = [any(scw in v for scw in target_scws) for v in vals]
                                      if any(mask):
                                          target_filter_safe = True
                                          target_row_mask = np.asarray(mask, dtype=bool)
                                  except Exception:
                                      pass
              except Exception as e:
                  run_errors.append("pointing_parse_error: " + repr(e))
          write_csv("R13MPR_POINTING_TARGET_FILTER_AUDIT.csv", pointing_rows, ["hdu_index", "hdu_name", "column", "sample_json"])

          readout_rows = []
          ev_profile_rows = []
          diagnostic_value_rows = 0
          read_science_values = False
          ev_shape_selected = ""
          energy_axis_selected = None
          target_axis_selected = None
          readout_scope = "UNSET"

          try:
              with fits.open(ev_path, memmap=False) as hdul:
                  for hdu_index, hdu in enumerate(hdul):
                      data = getattr(hdu, "data", None)
                      cols = []
                      if hasattr(hdu, "columns") and hdu.columns is not None:
                          try:
                              cols = list(hdu.columns.names)
                          except Exception:
                              cols = []
                      shape = ""
                      if data is not None:
                          try:
                              shape = str(np.asarray(data).shape)
                          except Exception:
                              shape = ""
                      ev_profile_rows.append({
                          "hdu_index": hdu_index,
                          "hdu_name": getattr(hdu, "name", ""),
                          "hdu_class": hdu.__class__.__name__,
                          "columns_json": json.dumps(cols),
                          "shape": shape
                      })

                      arrays = []
                      if data is None:
                          continue
                      if cols:
                          for col in cols:
                              try:
                                  arr = np.asarray(data[col], dtype=float)
                                  if arr.size > 0:
                                      arrays.append((col, arr))
                              except Exception:
                                  pass
                      else:
                          try:
                              arr = np.asarray(data, dtype=float)
                              if arr.size > 0:
                                  arrays.append(("IMAGE_OR_PRIMARY_ARRAY", arr))
                          except Exception:
                              pass

                      for arr_name, arr in arrays:
                          shape_tuple = arr.shape
                          possible_axes = [ax for ax, dim in enumerate(shape_tuple) if dim == len(emin)]
                          if not possible_axes:
                              continue
                          energy_axis = possible_axes[-1]

                          arr_work = arr
                          target_axis = None
                          scope = "REVOLUTION_LEVEL_NOT_TARGET_FILTERED"
                          if target_filter_safe and target_row_mask is not None:
                              for ax, dim in enumerate(arr.shape):
                                  if dim == len(target_row_mask):
                                      target_axis = ax
                                      break
                              if target_axis is not None:
                                  idx_tuple = [slice(None)] * arr.ndim
                                  idx_tuple[target_axis] = target_row_mask
                                  arr_work = arr[tuple(idx_tuple)]
                                  scope = "TARGET_SCW_FILTERED"

                          def window_sum(indices):
                              try:
                                  selected = np.take(arr_work, indices, axis=energy_axis)
                                  return float(np.nansum(selected))
                              except Exception:
                                  return None

                          line_val = window_sum(line_idx)
                          low_val = window_sum(lower_idx)
                          high_val = window_sum(upper_idx)
                          if line_val is None and low_val is None and high_val is None:
                              continue
                          side_mean = None
                          ratio = None
                          if low_val is not None and high_val is not None:
                              side_mean = 0.5 * (low_val + high_val)
                              if side_mean not in [0, None] and not (isinstance(side_mean, float) and math.isnan(side_mean)):
                                  ratio = line_val / side_mean if line_val is not None else None

                          diagnostic_value_rows += 1
                          read_science_values = True
                          ev_shape_selected = str(shape_tuple)
                          energy_axis_selected = int(energy_axis)
                          target_axis_selected = None if target_axis is None else int(target_axis)
                          readout_scope = scope
                          readout_rows.append({
                              "hdu_index": hdu_index,
                              "hdu_name": getattr(hdu, "name", ""),
                              "array_or_column": arr_name,
                              "array_shape": str(shape_tuple),
                              "energy_axis": int(energy_axis),
                              "target_axis": "" if target_axis is None else int(target_axis),
                              "readout_scope": scope,
                              "line_508_514_value": line_val,
                              "line_bin_count": int(len(line_idx)),
                              "lower_490_500_value": low_val,
                              "lower_bin_count": int(len(lower_idx)),
                              "upper_522_532_value": high_val,
                              "upper_bin_count": int(len(upper_idx)),
                              "sideband_mean": side_mean,
                              "line_to_sideband_mean_ratio": ratio,
                              "claim": "NO_DETECTION_CLAIM_DIAGNOSTIC_VALUE_ONLY"
                          })
          except Exception as e:
              run_errors.append("evts_det_spec_readout_error: " + repr(e))
              run_errors.append(traceback.format_exc()[:2000])

          write_csv("R13MPR_EVTS_DET_SPEC_PROFILE.csv", ev_profile_rows, ["hdu_index", "hdu_name", "hdu_class", "columns_json", "shape"])
          write_csv(
              "R13MPR_REBINNED_511_READOUT_DIAGNOSTIC_VALUES.csv",
              readout_rows if readout_rows else [{
                  "hdu_index": "", "hdu_name": "", "array_or_column": "", "array_shape": "",
                  "energy_axis": "", "target_axis": "", "readout_scope": "",
                  "line_508_514_value": "", "line_bin_count": "", "lower_490_500_value": "",
                  "lower_bin_count": "", "upper_522_532_value": "", "upper_bin_count": "",
                  "sideband_mean": "", "line_to_sideband_mean_ratio": "", "claim": "NO_DIAGNOSTIC_VALUE_EXTRACTED"
              }],
              ["hdu_index", "hdu_name", "array_or_column", "array_shape", "energy_axis", "target_axis", "readout_scope", "line_508_514_value", "line_bin_count", "lower_490_500_value", "lower_bin_count", "upper_522_532_value", "upper_bin_count", "sideband_mean", "line_to_sideband_mean_ratio", "claim"]
          )

          if diagnostic_value_rows > 0 and readout_scope == "TARGET_SCW_FILTERED":
              decision = "TARGET_FILTERED_REBINNED_511_DIAGNOSTIC_VALUES_EXTRACTED_NO_CLAIM"
              next_stage = "R13MPS_VALIDATE_TARGET_FILTERED_VALUES_WITH_OFFTIME_CONTROLS_AND_NULLS"
          elif diagnostic_value_rows > 0:
              decision = "REVOLUTION_LEVEL_REBINNED_511_VALUES_EXTRACTED_NOT_TARGET_FILTERED_NO_CLAIM"
              next_stage = "R13MPS_REPAIR_TARGET_SCW_FILTER_OR_USE_OSA_OBSGROUP"
          else:
              decision = "ENERGY_BOUNDARIES_PARSED_BUT_EVTS_DET_SPEC_MAPPING_FAILED_NO_CLAIM"
              next_stage = "R13MPS_REPAIR_EVTS_DET_SPEC_AXIS_MAPPING_OR_OSA"

          final_stop(
              decision,
              next_stage,
              selected_tarball_url=selected_url,
              selected_energy_set=selected_energy_set,
              downloaded_tarball=True,
              extracted_required_files=True,
              extracted_files=sorted(extracted_files),
              energy_boundary_summary=boundary_summary,
              target_scw_filter_safe=target_filter_safe,
              evts_det_spec_shape_selected=ev_shape_selected,
              energy_axis_selected=energy_axis_selected,
              target_axis_selected=target_axis_selected,
              diagnostic_value_rows=diagnostic_value_rows,
              read_science_values=read_science_values,
              readout_scope=readout_scope,
              run_errors_count=len(run_errors),
              run_errors=run_errors
          )
          append_status("runner_completed")
          PYCODE

          python3 "$OUT/r13mpr_runner.py" > "$OUT/R13MPR_RUNNER_STDOUT.txt" 2> "$OUT/R13MPR_RUNNER_STDERR.txt"
          CODE=$?
          echo "runner_exit_code=$CODE" >> "$OUT/R13MPR_STEP_STATUS.log"

          if [ ! -f "$OUT/R13MPR_FINAL_DECISION.json" ]; then
            cat > "$OUT/R13MPR_FINAL_DECISION.json" <<'JSON'
          {
            "stage": "ACIRM_R13MPR_MPE_REBINNED_SPI_ENERGY_BOUNDARY_ROUTE",
            "decision": "RUNNER_FAILED_BEFORE_FINAL_DECISION",
            "next_stage": "R13MPS_REPAIR_RUNNER_USING_STDOUT_STDERR",
            "claim_ceiling": "no claim"
          }
          JSON
          fi
          exit 0

      - name: Package results
        if: always()
        shell: bash
        run: |
          set +e
          STAGE="ACIRM_R13MPR_MPE_REBINNED_SPI_ENERGY_BOUNDARY_ROUTE"
          OUT="$GITHUB_WORKSPACE/${STAGE}_OUTPUT"
          ZIP="$GITHUB_WORKSPACE/${STAGE}_RESULTS.zip"
          SHA="$ZIP.sha256.txt"
          mkdir -p "$OUT"

          if [ ! -f "$OUT/R13MPR_FINAL_DECISION.json" ]; then
            cat > "$OUT/R13MPR_FINAL_DECISION.json" <<'JSON'
          {
            "stage": "ACIRM_R13MPR_MPE_REBINNED_SPI_ENERGY_BOUNDARY_ROUTE",
            "decision": "PACKAGING_REACHED_WITHOUT_FINAL_DECISION",
            "next_stage": "R13MPS_REPAIR_WORKFLOW_PACKAGING_LOGS",
            "claim_ceiling": "no claim"
          }
          JSON
          fi

          cat > "$OUT/R13MPR_GO_NO_GO.csv" <<'CSV'
          question,decision,reason
          Does R13MPR claim 511 keV detection?,NO,Only route/readout feasibility is allowed.
          Does R13MPR use official energy boundaries?,SEE_DECISION,Read R13MPR_FINAL_DECISION.json and ENERGY_BOUNDARY_SUMMARY.
          Is a revolution-level readout enough for target claim?,NO,target SCW filter is required.
          Are off-time controls analyzed here?,NO,this stage is route/readout repair only.
          CSV

          cd "$GITHUB_WORKSPACE"
          rm -f "$ZIP" "$SHA"
          zip -r "$ZIP" "$(basename "$OUT")"
          sha256sum "$ZIP" > "$SHA"
          exit 0

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ACIRM_R13MPR_MPE_REBINNED_SPI_ENERGY_BOUNDARY_ROUTE_RESULTS
          path: |
            ACIRM_R13MPR_MPE_REBINNED_SPI_ENERGY_BOUNDARY_ROUTE_RESULTS.zip
            ACIRM_R13MPR_MPE_REBINNED_SPI_ENERGY_BOUNDARY_ROUTE_RESULTS.zip.sha256.txt
          retention-days: 7
