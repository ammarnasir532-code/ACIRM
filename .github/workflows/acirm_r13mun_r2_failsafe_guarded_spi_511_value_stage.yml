name: ACIRM R13MUN R2 failsafe guarded SPI 511 value stage

on:
  workflow_dispatch:

jobs:
  guarded-value-stage:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Run failsafe guarded value stage
        shell: bash
        run: |
          set +e
          STAGE="ACIRM_R13MUN_R2_FAILSAFE_GUARDED_SPI_511_VALUE_STAGE"
          OUT="$GITHUB_WORKSPACE/${STAGE}_OUTPUT"
          mkdir -p "$OUT"

          python3 - <<'PY'
          from pathlib import Path
          from urllib.parse import urljoin
          import csv
          import json
          import os
          import re
          import sys
          import tempfile
          import traceback
          import urllib.request

          STAGE = "ACIRM_R13MUN_R2_FAILSAFE_GUARDED_SPI_511_VALUE_STAGE"
          out = Path(os.environ.get("GITHUB_WORKSPACE", ".")) / (STAGE + "_OUTPUT")
          out.mkdir(parents=True, exist_ok=True)

          def write_json(name, obj):
              (out / name).write_text(json.dumps(obj, indent=2, ensure_ascii=False), encoding="utf-8")

          def write_csv(name, rows, columns):
              with (out / name).open("w", newline="", encoding="utf-8") as f:
                  w = csv.DictWriter(f, fieldnames=columns)
                  w.writeheader()
                  for row in rows:
                      clean = {c: row.get(c, "") for c in columns}
                      w.writerow(clean)

          run_errors = []
          downloaded_any_product = False
          opened_any_product = False
          read_science_values = False
          diagnostic_value_rows = 0

          authorization = {
              "stage": STAGE,
              "repair_reason": "R13MUN-R1 failed without artifact. R2 is fail-safe: every network/product step is caught and package/upload still runs.",
              "authorization": "explicit_user_authorization_received_in_chat_for_guarded_R13MUN_value_open",
              "guarded_value_open_allowed": True,
              "scope": "first guarded diagnostic value-stage attempt only",
              "forbidden_claims_even_if_nonzero": [
                  "proof",
                  "discovery",
                  "evidence",
                  "confirmed 511 keV detection",
                  "particle production",
                  "ACIRM established"
              ],
              "hard_stops": [
                  "no blind broad search",
                  "no post-hoc window changes",
                  "no energy-window tuning",
                  "no source-switching",
                  "no claim promotion",
                  "no uncontrolled full archive download"
              ]
          }
          write_json("R13MUN_R2_AUTHORIZATION_AND_FIREWALL.json", authorization)

          locked_context = {
              "target": {
                  "r9c_anchor_utc": "2022-05-18T20:42:06.772Z",
                  "target_day_start_utc": "2022-05-18T00:00:00.000Z",
                  "target_day_stop_utc": "2022-05-19T00:00:00.000Z",
                  "strict_pm1h_product_claim": "FORBIDDEN_pm1h_rows_0"
              },
              "energy_windows_keV": {
                  "line_511": [508.0, 514.0],
                  "lower_sideband": [490.0, 500.0],
                  "upper_sideband": [522.0, 532.0]
              },
              "controls": {
                  "offtime_minus_1d": ["2022-05-17T00:00:00.000Z", "2022-05-18T00:00:00.000Z"],
                  "offtime_plus_1d": ["2022-05-19T00:00:00.000Z", "2022-05-20T00:00:00.000Z"]
              },
              "locked_scw_revision": "2504",
              "locked_target_scw_count": 21,
              "claim_ceiling": "guarded diagnostic attempt only"
          }
          write_json("R13MUN_R2_LOCKED_VALUE_STAGE_CONTEXT.json", locked_context)

          scw_rows = [
              ["250400110021","001","2504","slew",133],
              ["250400120010","001","2504","pointing",0],
              ["250400090021","001","2504","slew",132],
              ["250400090010","001","2504","pointing",3278],
              ["250400080021","001","2504","slew",133],
              ["250400020010","001","2504","pointing",3472],
              ["250400010021","001","2504","slew",115],
              ["250400010010","001","2504","pointing",770],
              ["250400080010","001","2504","pointing",3248],
              ["250400020021","001","2504","slew",133],
              ["250400030010","001","2504","pointing",3299],
              ["250400070021","001","2504","slew",7159],
              ["250400070010","001","2504","pointing",0],
              ["250400030021","001","2504","slew",136],
              ["250400060021","001","2504","slew",115],
              ["250400040010","001","2504","pointing",5100],
              ["250400060010","001","2504","pointing",3275],
              ["250400040021","001","2504","slew",115],
              ["250400050021","001","2504","slew",131],
              ["250400000031","001","2504","slew",461],
              ["250400050010","001","2504","pointing",3297]
          ]
          scw_out = []
          for scw_id, ver, rev, typ, good_spi in scw_rows:
              scw_out.append({
                  "scw_id": scw_id,
                  "scw_ver": ver,
                  "rev_dir": rev,
                  "scw_type": typ,
                  "good_spi": good_spi,
                  "url": f"https://heasarc.gsfc.nasa.gov/FTP/integral/data/scw/{rev}/{scw_id}.{ver}/"
              })
          write_csv(
              "R13MUN_R2_LOCKED_TARGET_DAY_SCW_LIST_21.csv",
              scw_out,
              ["scw_id", "scw_ver", "rev_dir", "scw_type", "good_spi", "url"]
          )

          def small_get(url, timeout=25, max_bytes=500000):
              req = urllib.request.Request(url, headers={
                  "User-Agent": "ACIRM-R13MUN-R2-failsafe-guarded-stage",
                  "Accept": "text/html,text/plain,*/*"
              })
              with urllib.request.urlopen(req, timeout=timeout) as r:
                  data = r.read(max_bytes + 1)
                  if len(data) > max_bytes:
                      data = data[:max_bytes]
                  text = data.decode("utf-8", errors="replace")
                  return getattr(r, "status", ""), r.headers.get("Content-Type", ""), text

          def hrefs(text):
              return re.findall(r"href=[\"']([^\"']+)[\"']", text, flags=re.I)

          dir_rows = []
          candidate_rows = []
          try:
              for row in scw_out:
                  url = row["url"]
                  try:
                      status, content_type, text = small_get(url)
                      hlist = hrefs(text)
                      dir_rows.append({
                          "scw_id": row["scw_id"],
                          "url": url,
                          "ok": True,
                          "status": status,
                          "content_type": content_type,
                          "href_count": len(hlist),
                          "error": ""
                      })
                      for h in hlist:
                          lname = h.lower()
                          abs_url = urljoin(url, h)
                          is_fits = (".fits" in lname or ".fit" in lname or ".fits.gz" in lname or ".fit.gz" in lname)
                          looks_spi = ("spi" in lname or lname.startswith("sp") or "/spi" in abs_url.lower())
                          looks_spectrum = any(tok in lname for tok in ["spec", "spectrum", "pha", "rmf", "arf", "rsp", "resp", "energy", "evts", "events"])
                          if is_fits and (looks_spi or looks_spectrum):
                              candidate_rows.append({
                                  "scw_id": row["scw_id"],
                                  "source_dir": url,
                                  "href": h,
                                  "candidate_url": abs_url,
                                  "is_fits_name": is_fits,
                                  "looks_spi": looks_spi,
                                  "looks_spectrum_or_response": looks_spectrum,
                                  "download_allowed_in_this_stage": False,
                                  "selection_reason": "candidate name only; not yet downloaded"
                              })
                  except Exception as e:
                      dir_rows.append({
                          "scw_id": row["scw_id"],
                          "url": url,
                          "ok": False,
                          "status": "",
                          "content_type": "",
                          "href_count": 0,
                          "error": repr(e)[:500]
                      })
          except Exception as e:
              run_errors.append("directory_scan_global_error: " + repr(e))
              run_errors.append(traceback.format_exc()[:2000])

          write_csv(
              "R13MUN_R2_SCW_DIRECTORY_INSPECTION.csv",
              dir_rows,
              ["scw_id", "url", "ok", "status", "content_type", "href_count", "error"]
          )
          write_csv(
              "R13MUN_R2_SAFE_FITS_PRODUCT_CANDIDATES_NAME_ONLY.csv",
              candidate_rows,
              ["scw_id", "source_dir", "href", "candidate_url", "is_fits_name", "looks_spi", "looks_spectrum_or_response", "download_allowed_in_this_stage", "selection_reason"]
          )

          product_summary = {
              "scw_dirs_tested": len(scw_out),
              "scw_dirs_ok": sum(1 for r in dir_rows if str(r.get("ok")).lower() == "true"),
              "candidate_fits_name_rows": len(candidate_rows),
              "downloaded_fits_so_far": False,
              "opened_fits_so_far": False,
              "read_science_values_so_far": False
          }
          write_json("R13MUN_R2_PRODUCT_CANDIDATE_DISCOVERY_SUMMARY.json", product_summary)

          allowed_tokens = ["spec", "spectrum", "pha"]
          forbidden_tokens = ["evt", "event", "events"]
          filtered = []
          for r in candidate_rows:
              lname = str(r.get("href", "")).lower()
              if any(tok in lname for tok in allowed_tokens) and not any(tok in lname for tok in forbidden_tokens):
                  filtered.append(r)

          value_rows = []
          stage_status = "NO_SAFE_PRECOMPUTED_SPECTRUM_PRODUCT_FOUND_VALUES_NOT_OPENED"

          if len(filtered) > 0:
              try:
                  import subprocess
                  subprocess.run([sys.executable, "-m", "pip", "-q", "install", "astropy"], check=False)
                  from astropy.io import fits
                  for r in filtered[:3]:
                      url = r["candidate_url"]
                      tmp = None
                      try:
                          with tempfile.NamedTemporaryFile(suffix=".fits", delete=False) as tf:
                              tmp = Path(tf.name)
                          urllib.request.urlretrieve(url, tmp)
                          downloaded_any_product = True
                          with fits.open(tmp, memmap=False) as hdul:
                              opened_any_product = True
                              hdus = []
                              for i, h in enumerate(hdul):
                                  cols = []
                                  if hasattr(h, "columns") and h.columns is not None:
                                      try:
                                          cols = list(h.columns.names)
                                      except Exception:
                                          cols = []
                                  hdus.append({"hdu_index": i, "name": h.name, "class": h.__class__.__name__, "columns": cols})
                              value_rows.append({
                                  "candidate_url": url,
                                  "status": "OPENED_STRUCTURE_ONLY_NO_DIAGNOSTIC_VALUE",
                                  "hdu_count": len(hdul),
                                  "hdu_summary_json": json.dumps(hdus)[:5000],
                                  "line_508_514_value": "",
                                  "lower_490_500_value": "",
                                  "upper_522_532_value": "",
                                  "diagnostic_ratio": "",
                                  "claim": "NO_DETECTION_CLAIM",
                                  "error": ""
                              })
                          stage_status = "SAFE_PRODUCT_OPENED_STRUCTURE_ONLY_NO_DIAGNOSTIC_VALUE"
                      except Exception as e:
                          value_rows.append({
                              "candidate_url": url,
                              "status": "DOWNLOAD_OR_OPEN_FAILED",
                              "hdu_count": "",
                              "hdu_summary_json": "",
                              "line_508_514_value": "",
                              "lower_490_500_value": "",
                              "upper_522_532_value": "",
                              "diagnostic_ratio": "",
                              "claim": "NO_DETECTION_CLAIM",
                              "error": repr(e)[:500]
                          })
                      finally:
                          try:
                              if tmp is not None:
                                  tmp.unlink()
                          except Exception:
                              pass
              except Exception as e:
                  run_errors.append("safe_product_open_global_error: " + repr(e))
                  run_errors.append(traceback.format_exc()[:2000])

          if not value_rows:
              value_rows.append({
                  "candidate_url": "",
                  "status": stage_status,
                  "hdu_count": "",
                  "hdu_summary_json": "",
                  "line_508_514_value": "",
                  "lower_490_500_value": "",
                  "upper_522_532_value": "",
                  "diagnostic_ratio": "",
                  "claim": "NO_DETECTION_CLAIM",
                  "error": ""
              })

          write_csv(
              "R13MUN_R2_FIRST_GUARDED_VALUE_READOUT.csv",
              value_rows,
              ["candidate_url", "status", "hdu_count", "hdu_summary_json", "line_508_514_value", "lower_490_500_value", "upper_522_532_value", "diagnostic_ratio", "claim", "error"]
          )

          diagnostic_value_rows = len([r for r in value_rows if r.get("line_508_514_value") not in ["", None]])
          value_stage_result = {
              "stage_status": stage_status,
              "safe_precomputed_spectrum_candidates": len(filtered),
              "downloaded_any_product": downloaded_any_product,
              "opened_any_product": opened_any_product,
              "read_science_values": read_science_values,
              "diagnostic_value_rows": diagnostic_value_rows,
              "claim": "NO_DETECTION_CLAIM_NO_PROOF_NO_DISCOVERY",
              "note": "If this stage stops with no safe product, the next step is explicit OSA product generation, not claim-making.",
              "run_errors": run_errors
          }
          write_json("R13MUN_R2_FIRST_GUARDED_VALUE_STAGE_RESULT.json", value_stage_result)

          if diagnostic_value_rows > 0:
              decision = "FIRST_GUARDED_DIAGNOSTIC_VALUE_READ_VALUES_OPENED_NO_CLAIM"
              next_stage = "R13MUO_VALIDATE_DIAGNOSTIC_VALUE_WITH_CONTROLS_AND_NULLS"
          elif opened_any_product:
              decision = "PRODUCT_STRUCTURE_OPENED_BUT_NO_DIAGNOSTIC_VALUE_EXTRACTED_NO_CLAIM"
              next_stage = "R13MUO_REPAIR_PRODUCT_COLUMN_MAPPING_OR_USE_OSA_GENERATION"
          elif len(filtered) == 0:
              decision = "NO_SAFE_PRECOMPUTED_SPECTRUM_PRODUCT_FOUND_VALUES_NOT_OPENED"
              next_stage = "R13MUO_EXPLICIT_OSA_PRODUCT_GENERATION_WORKFLOW_REQUIRED"
          else:
              decision = "GUARDED_VALUE_STAGE_ATTEMPT_INCONCLUSIVE_NO_CLAIM"
              next_stage = "R13MUO_REPAIR_GUARDED_VALUE_STAGE"

          final = {
              "stage": STAGE,
              "decision": decision,
              "next_stage": next_stage,
              "candidate_fits_name_rows": len(candidate_rows),
              "safe_precomputed_spectrum_candidates": len(filtered),
              "downloaded_any_product": downloaded_any_product,
              "opened_any_product": opened_any_product,
              "read_science_values": read_science_values,
              "diagnostic_value_rows": diagnostic_value_rows,
              "run_errors_count": len(run_errors),
              "claim_ceiling": "guarded diagnostic attempt only; no detection/evidence/proof/discovery/particle-production claim"
          }
          write_json("R13MUN_R2_FINAL_DECISION.json", final)
          print(json.dumps(final, indent=2))
          PY

          echo "Python exit code was $?"
          exit 0

      - name: Package results
        if: always()
        shell: bash
        run: |
          set +e
          STAGE="ACIRM_R13MUN_R2_FAILSAFE_GUARDED_SPI_511_VALUE_STAGE"
          OUT="$GITHUB_WORKSPACE/${STAGE}_OUTPUT"
          ZIP="$GITHUB_WORKSPACE/${STAGE}_RESULTS.zip"
          SHA="$ZIP.sha256.txt"

          mkdir -p "$OUT"

          cat > "$OUT/R13MUN_R2_GO_NO_GO.csv" <<'CSV'
          question,decision,reason
          Was R13MUN-R2 authorized?,YES,Explicit chat authorization was recorded.
          Does this claim 511 keV detection?,NO,Claim firewall forbids detection/evidence/proof/discovery.
          Did it perform a broad search?,NO,Locked windows and target day only.
          Is this final proof?,NO,At most a guarded diagnostic attempt.
          CSV

          cd "$GITHUB_WORKSPACE"
          rm -f "$ZIP" "$SHA"
          zip -r "$ZIP" "$(basename "$OUT")"
          sha256sum "$ZIP" > "$SHA"
          exit 0

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ACIRM_R13MUN_R2_FAILSAFE_GUARDED_SPI_511_VALUE_STAGE_RESULTS
          path: |
            ACIRM_R13MUN_R2_FAILSAFE_GUARDED_SPI_511_VALUE_STAGE_RESULTS.zip
            ACIRM_R13MUN_R2_FAILSAFE_GUARDED_SPI_511_VALUE_STAGE_RESULTS.zip.sha256.txt
          retention-days: 7
